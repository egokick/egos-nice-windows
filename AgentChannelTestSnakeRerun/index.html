<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1f2937 0, #111827 48%, #0b1120 100%);
    }

    main {
      width: min(92vw, 520px);
      display: grid;
      gap: 14px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1;
    }

    .scoreboard {
      display: flex;
      gap: 12px;
      font-size: 16px;
      color: #d1d5db;
    }

    .scoreboard strong {
      color: #f9fafb;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border: 2px solid #374151;
      background: #020617;
      box-shadow: 0 18px 50px rgb(0 0 0 / 0.35);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #d1d5db;
      font-size: 14px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #4ade80;
    }

    .status {
      min-height: 22px;
      color: #fbbf24;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      header,
      .controls {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Snake</h1>
      <div class="scoreboard" aria-live="polite">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="best">0</strong></span>
      </div>
    </header>

    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>

    <div class="controls">
      <div>
        Use arrow keys or WASD. Eat food, avoid walls and yourself.
        <div id="status" class="status"></div>
      </div>
      <button id="restart" type="button">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const statusEl = document.getElementById("status");
    const restartButton = document.getElementById("restart");

    const cells = 20;
    const cellSize = canvas.width / cells;
    const tickMs = 120;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("snake-best") || 0);
    let gameOver;
    let timerId;

    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
      statusEl.textContent = "";
      placeFood();
      draw();
      clearInterval(timerId);
      timerId = setInterval(tick, tickMs);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * cells),
          y: Math.floor(Math.random() * cells)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function tick() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.x >= cells || head.y < 0 || head.y >= cells;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);

      if (hitWall || hitSelf) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem("snake-best", String(best));
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      clearInterval(timerId);
      statusEl.textContent = "Game over. Press Restart or Space.";
      draw();
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#111827";
      for (let i = 1; i < cells; i += 1) {
        const pos = i * cellSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }

      ctx.fillStyle = "#ef4444";
      ctx.fillRect(food.x * cellSize + 3, food.y * cellSize + 3, cellSize - 6, cellSize - 6);

      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#86efac" : "#22c55e";
        ctx.fillRect(part.x * cellSize + 2, part.y * cellSize + 2, cellSize - 4, cellSize - 4);
      });

      if (gameOver) {
        ctx.fillStyle = "rgb(2 6 23 / 0.72)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f9fafb";
        ctx.font = "700 34px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
      }
    }

    function setDirection(newDirection) {
      const reversing = newDirection.x + direction.x === 0 && newDirection.y + direction.y === 0;
      if (!reversing) {
        nextDirection = newDirection;
      }
    }

    document.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        w: { x: 0, y: -1 },
        W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        s: { x: 0, y: 1 },
        S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        a: { x: -1, y: 0 },
        A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        d: { x: 1, y: 0 },
        D: { x: 1, y: 0 }
      };

      if (event.key === " " && gameOver) {
        resetGame();
        return;
      }

      if (keyMap[event.key]) {
        event.preventDefault();
        setDirection(keyMap[event.key]);
      }
    });

    restartButton.addEventListener("click", resetGame);

    resetGame();
  </script>
</body>
</html>
