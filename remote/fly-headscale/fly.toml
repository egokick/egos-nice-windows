app = "stayactive-headscale-egokick"
primary_region = "lhr"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  HEADSCALE_PUBLIC_IPV4 = "137.66.29.4"

[[mounts]]
  source = "stayactive_headscale_data"
  destination = "/data"
  snapshot_retention = 14

[[services]]
  protocol = "tcp"
  internal_port = 443
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"

[[services]]
  protocol = "udp"
  internal_port = 3478
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 3478

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
