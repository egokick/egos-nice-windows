<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #17212b;
      color: #f4f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(92vw, 520px);
      padding: 24px;
      background: #243241;
      border: 1px solid #3d4f61;
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 28px;
      font-weight: 700;
    }

    .hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    button {
      min-height: 38px;
      padding: 0 14px;
      border: 0;
      border-radius: 6px;
      background: #ffd166;
      color: #17212b;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button:hover,
    button:focus-visible {
      background: #ffe08f;
      outline: 2px solid #f4f7fa;
      outline-offset: 2px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #0f1720;
      border: 2px solid #50657a;
      border-radius: 6px;
    }

    .status {
      min-height: 24px;
      margin: 14px 0 0;
      color: #d9e6f2;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main>
    <h1>Snake</h1>
    <div class="hud">
      <div>Score: <strong id="score">0</strong></div>
      <button id="restart" type="button">Restart</button>
    </div>
    <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
    <p class="status" id="status">Use arrow keys or WASD to move.</p>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const context = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const statusEl = document.getElementById("status");
    const restartButton = document.getElementById("restart");

    const tileCount = 20;
    const tileSize = canvas.width / tileCount;
    const tickMs = 110;

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let gameOver;
    let timer;

    function startGame() {
      snake = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
      statusEl.textContent = "Use arrow keys or WASD to move.";
      placeFood();
      draw();
      clearInterval(timer);
      timer = setInterval(tick, tickMs);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function tick() {
      if (gameOver) {
        return;
      }

      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
      const hitSelf = snake.some(segment => segment.x === head.x && segment.y === head.y);

      if (hitWall || hitSelf) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      clearInterval(timer);
      statusEl.textContent = "Game over. Press Restart or Space to play again.";
      draw();
    }

    function draw() {
      context.fillStyle = "#0f1720";
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.fillStyle = "#ef476f";
      drawTile(food.x, food.y);

      snake.forEach((segment, index) => {
        context.fillStyle = index === 0 ? "#06d6a0" : "#31b78e";
        drawTile(segment.x, segment.y);
      });

      if (gameOver) {
        context.fillStyle = "rgba(15, 23, 32, 0.72)";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = "#f4f7fa";
        context.font = "700 34px Arial, Helvetica, sans-serif";
        context.textAlign = "center";
        context.fillText("Game Over", canvas.width / 2, canvas.height / 2);
      }
    }

    function drawTile(x, y) {
      const inset = 2;
      context.fillRect(
        x * tileSize + inset,
        y * tileSize + inset,
        tileSize - inset * 2,
        tileSize - inset * 2
      );
    }

    function setDirection(newDirection) {
      const reversing = newDirection.x + direction.x === 0 && newDirection.y + direction.y === 0;
      if (!reversing) {
        nextDirection = newDirection;
      }
    }

    document.addEventListener("keydown", event => {
      const keys = {
        ArrowUp: { x: 0, y: -1 },
        KeyW: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        KeyS: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        KeyA: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        KeyD: { x: 1, y: 0 }
      };

      if (event.code === "Space" && gameOver) {
        event.preventDefault();
        startGame();
        return;
      }

      if (keys[event.code]) {
        event.preventDefault();
        setDirection(keys[event.code]);
      }
    });

    restartButton.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
