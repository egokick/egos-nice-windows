      const watchPresets = [presetButton(paths,'src/**','Source code'),presetButton(paths,'**/*.{test,spec}.{js,jsx,ts,tsx}','Tests'),presetButton(paths,'**/*.{csv,txt,log}','Line records'),presetButton(paths,'*.{json,yaml,yml,toml}','Config'),presetButton(paths,'**/*','Everything')].join('');
      const ignorePresets = [presetButton(ignored,'node_modules/**','Dependencies'),presetButton(ignored,'.git/**','Git metadata'),presetButton(ignored,'{dist,build,coverage}/**','Build output'),presetButton(ignored,'**/*.generated.*','Generated files')].join('');
      const unitOptions = [['milliseconds','milliseconds'],['seconds','seconds']].map(([value,label]) => `<option value="${value}" ${debounceUnit === value ? 'selected' : ''}>${label}</option>`).join('');
      const quietText = `${debounceAmount} ${debounceAmount === 1 ? debounceUnit.replace(/s$/, '') : debounceUnit}`;
      const dispatchPicker = `<div class="form-group full watch-card"><div class="watch-card-head"><div><div class="watch-card-title">How should one file update create runs?</div><div class="watch-card-copy">Choose whether a matching update is one unit of work or a batch of line-level work.</div></div></div><div class="watch-dispatch-picker" role="group" aria-label="File update dispatch mode"><button type="button" class="watch-dispatch-option ${dispatchMode === 'change' ? 'active' : ''}" data-action="setFileWatchDispatch" data-mode="change" aria-pressed="${dispatchMode === 'change'}"><span class="watch-dispatch-icon" aria-hidden="true">1</span><strong>One run per change</strong><span>After the quiet period, all matching edits start one workflow run.</span></button><button type="button" class="watch-dispatch-option ${dispatchMode === 'per_line' ? 'active' : ''}" data-action="setFileWatchDispatch" data-mode="per_line" aria-pressed="${dispatchMode === 'per_line'}"><span class="watch-dispatch-icon" aria-hidden="true">≡</span><strong>One run per added line</strong><span>Every new record starts an independent run, in parallel.</span></button></div></div>`;
      const lineControls = dispatchMode === 'per_line' ? `<div class="form-group full line-dispatch-card"><div class="watch-card-head"><div><div class="watch-card-title">Line-level fan-out</div><div class="watch-card-copy">The file snapshot is compared after edits settle. Each qualifying line becomes one immutable trigger payload.</div></div><span class="pattern-count">parallel</span></div><div class="line-fanout-demo" aria-label="Example: two added lines create two workflow runs"><div class="line-source"><div class="line-source-title">One file update adds</div><code>order-1042,refund<br>order-1043,ship</code></div><div class="line-fanout-arrow" aria-hidden="true">→</div><div class="line-runs"><div class="line-runs-title">Independent runs</div><div class="line-run-chip">Run 1 · order-1042,refund</div><div class="line-run-chip">Run 2 · order-1043,ship</div></div></div><div class="line-dispatch-controls"><div class="form-group"><label for="lineDetection">Which lines count as new?</label><select class="field" id="lineDetection" data-editor-path="trigger.lineDetection"><option value="append_only" ${lineDetection === 'append_only' ? 'selected' : ''}>Only lines appended to the end (recommended)</option><option value="added_anywhere" ${lineDetection === 'added_anywhere' ? 'selected' : ''}>Any added line in the file diff</option></select><div class="field-help">Append-only is safest for queue files and logs. Diff mode also treats a replaced line as newly added.</div></div><div class="form-group"><label for="lineParallelism">Maximum runs at once</label><input class="field" type="number" min="1" max="100" id="lineParallelism" data-editor-path="trigger.maxParallel" value="${maxParallel}"><div class="field-help">Additional line runs wait in order.</div></div></div><div class="line-option-list"><label class="safety-option"><input type="checkbox" data-editor-path="trigger.ignoreBlankLines" ${ignoreBlankLines ? 'checked' : ''}><span><span class="safety-title">Ignore blank lines</span><span class="safety-copy">Whitespace-only additions do not create empty work items.</span></span></label><label class="safety-option"><input type="checkbox" data-editor-path="trigger.skipHeader" ${skipHeader ? 'checked' : ''}><span><span class="safety-title">Skip the first row when a new file is created</span><span class="safety-copy">Useful when newly created CSV files include a header row.</span></span></label></div><div class="line-payload" aria-label="Context available to each line run"><span class="line-token">trigger.file.path</span><span class="line-token">trigger.line.number</span><span class="line-token">trigger.line.text</span><span class="line-token">trigger.change.id</span></div><div class="field-help" style="margin-top:8px">Duplicate lines still create separate runs because each added line position is a distinct work item.</div></div>` : '';
      const dispatchSummary = dispatchMode === 'per_line' ? `After ${quietText} of no matching edits, each ${ignoreBlankLines ? 'non-blank ' : ''}${lineDetection === 'append_only' ? 'appended' : 'added'} line starts its own run, up to ${maxParallel} in parallel; additional lines queue.${skipHeader ? ' The first row of a newly created file is skipped.' : ''}` : `After ${quietText} of no matching edits, the entire matching file update starts one workflow run.`;
      return `<div class="form-group full"><div class="watch-flow" aria-label="File watch trigger flow"><div class="watch-flow-step"><span class="watch-step-number">1</span><strong>Match a change</strong><p>A changed file matches one of the watched patterns.</p></div><div class="watch-flow-step"><span class="watch-step-number">2</span><strong>Wait for quiet</strong><p>Rapid saves are grouped before the file snapshot is processed.</p></div><div class="watch-flow-step"><span class="watch-step-number">3</span><strong>${dispatchMode === 'per_line' ? 'Fan out runs' : 'Start one run'}</strong><p>${dispatchMode === 'per_line' ? 'Each qualifying line becomes an independent parallel run.' : 'The settled update becomes one workflow run.'}</p></div></div></div><div class="form-group full watch-card"><div class="watch-card-head"><div><div class="watch-card-title">Watch for changes in</div><div class="watch-card-copy">A change matching any pattern can start this workflow.</div></div><span class="pattern-count">${paths.length} ${paths.length === 1 ? 'pattern' : 'patterns'}</span></div><div class="pattern-presets" aria-label="Common watched path presets">${watchPresets}</div><label class="sr-only" for="watchedPaths">Watched path patterns</label><textarea class="textarea mono" id="watchedPaths" data-editor-path="trigger.paths" placeholder="data/inbox/*.csv&#10;queues/*.txt">${esc(trigger.paths || '')}</textarea><div class="field-help">One glob pattern per line.</div></div><div class="form-group full watch-card"><div class="watch-card-head"><div><div class="watch-card-title">Ignore changes in</div><div class="watch-card-copy">Matching files never start this workflow.</div></div><span class="pattern-count">${ignored.length} ${ignored.length === 1 ? 'pattern' : 'patterns'}</span></div><div class="pattern-presets" aria-label="Common ignored path presets">${ignorePresets}</div><label class="sr-only" for="ignoredPaths">Ignored path patterns</label><textarea class="textarea mono" id="ignoredPaths" data-editor-path="trigger.ignore" placeholder="node_modules/**&#10;dist/**">${esc(trigger.ignore || '')}</textarea><div class="field-help">Use exclusions to prevent generated or high-churn files from triggering runs.</div></div>${dispatchPicker}${lineControls}<div class="form-group full watch-card"><div class="watch-card-head"><div><div class="watch-card-title">Wait for edits to settle</div><div class="watch-card-copy">The quiet period closes one update batch before ${dispatchMode === 'per_line' ? 'lines are compared and dispatched' : 'the workflow starts'}.</div></div></div><div class="watch-debounce-row"><input class="field" type="number" min="0" max="9999" id="watchDebounce" data-editor-path="trigger.debounceAmount" value="${debounceAmount}" aria-label="Quiet period amount"><select class="field" id="watchDebounceUnit" data-editor-path="trigger.debounceUnit" aria-label="Quiet period unit">${unitOptions}</select></div></div><div class="form-group full"><div class="watch-summary"><strong>Trigger summary:</strong> ${esc(dispatchSummary)}</div></div>`;
    }

    function renderTriggerEditor() {
      const wf = editorState.draft;
      const trigger = wf.trigger;
      const lineDispatch = trigger.type === 'file_watch' && (trigger.dispatchMode || 'change') === 'per_line';
      let specific = '';
      if (trigger.type === 'schedule') specific = renderScheduleEditor(trigger);
      if (trigger.type === 'file_watch') specific = renderFileWatchEditor(trigger);
      if (trigger.type === 'post_commit') specific = `<div class="form-group"><label for="commitAuthors">Commits to include</label><select class="field" id="commitAuthors" data-editor-path="trigger.authors"><option value="human" ${trigger.authors === 'human' ? 'selected' : ''}>Human commits only</option><option value="all" ${trigger.authors === 'all' ? 'selected' : ''}>Human and AI commits</option></select></div><div class="form-group"><label for="hookBehavior">Hook behavior</label><select class="field" id="hookBehavior" data-editor-path="trigger.hookBehavior"><option value="after_each_commit" ${trigger.hookBehavior === 'after_each_commit' ? 'selected' : ''}>After each commit</option><option value="after_idle" ${trigger.hookBehavior === 'after_idle' ? 'selected' : ''}>After commit activity is idle</option></select></div><div class="form-group"><label for="commitDebounce">Debounce</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="0" max="9999" id="commitDebounce" data-editor-path="trigger.debounceSeconds" value="${Number(trigger.debounceSeconds ?? 10)}"><span class="subtle">seconds</span></div></div>`;
      if (trigger.type === 'test_failure') specific = `<div class="form-group full"><label for="testCommand">Test command</label><input class="field mono" id="testCommand" data-editor-path="trigger.testCommand" value="${esc(trigger.testCommand || 'npm test')}"></div><div class="form-group"><label for="eventSource">Failure event source</label><input class="field" id="eventSource" data-editor-path="trigger.eventSource" value="${esc(trigger.eventSource || 'local test wrapper')}"></div><div class="form-group"><label for="failureCooldown">Cooldown</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="0" max="9999" id="failureCooldown" data-editor-path="trigger.cooldownSeconds" value="${Number(trigger.cooldownSeconds ?? 30)}"><span class="subtle">seconds</span></div></div>`;
      if (trigger.type === 'manual') specific = `<div class="form-group full"><div class="notice">This workflow starts only when you choose <strong>Run now</strong>. Disabling automatic triggers does not prevent manual runs.</div></div>`;
      return `${editorState.errors.trigger ? `<div class="notice danger" style="margin-bottom:12px">${esc(editorState.errors.trigger)}</div>` : ''}<div class="form-grid"><div class="form-group full"><label for="triggerType">Trigger type</label><select class="field" id="triggerType" data-editor-path="trigger.type"><option value="manual" ${trigger.type === 'manual' ? 'selected' : ''}>Manual</option><option value="post_commit" ${trigger.type === 'post_commit' ? 'selected' : ''}>Post-commit</option><option value="test_failure" ${trigger.type === 'test_failure' ? 'selected' : ''}>Test failure</option><option value="schedule" ${trigger.type === 'schedule' ? 'selected' : ''}>Schedule</option><option value="file_watch" ${trigger.type === 'file_watch' ? 'selected' : ''}>File watch</option></select><div class="field-help">Switching types preserves each trigger draft until this editor is closed.</div></div>${specific}<div class="form-group"><label for="overlapPolicy">${lineDispatch ? 'Across line-level runs' : 'If another run is active'}</label><select class="field" id="overlapPolicy" data-editor-path="scope.overlap" ${lineDispatch ? 'disabled' : ''}><option value="skip" ${wf.scope.overlap === 'skip' ? 'selected' : ''}>Skip the new trigger</option><option value="queue" ${wf.scope.overlap === 'queue' ? 'selected' : ''}>Queue one run</option><option value="parallel" ${wf.scope.overlap === 'parallel' ? 'selected' : ''}>Run in parallel</option></select>${lineDispatch ? '<div class="field-help">Per-line dispatch requires parallel runs. The previous overlap choice is restored when line-level dispatch is turned off.</div>' : ''}</div><div class="form-group"><label>Automatic trigger</label><label class="safety-option" style="padding:8px 10px"><input type="checkbox" data-editor-path="enabled" ${wf.enabled ? 'checked' : ''}><span><span class="safety-title">${wf.enabled ? 'Enabled' : 'Disabled'}</span><span class="safety-copy">Manual Run now remains available.</span></span></label></div></div>`;
    }

    function nextScheduleText(trigger) {
      if ((trigger.scheduleMode || (trigger.intervalEvery ? 'interval' : 'calendar')) === 'interval') {
        const every = Math.max(1, Number(trigger.intervalEvery || 10));
        const unit = trigger.intervalUnit || 'minutes';
        const label = every === 1 ? unit.replace(/s$/, '') : unit;
        return `every ${every} ${label}`;
      }
      const label = trigger.cadence === 'weekdays' ? 'next weekday' : trigger.cadence === 'weekly' ? 'next scheduled week' : 'tomorrow';
      const timezone = !trigger.timezone || trigger.timezone === 'system' ? 'System time' : trigger.timezone;
      return `${label} at ${trigger.time || '02:30'} (${timezone})`;
    }

    function renderScoreChart(evaluations, activeEvaluationId) {
      const points = evaluations.filter(item => item.status === 'scored' && Number.isFinite(Number(item.score))).slice().sort((a,b) => a.createdAt - b.createdAt);
      if (!points.length) return `<div class="empty-state" style="min-height:150px"><strong>No evaluator scores yet</strong>Complete a workflow run or start an isolated replay to establish the first score.</div>`;
      const width = 760, height = 188, left = 42, right = 22, top = 22, bottom = 38;
      const innerWidth = width - left - right, innerHeight = height - top - bottom;
      const plotted = points.map((item,index) => ({
        ...item,
        x: points.length === 1 ? left + innerWidth / 2 : left + (index / (points.length - 1)) * innerWidth,
        y: top + (1 - Math.max(0,Math.min(100,Number(item.score))) / 100) * innerHeight
      }));
      const line = plotted.map((item,index) => `${index ? 'L' : 'M'}${item.x.toFixed(1)},${item.y.toFixed(1)}`).join(' ');
      const area = `${line} L${plotted.at(-1).x.toFixed(1)},${(top + innerHeight).toFixed(1)} L${plotted[0].x.toFixed(1)},${(top + innerHeight).toFixed(1)} Z`;
      const grid = [0,25,50,75,100].map(score => {
        const y = top + (1 - score / 100) * innerHeight;
        return `<line class="score-grid-line" x1="${left}" x2="${width-right}" y1="${y}" y2="${y}"/><text class="score-axis-label" x="${left-8}" y="${y+3}" text-anchor="end">${score}</text>`;
      }).join('');
      const marks = plotted.map(item => {
        const pair = `G${item.generatorVersion}${item.verifierVersion ? `/V${item.verifierVersion}` : ''}`;
        const contract=`Evaluator v${item.evaluatorPromptVersion} · ${item.metricName} · ${item.metricSource} · ${item.metricAggregationWindow}`;
        return `<g><title>${esc(`${pair} scored ${item.score}/100 · ${contract}`)}</title><circle class="score-point ${item.id === activeEvaluationId ? 'active' : ''}" cx="${item.x}" cy="${item.y}" r="5" aria-label="${esc(`${pair}, ${item.score} of 100, ${contract}`)}"/><text class="score-point-label" x="${item.x}" y="${Math.max(12,item.y-10)}" text-anchor="middle">${item.score}</text><text class="score-axis-label" x="${item.x}" y="${height-14}" text-anchor="middle">${esc(pair)}</text></g>`;
      }).join('');
      const contracts=plotted.map(item=>`<span><strong>G${item.generatorVersion}${item.verifierVersion?`/V${item.verifierVersion}`:''}</strong> · Evaluator v${item.evaluatorPromptVersion} · ${esc(item.metricName)} from <span class="mono">${esc(item.metricSource)}</span> · ${esc(item.metricAggregationWindow)}</span>`).join('');
      return `<div class="score-chart-wrap"><svg class="score-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Evaluator score over prompt versions"><defs><linearGradient id="scoreArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c9cff"/><stop offset="1" stop-color="#7c9cff" stop-opacity="0"/></linearGradient></defs>${grid}<path class="score-area" d="${area}"/><path class="score-line" d="${line}"/>${marks}</svg></div><div class="score-chart-legend">${contracts}</div>`;
    }

    function renderVersionHistory() {
      const wf = editorState.draft;
      const generatorVersions = wf.promptVersions || [];
      const verifierVersions = wf.reviewLoop?.verifierPromptVersions || [];
      const workflowRuns = state.runs.filter(run => run.workflowId === wf.id && !run.archived);
      const auto = ensureAutoImprove(wf, workflowRuns);
      const archivedEvaluatorPrompts=ensureEvaluatorPromptArchive(editorState.original);
      if(!Array.isArray(wf.evaluatorPromptVersions)||!wf.evaluatorPromptVersions.length)wf.evaluatorPromptVersions=deepClone(archivedEvaluatorPrompts);
      const evaluatorPromptVersions=wf.evaluatorPromptVersions.slice().sort((a,b)=>Number(b.version)-Number(a.version));
      const replayRuns = matchingTerminalRunsForCurrentVersion(wf, workflowRuns);
      const eligibleReplayEvidence=limitEvidenceByAggregation(replayRuns.map(runEvidenceDescriptor),auto.metricAggregationWindow);
      if (!generatorVersions.length && !verifierVersions.length) return `<div class="empty-state"><strong>No saved versions yet</strong>Create the workflow and complete a run before the evaluator can score or improve its prompts.</div>`;
      const scored = auto.evaluations.filter(item => item.status === 'scored' && Number.isFinite(Number(item.score)));
      const best = scored.slice().sort((a,b) => b.score - a.score || b.createdAt - a.createdAt)[0] || null;
      const active = auto.evaluations.find(item => item.id === auto.activeEvaluationId) || best;
      const dirty = editorIsDirty();
      const canImprove = editorState.mode === 'edit' && eligibleReplayEvidence.length >= 2 && !dirty && auto.status !== 'running';
      const improveHint = editorState.mode !== 'edit' ? 'Create this workflow first.' : eligibleReplayEvidence.length < 2 ? 'The frozen aggregation window needs at least two matching completed, failed, or deliberately stopped runs.' : dirty ? 'Save or discard edits before replay.' : `${eligibleReplayEvidence.length} matching terminal artifacts are eligible under ${auto.metricAggregationWindow}.`;
      const metricKind = `${auto.metricMode === 'auto' ? 'Auto · ' : ''}${auto.metricType === 'concrete' ? 'Concrete metric' : 'AI rubric'}`;
      const metricFormula = auto.metricDirection === 'lower'
        ? 'score = clamp(0, 100, 100 × (unacceptable − raw) ÷ (unacceptable − target))'
        : 'score = clamp(0, 100, 100 × (raw − unacceptable) ÷ (target − unacceptable))';
      const aggregationOptions = [['latest_5_terminal_runs','Latest 5 terminal runs'],['latest_10_terminal_runs','Latest 10 terminal runs'],['latest_20_terminal_runs','Latest 20 terminal runs'],['last_30_days','All terminal runs in the last 30 days']].map(([value,label]) => `<option value="${value}" ${auto.metricAggregationWindow === value ? 'selected' : ''}>${label}</option>`).join('');
      const metricContractEditor = auto.metricType === 'concrete' ? `<section class="metric-contract-editor"><div class="history-section-title" style="margin:0"><span class="metric-kind concrete">0–100 contract</span>Concrete metric mapping</div>${editorState.errors.metric ? `<div class="notice danger" style="margin-top:10px">${esc(editorState.errors.metric)}</div>` : ''}<div class="metric-contract-grid"><div class="form-group"><label for="metricSource">Raw value source</label><input class="field mono" id="metricSource" data-editor-path="autoImprove.metricSource" value="${esc(auto.metricSource)}" placeholder="analytics.minutes_watched"><div class="field-help">Stable field or query that produces one numeric raw value.</div></div><div class="form-group"><label for="metricUnit">Unit</label><input class="field" id="metricUnit" data-editor-path="autoImprove.metricUnit" value="${esc(auto.metricUnit)}" placeholder="minutes, %, defects"><div class="field-help">Displayed with the raw value and preserved in evaluation history.</div></div><div class="form-group"><label for="metricDirection">Better direction</label><select class="field" id="metricDirection" data-editor-path="autoImprove.metricDirection"><option value="higher" ${auto.metricDirection === 'higher' ? 'selected' : ''}>Higher is better</option><option value="lower" ${auto.metricDirection === 'lower' ? 'selected' : ''}>Lower is better</option></select></div><div class="form-group"><label for="metricAggregationWindow">Aggregation window</label><select class="field" id="metricAggregationWindow" data-editor-path="autoImprove.metricAggregationWindow">${aggregationOptions}</select></div><div class="form-group"><label for="metricTarget">Target → 100</label><input class="field" type="number" step="any" id="metricTarget" data-editor-path="autoImprove.metricTarget" value="${Number(auto.metricTarget ?? 100)}"></div><div class="form-group"><label for="metricUnacceptable">Unacceptable bound → 0</label><input class="field" type="number" step="any" id="metricUnacceptable" data-editor-path="autoImprove.metricUnacceptable" value="${Number(auto.metricUnacceptable ?? 0)}"></div></div><div class="metric-formula" id="metricFormula">${esc(metricFormula)}</div><div class="field-help" style="margin-top:8px">Values between the bound and target are linearly normalized and clamped. Every contract becomes a comparable 0–100 score before it enters the combined score graph.</div></section>` : '';
      const evaluatorArchiveMarkup=`<details class="evaluator-settings"><summary>Evaluator prompt archive · ${evaluatorPromptVersions.length} version${evaluatorPromptVersions.length===1?'':'s'}</summary><div class="evaluator-settings-body"><div class="version-list" style="margin-top:12px">${evaluatorPromptVersions.map(item=>`<article class="version-card"><div class="version-head"><span class="version-number">Evaluator v${item.version}</span>${Number(item.version)===Number(auto.evaluatorPromptVersion)?'<span class="version-current">Current</span>':''}<span class="version-date">${esc(dateTime(item.createdAt))}</span></div><div class="version-note">${esc(item.note||'Saved evaluator prompt')}</div><details style="margin-top:8px"><summary>View frozen prompt body</summary><pre class="command" style="white-space:pre-wrap;max-height:220px;overflow:auto">${esc(item.prompt)}</pre></details><div class="version-actions"><button type="button" class="btn-small" data-action="restoreEvaluatorPromptVersion" data-version="${item.version}">Restore as draft</button></div></article>`).join('')||'<div class="notice">No evaluator prompt versions saved yet.</div>'}</div></div></details>`;
      const evaluationCards = `${metricContractEditor}${evaluatorArchiveMarkup}${auto.evaluations.slice().sort((a,b) => b.createdAt - a.createdAt).map(item => {
        const isActive = item.id === auto.activeEvaluationId;
        const isBest = item.id === best?.id;
        const pair = `Generator v${item.generatorVersion}${item.verifierVersion ? ` · Verifier v${item.verifierVersion}` : ''}`;
        const sourceLabel = item.source === 'auto' ? 'Auto-generated' : 'User-created';
        const scoreMarkup = item.status === 'scored' ? `${item.score}<span>/ 100</span>` : `—<span>Awaiting runs</span>`;
        const loopContract = item.reviewLoopConfig?.enabled ? `${item.reviewLoopConfig.maxRounds} rounds · ${item.reviewLoopConfig.onLimit === 'fail' ? 'fail at limit' : 'block at limit'}` : 'Verifier disabled';
        const frozenContract=`${item.metricName} · ${item.metricSource} · ${item.metricDirection==='lower'?'lower':'higher'} is better · target ${item.metricTarget} ${item.metricUnit} · unacceptable ${item.metricUnacceptable} ${item.metricUnit} · ${item.metricAggregationWindow}`;
        const rawMetric=item.metricType==='concrete'&&item.rawMetricValue!=null?`<span class="role-score">Raw <strong>${item.rawMetricValue} ${esc(item.rawMetricUnit||item.metricUnit||'')}</strong>${item.rawMetricIsProxy?' · demo proxy':''}</span>`:'';
        return `<article class="evaluation-card ${isActive ? 'active' : ''}"><div class="evaluation-score">${scoreMarkup}</div><div><div class="evaluation-head"><span class="evaluation-version">${esc(pair)}</span><span class="origin-label ${item.source === 'auto' ? 'auto' : ''}">${sourceLabel}</span>${isBest ? '<span class="best-label">Best</span>' : ''}${isActive ? '<span class="active-label">Active</span>' : ''}</div><div class="evaluation-meta">${item.status === 'scored' ? `${item.runCount} matching ${item.isolated ? 'replay' : 'terminal'} case${item.runCount === 1 ? '' : 's'} · ${item.averageRounds} average rounds · ` : 'Scoring starts after matching run evidence exists · '}${esc(loopContract)} · Evaluator prompt v${item.evaluatorPromptVersion} · ${esc(dateTime(item.createdAt))}</div><div class="evaluation-feedback"><strong>Frozen scoring contract:</strong> ${esc(frozenContract)}</div>${item.status === 'scored' ? `<div class="role-scores"><span class="role-score">Generator <strong>${item.generatorScore ?? item.score}</strong></span>${item.verifierVersion ? `<span class="role-score">Verifier <strong>${item.verifierScore ?? item.score}</strong></span>` : ''}<span class="role-score">Evidence <strong>${item.isolated ? 'Isolated replay' : 'Terminal runs'}</strong></span>${rawMetric}</div>${item.rawMetricIsProxy?`<div class="evaluation-feedback"><strong>Metric provenance:</strong> ${esc(item.rawMetricProxyExplanation)}</div>`:''}<div class="evaluation-feedback"><strong>${esc(item.feedbackTarget || 'generator')} feedback:</strong> ${esc(item.feedback)}</div>` : '<div class="evaluation-feedback"><strong>Pending:</strong> This exact prompt pair and loop contract has no eligible terminal evidence under its frozen aggregation window yet.</div>'}</div><div class="evaluation-actions">${isActive ? '' : `<button type="button" class="btn-small" data-action="activateEvaluatedVersion" data-evaluation-id="${esc(item.id)}" ${dirty ? 'disabled' : ''}>Use this version</button>`}<button type="button" class="btn-small" data-action="comparePromptVersion" data-role="generator" data-version="${item.generatorVersion}">Compare generator</button></div></article>`;
      }).join('')}`;
      const versionCards = (versions, role, currentVersion, draftPrompt) => versions.length ? `<div class="version-list">${versions.map(item => `<article class="version-card"><div class="version-head"><span class="version-number">Version ${item.version}</span><span class="origin-label ${item.source === 'auto' ? 'auto' : ''}">${item.source === 'auto' ? 'Auto-generated' : 'User-created'}</span>${item.version === currentVersion ? '<span class="version-current">Current</span>' : ''}${item.score != null ? `<span class="best-label">${item.score}/100</span>` : '<span class="origin-label">Pending score</span>'}<span class="version-date">${esc(dateTime(item.createdAt))}</span></div><div class="version-note">${esc(item.note)}</div><div class="version-actions"><button type="button" class="btn-small" data-action="comparePromptVersion" data-role="${role}" data-version="${item.version}">Compare</button>${item.prompt !== draftPrompt ? `<button type="button" class="btn-small" data-action="restorePromptVersion" data-role="${role}" data-version="${item.version}">Restore as draft</button>` : ''}</div></article>`).join('')}</div>` : `<div class="notice">No saved ${role} prompt versions yet.</div>`;
      return `<div class="auto-improve-stack"><section class="auto-improve-hero"><div><div class="auto-improve-agent"><span class="evaluator-avatar" aria-hidden="true">E</span><div><div class="auto-improve-title">Independent evaluator</div><div class="auto-improve-copy">A separate agent scores each generator${wf.reviewLoop.enabled ? '/verifier pair' : ' version'} from 0–100 using run artifacts, not private reasoning. It attributes lost points to the generator, verifier, or their interaction before proposing one bounded prompt experiment.</div></div></div><div class="metric-strip"><div><div class="metric-label">Scoring contract</div><div class="metric-name">${esc(auto.metricName)}</div><div class="metric-description">${esc(auto.metricDescription)}</div></div><span class="metric-kind ${auto.metricType === 'concrete' ? 'concrete' : ''}">${esc(metricKind)}</span></div></div><div class="auto-improve-actions"><button type="button" class="btn-primary" data-action="startAutoImprove" ${canImprove ? '' : 'disabled'}>${auto.status === 'running' ? 'Improving…' : 'Improve prompts'}</button><div class="auto-improve-hint">${esc(improveHint)}</div></div></section>${auto.status === 'running' ? `<section class="auto-improve-running" aria-live="polite"><div class="auto-improve-running-head"><span>Isolated replay in progress</span><span class="runner-pulse" aria-hidden="true"></span></div><div class="auto-improve-steps"><div class="auto-improve-step"><strong>1 · Propose</strong>Evaluator feedback is converted into candidate prompt changes.</div><div class="auto-improve-step"><strong>2 · Replay</strong>Candidates run against read-only copies of prior tasks.</div><div class="auto-improve-step"><strong>3 · Score</strong>The independent evaluator applies the same metric contract.</div></div></section>` : ''}<section class="score-chart-card"><div class="score-chart-head"><div><div class="score-chart-title">Evaluator score over time</div><div class="score-chart-copy">Each point is a tested prompt pair. Higher is better; the best scored pair is active unless you choose another.</div></div><button type="button" class="btn-small" data-action="useBestEvaluatedVersion" ${best && (!auto.autoSelectBest || active?.id !== best.id) && !dirty ? '' : 'disabled'}>${auto.autoSelectBest ? 'Best selected automatically' : 'Resume best automatically'}</button></div>${renderScoreChart(auto.evaluations,auto.activeEvaluationId)}<div class="score-chart-legend"><span><i class="legend-dot"></i>Evaluated version</span><span><i class="legend-dot active"></i>Active version</span><span>${best ? `Best score ${best.score}/100` : 'No score yet'}</span></div></section><section><div class="history-section-title"><span class="loop-role-badge" style="background:var(--blue-soft);color:#cad6ff">Scores</span>Evaluated prompt pairs</div><div class="evaluation-list">${evaluationCards || '<div class="notice">No evaluated versions yet.</div>'}</div></section><details class="evaluator-settings"><summary>Evaluator settings · prompt v${auto.evaluatorPromptVersion}</summary><div class="evaluator-settings-body"><div class="form-grid" style="margin-top:12px"><div class="form-group"><label for="metricMode">Metric selection</label><select class="field" id="metricMode" data-editor-path="autoImprove.metricMode"><option value="auto" ${auto.metricMode === 'auto' ? 'selected' : ''}>Automatic · prefer a concrete metric</option><option value="concrete" ${auto.metricMode === 'concrete' ? 'selected' : ''}>Concrete metric</option><option value="rubric" ${auto.metricMode === 'rubric' ? 'selected' : ''}>Evaluator rubric</option></select></div><div class="form-group"><label for="metricName">Metric or rubric name</label><input class="field" id="metricName" data-editor-path="autoImprove.metricName" value="${esc(auto.metricName)}"></div><div class="form-group full"><label for="metricDescription">Scoring definition</label><textarea class="textarea" id="metricDescription" data-editor-path="autoImprove.metricDescription">${esc(auto.metricDescription)}</textarea></div><div class="form-group full"><label for="evaluatorPrompt">Independent evaluator prompt</label><textarea class="textarea mono" id="evaluatorPrompt" data-editor-path="autoImprove.evaluatorPrompt" style="min-height:190px">${esc(auto.evaluatorPrompt)}</textarea><div class="field-help">The evaluator receives isolated replay artifacts and structured history, never the generator or verifier's private reasoning.</div></div></div></div></details><details class="evaluator-settings"><summary>Prompt archives · ${generatorVersions.length + verifierVersions.length} saved versions</summary><div class="evaluator-settings-body"><div class="prompt-archives" style="margin-top:12px"><section class="prompt-archive"><div class="history-section-title"><span class="loop-role-badge">Writes</span>Generator prompt</div>${versionCards(generatorVersions,'generator',wf.promptVersion,wf.prompt)}</section><section class="prompt-archive"><div class="history-section-title"><span class="loop-role-badge" style="background:var(--purple-soft);color:#d2c3ff">Judges</span>Independent verifier prompt</div>${versionCards(verifierVersions,'verifier',wf.reviewLoop?.verifierPromptVersion,wf.reviewLoop?.verifierPrompt)}</section></div></div></details><div class="notice">Auto-improve never reuses the original working tree. It replays preserved inputs in isolated copies, logs every candidate, and promotes only the highest comparable score. Manual selection pauses automatic best-version activation until you resume it.</div></div>`;

    function setNested(object, path, value) {
      const parts = path.split('.');
      let cursor = object;
      parts.slice(0,-1).forEach(part => { if (!cursor[part] || typeof cursor[part] !== 'object') cursor[part] = {}; cursor = cursor[part]; });
      cursor[parts[parts.length - 1]] = value;
    }

    function addRuleToSection(prompt, section, line) {
      const header = `${section}:`;
      const lines = prompt.trim().split('\n');
      let index = lines.findIndex(item => item.trim() === header);
      if (index < 0) return `${prompt.trim()}\n\n${header}\n${line}`;
      let end = lines.length;
      for (let i = index + 1; i < lines.length; i++) {
        if (/^[A-Z][A-Za-z ]+:$/.test(lines[i].trim())) { end = i; break; }
      }
      if (lines.slice(index + 1, end).some(item => item.trim().toLowerCase() === line.trim().toLowerCase())) return prompt;
      while (end > index + 1 && !lines[end - 1].trim()) end--;
      lines.splice(end, 0, line);
      return lines.join('\n');
    }

    function verifierTemplate(name) {
      return `You are the independent adversarial verifier for ${name || 'this workflow'}.

Goal:
Decide whether the generator's candidate meets the workflow goal and the standards below. Search for counterexamples, regressions, missing evidence, weak tests, and changes outside scope.

Context boundary:
- You receive the workflow goal, candidate diff, relevant files, check results, and a concise generator summary.
- You do not receive the generator's conversation or private reasoning.
- You are read-only and cannot modify files.

Standards:
1. The candidate fully satisfies the stated goal.
2. Correctness risks and important failure paths are covered.
3. Checks provide relevant evidence, not just a green result.
4. The change is focused and does not alter unrelated behavior.

Verdict contract:
Return exactly one verdict: MEETS_STANDARDS, REQUEST_CHANGES, or BLOCKED.
For REQUEST_CHANGES, cite criterion-level evidence and provide a concise, actionable feedback packet.
For BLOCKED, name the missing evidence, external dependency, or workflow-contract gap. The run ends failed with this report preserved.
For MEETS_STANDARDS, explain why the available evidence is sufficient.`;
    }

    function defaultPromptFromInstruction(instruction, name) {
      const goal = instruction.trim().replace(/\s+/g,' ');
      return `You are the ${name || 'Local Development'} workflow.

Goal:
${goal}

Operating loop:
1. Read the trigger context and relevant files in the current working directory.
2. Choose the smallest useful next step.
3. Make one coherent change.
4. Run the narrowest relevant check.
5. Record what changed, what was learned, and whether another iteration is useful.
6. Continue without an iteration limit until complete, blocked with evidence, or manually stopped.

Completion:
Finish automatically with a concise summary, changed files, exact checks, remaining risk, and the recommended next action. If blocked, end failed with the evidence needed to improve this workflow.

Operating constraints:
- Keep changes scoped to the stated goal.
- Never run destructive git commands.
- When the next step is ambiguous, leave it unchanged and end failed with the ambiguity clearly reported.`;
    }

    function lineDiff(before, after) {
      const a = String(before || '').split('\n');
      const b = String(after || '').split('\n');
      const table = Array.from({length:a.length + 1}, () => Array(b.length + 1).fill(0));
      for (let i = a.length - 1; i >= 0; i--) for (let j = b.length - 1; j >= 0; j--) table[i][j] = a[i] === b[j] ? table[i+1][j+1] + 1 : Math.max(table[i+1][j], table[i][j+1]);
      const result = []; let i = 0; let j = 0;
      while (i < a.length && j < b.length) {
        if (a[i] === b[j]) { result.push({type:'',text:a[i]}); i++; j++; }
        else if (table[i+1][j] >= table[i][j+1]) { result.push({type:'del',text:a[i++]}); }
        else { result.push({type:'add',text:b[j++]}); }
      }
      while (i < a.length) result.push({type:'del',text:a[i++]});
      while (j < b.length) result.push({type:'add',text:b[j++]});
      return result;
    }

    function buildPromptProposal(instruction) {
      const wf = editorState.draft;
      const generation = ++editorState.proposalGeneration;
      let next = wf.prompt.trim() || defaultPromptFromInstruction(instruction, wf.name);
      const lower = instruction.toLowerCase();
      const summary = [];
      const variation = generation % 3;
      if (!wf.prompt.trim()) summary.push({ section:'Goal', text:'Created an initial goal and unlimited operating loop from your description.' });
      if (/small|minimal|scope|style|format/.test(lower)) {
        const rule = variation === 1 ? '- Prefer the smallest patch that fully addresses the issue; do not include style-only edits unless requested.' : variation === 2 ? '- Keep each patch narrowly scoped and exclude unrelated formatting or cleanup.' : '- Make one minimal, reviewable change at a time and leave unrelated code untouched.';
        next = addRuleToSection(next, 'Operating constraints', rule);
        summary.push({ section:'Constraints', text:'Tightened patch scope and excluded unrelated style-only work.' });
      }
      if (/test|check|verify|typecheck|lint/.test(lower)) {
        const rule = variation === 1 ? '7. Run the narrowest relevant check after each change, then broader checks before automatic completion.' : variation === 2 ? '7. Verify locally after every coherent change and report the exact command and result.' : '7. Prefer focused verification first; run the broader suite only after focused checks pass.';
        next = addRuleToSection(next, 'Operating loop', rule);
        summary.push({ section:'Loop', text:'Made focused checks part of every iteration and broader checks part of completion.' });
      }
      if (/summary|summar|report|approval|review|completion/.test(lower)) {
        const rule = variation === 1 ? '- At completion or failure, include cause, changed files, risk, exact checks, and the recommended workflow improvement.' : variation === 2 ? '- Make every terminal summary evidence-complete: intent, diff, verification, risk, and next step.' : '- End with a concise evidence packet covering intent, files, checks, risk, and recommendation.';
        next = addRuleToSection(next, 'Completion', rule);
        summary.push({ section:'Completion', text:'Expanded the terminal summary into an evidence-complete packet.' });
      }
      if (/loop|iteration|progress|stuck|repeat|unlimited/.test(lower)) {
        const rule = variation === 1 ? '8. At the end of each iteration, record what changed, what was learned, and whether another iteration is likely to make progress.' : variation === 2 ? '8. Treat iteration count as history, not a limit; continue until complete or a stopping policy applies.' : '8. After every iteration, log progress and stop when the next iteration is unlikely to help.';
        next = addRuleToSection(next, 'Operating loop', rule);
        summary.push({ section:'Loop', text:'Made iteration progress explicit without introducing an artificial maximum.' });
      }
      if (/auth|security|destructive|permission|protected|sensitive/.test(lower)) {
        const rule = '- Do not change authentication, authorization, secrets, run destructive commands, or modify protected paths unless the workflow goal explicitly authorizes it; otherwise end failed with the blocked boundary reported.';
        next = addRuleToSection(next, 'Operating constraints', rule);
        summary.push({ section:'Constraints', text:'Added an explicit failure boundary around sensitive behavior.' });
      }
      if (!summary.length && wf.prompt.trim()) {
        next = addRuleToSection(next, 'Requested behavior', `- ${instruction.trim().replace(/\s+/g,' ')}`);
        summary.push({ section:'Behavior', text:'Added the requested behavior as an explicit instruction while preserving the existing prompt.' });
      }
      return { generation, instruction, sourcePrompt:wf.prompt, prompt:next, summary, diff:lineDiff(wf.prompt, next), createdAt:Date.now() };
    }

    function openModal(title, body, footer, context = {}) {

      modal.setAttribute('aria-hidden','false');

      setTimeout(() => {

    function toast(title, copy = '', options = {}) {

    async function copyText(label, text) {
      let copied = false;
      try { await navigator.clipboard.writeText(text); copied = true; }
      catch (error) {
        try {
          const area = document.createElement('textarea'); area.value = text; area.style.position = 'fixed'; area.style.opacity = '0'; document.body.appendChild(area); area.select(); copied = document.execCommand('copy'); area.remove();
        } catch (fallbackError) { copied = false; }
      }
      toast(copied ? `${label} copied` : `Could not copy ${label.toLowerCase()}`, copied ? 'Ready to paste.' : 'Select the text in the open panel and copy it manually.', {force:true});
    }

    function mutateRun(id, allowedStatuses, callback) {
      const run = runById(id);
      if (!run || run.archived) { toast('Run is no longer available', 'Refresh the current view.'); return null; }
      if (allowedStatuses && !allowedStatuses.includes(run.status)) { toast('Action is not valid for this run state', `${statusMeta[run.status]?.label || run.status} runs cannot use that action.`); return null; }
      callback(run);
      if (terminalEvidenceStatuses.includes(run.status)) {
        const workflow = workflowById(run.workflowId);
        if (workflow) ensureAutoImprove(workflow, state.runs.filter(item => item.workflowId === workflow.id && !item.archived), {applyBest:!(editorState?.draft?.id===workflow.id)});
      }
      persist();
      renderAll();
      return run;
    }

    function selectRun(id, options = {}) {

    function startWorkflow(workflowId, copiedFromRun = null) {
      const workflow = workflowById(workflowId);
      if (!workflow) return;
      const source = copiedFromRun ? runById(copiedFromRun) : null;
      const startedAt = Date.now();
      const targetRepository = state.currentRepo;
      const targetBranch = state.currentBranch;
      const activeForWorkflow = state.runs.filter(run => run.repository === targetRepository && run.workflowId === workflow.id && isRunActive(run));
      if (activeForWorkflow.length && workflow.scope.overlap === 'skip') {
        selectRun(activeForWorkflow[0].id);
        toast('Workflow is already active', 'The overlap policy skips a duplicate run. The active run is selected.');
        return;
      }
      const alreadyQueued = activeForWorkflow.find(run => run.status === 'queued');
      if (alreadyQueued && workflow.scope.overlap === 'queue') {
        selectRun(alreadyQueued.id);
        toast('A run is already queued', 'The overlap policy keeps a single queued run for this workflow.');
        return;
      }
      const initialStatus = activeForWorkflow.length && workflow.scope.overlap === 'queue' ? 'queued' : 'running';
      const loopConfig = workflow.reviewLoop?.enabled ? workflow.reviewLoop : null;
      const runReviewLoop = loopConfig ? {
        phase:'generating', round:1, maxRounds:Math.max(1,Number(loopConfig.maxRounds||5)), onLimit:normalizeLoopLimit(loopConfig.onLimit),
        generatorPromptVersion:workflow.promptVersion, verifierPromptVersion:loopConfig.verifierPromptVersion,
        rounds:[{round:1,generator:{state:initialStatus === 'queued' ? 'pending' : 'running',summary:initialStatus === 'queued' ? 'Waiting for the active run to finish.' : 'Reading the goal and preparing the first candidate.'},verifier:{state:'pending',verdict:null,summary:'Waiting for the first candidate.',findings:[],feedback:''}}]
      } : null;
      const run = {
        id: uid('run'), workflowId: workflow.id, repository:targetRepository, status:initialStatus, trigger:'manual', branch:targetBranch, commit:'working tree', iteration:1,
        startedAt, activeMs:0, endedAt:null, heartbeatAt:initialStatus === 'running' ? startedAt : null, activityAt:startedAt, stateEnteredAt:startedAt,
        currentActivity:initialStatus === 'queued' ? 'Queued behind the active run' : loopConfig?'Generator · preparing candidate':'Reading working directory context', currentAction: initialStatus === 'queued' ? 'Waiting for the current run to finish under the workflow overlap policy.' : source ? `Starting a new run using the outcome of ${source.id} as context.` : loopConfig?'The generator is loading its pinned prompt and inspecting the current working directory before producing round 1.':'Loading the workflow prompt and inspecting the active working directory.',
        currentCommand:'git status --short', currentFile:'', changes:{add:0,del:0,state:'draft'}, checkStatus:'not_run', risk:'Low', promptVersion:workflow.promptVersion, archived:false,
        reviewLoop:runReviewLoop,
        summarySteps:[source ? `Started a new run from the completed context of ${source.id}.` : `Started ${workflow.name} manually in the active working directory.`, loopConfig?`Pinned Generator v${workflow.promptVersion} and independent Verifier v${loopConfig.verifierPromptVersion} for this run.`:`Pinned workflow prompt version ${workflow.promptVersion} for this run.`],
        files:[], checks:[{id:'checks',name:'Checks',status:'not_run',output:'No checks have run yet.',duration:'—'}],
        notes: source ? [note(0,`New run created from ${source.id}. Previous run remains unchanged.`,'Workbench')] : [],
        events:[{at:startedAt,text:initialStatus === 'queued' ? 'Manual run queued behind the active workflow run.' : 'Manual run started in the active working directory.',type:'start'},...(loopConfig && initialStatus === 'running'?[{at:startedAt,text:'Generator · Round 1 started with an independent verifier waiting for the candidate.',type:'progress'}]:[])],
        iterations:[{iteration:1,title:initialStatus === 'queued' ? 'Waiting to start' : 'Working directory context',summary:initialStatus === 'queued' ? 'Queued by the workflow overlap policy.' : 'Reading the goal and relevant files in the active working directory.',state:initialStatus,duration:'0s'}]
      };
      state.runs.unshift(run);
      state.selectedRunId = run.id; state.selectedWorkflowId = workflow.id; state.activeTab = 'summary';
      renderAll();
      closeModal();
      toast(initialStatus === 'queued' ? 'Manual run queued' : 'Manual run started', initialStatus === 'queued' ? `${workflow.name} will start after the active run finishes.` : workflow.enabled ? `${workflow.name} is running in the active working directory.` : `${workflow.name} is disabled for automatic triggers, but manual runs are allowed.`);
    }

    function requestStopRun(id) {
      const run = runById(id);
      if (!isRunActive(run)) return;
      if (!state.settings.confirmDestructive) return executeStopRun(id);
      openModal('Stop this run?', `<p class="muted">The agent will stop after the current operation. Draft files, logs, notes, and iteration ${run.iteration} will remain available, and you can resume later.</p><div class="notice">Stopping does not discard the worktree or end the workflow permanently.</div>`, `<button type="button" data-action="closeModal">Keep running</button><button type="button" class="btn-danger" data-action="confirmStopRun" data-id="${esc(id)}">Stop and preserve work</button>`, { kind:'stop-run', runId:id });
    }

    function executeStopRun(id) {
      mutateRun(id, [...activeRunStatuses], run => {
        const now = Date.now();
        run.activeMs = runtimeMs(run, now); run.status = 'stopped'; run.endedAt = now; run.stateEnteredAt = now; run.heartbeatAt = null; run.activityAt = now;
        run.currentActivity = 'Stopped manually'; run.currentAction = 'Draft files, logs, and the current iteration were preserved.';
        if (run.checkStatus === 'running') {
          run.checkStatus = 'stale';
          run.checks.forEach(check => { if (check.status === 'running') { check.status = 'stale'; check.output = 'Stopped before this check completed.'; } });
        }
        run.events.push({at:now,text:`Stopped manually during iteration ${run.iteration}; artifacts preserved.`,type:'state'});
        const current = run.iterations.find(item => item.iteration === run.iteration); if (current) current.state = 'stopped';
        if (state.followingRunId === run.id) state.followingRunId = null;
        state.view = 'all';
      });
      closeModal(); toast('Run stopped', 'All draft work was preserved.');
    }

    function resumeRun(id) {
      mutateRun(id, ['stopped'], run => {
        const now = Date.now();
        run.status='running'; run.endedAt=null; run.stateEnteredAt=now; run.heartbeatAt=now; run.activityAt=now; run.currentActivity=`Resuming iteration ${run.iteration}`; run.currentAction='Reloading the preserved worktree and continuing from the last checkpoint.';
        if(run.reviewLoop){run.currentActivity=`${run.reviewLoop.phase==='verifying'?'Verifier':'Generator'} · resuming round ${run.reviewLoop.round}`;run.currentAction='Reloading the preserved candidate, feedback, and isolated agent phase without changing run filters.';}
        run.events.push({at:now,text:`Resumed preserved state for iteration ${run.iteration}.`,type:'state'});
        const current = run.iterations.find(item => item.iteration === run.iteration); if (current) current.state='running';
      });
      toast('Run resumed', `Continuing iteration ${runById(id)?.iteration}.`);
    }

    function requestArchiveRun(id) {

    function syncResearchFields(target, source) {
      if (!target || !source) return;
      target.prompt = source.prompt;
      target.promptVersion = source.promptVersion;
      target.promptUpdatedAt = source.promptUpdatedAt;
      target.promptVersions = deepClone(source.promptVersions || []);
      target.reviewLoop = target.reviewLoop || defaultReviewLoop();
      target.reviewLoop.enabled = Boolean(source.reviewLoop?.enabled);
      target.reviewLoop.maxRounds = Math.max(1,Number(source.reviewLoop?.maxRounds || 5));
      target.reviewLoop.onLimit = normalizeLoopLimit(source.reviewLoop?.onLimit);
      target.reviewLoop.verifierPrompt = source.reviewLoop?.verifierPrompt || '';
      target.reviewLoop.verifierPromptVersion = Number(source.reviewLoop?.verifierPromptVersion || 0);
      target.reviewLoop.verifierPromptUpdatedAt = source.reviewLoop?.verifierPromptUpdatedAt || null;
      target.reviewLoop.verifierPromptVersions = deepClone(source.reviewLoop?.verifierPromptVersions || []);
      target.autoImprove = deepClone(source.autoImprove);

    function activateEvaluatedVersion(evaluationId, manual = true) {
      if (!editorState || editorIsDirty()) { toast('Save or discard edits first','Version selection changes the active saved prompt pair.'); return; }
      const workflow = workflowById(editorState.draft.id); if (!workflow) return;
      const auto = ensureAutoImprove(workflow,state.runs.filter(run=>run.workflowId===workflow.id&&!run.archived));
      const evaluation = auto.evaluations.find(item=>item.id===evaluationId); if (!evaluation) return;
      if (!applyEvaluationVersion(workflow,evaluation)) { toast('Version cannot be activated','Its saved generator or verifier prompt version is no longer available.'); return; }
      auto.activeEvaluationId = evaluation.id; auto.autoSelectBest = !manual;
      persist(); syncResearchFields(editorState.original,workflow); syncResearchFields(editorState.draft,workflow); renderWorkflowEditor();
      toast(manual?'Version selected':'Best version restored',`${manual?'Manual selection':'Automatic best selection'} is now using Generator v${evaluation.generatorVersion}${evaluation.verifierVersion?` and Verifier v${evaluation.verifierVersion}`:''}.`);
    }

    function useBestEvaluatedVersion() {

      const best = auto?.evaluations?.filter(item=>item.status==='scored'&&Number.isFinite(Number(item.score))).slice().sort((a,b)=>b.score-a.score||b.createdAt-a.createdAt)[0];
      if (best) activateEvaluatedVersion(best.id,false);

    function createPendingEvaluation(workflow, source = 'human') {
      const runs=state.runs.filter(run=>run.workflowId===workflow.id&&!run.archived);
      const auto=ensureAutoImprove(workflow,runs);const candidate=newEvaluation(workflow,auto,source);
      let evaluation=auto.evaluations.find(item=>evaluationIdentity(item)===evaluationIdentity(candidate));
      if(!evaluation){evaluation=candidate;auto.evaluations.push(evaluation);}
      applyEvaluationScore(evaluation,evaluationEvidence(evaluation,runs));
      auto.activeEvaluationId=evaluation.id;auto.autoSelectBest=false;
      return evaluation;
    }

    function startAutoImprove() {

      if (editorIsDirty()) { toast('Save or discard edits first','Auto-improve starts from a stable saved prompt pair.'); return; }
      const workflow=workflowById(editorState.draft.id);if(!workflow)return;
      const workflowRuns=state.runs.filter(run=>run.workflowId===workflow.id&&!run.archived);
      const terminalRuns=workflowRuns.filter(run=>terminalEvidenceStatuses.includes(run.status));
      const runs=matchingTerminalRunsForCurrentVersion(workflow,terminalRuns);
      const auto=ensureAutoImprove(workflow,workflowRuns);if(auto.status==='running')return;
      const evidence=limitEvidenceByAggregation(runs.map(runEvidenceDescriptor),auto.metricAggregationWindow);

        state.currentRepo=target.value;state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[target.value]||'main';state.view=state.settings.defaultView;state.workflowFilter=null;state.triggerFilter='all';state.runSearch='';state.activeTab='summary';renderAll();return;
      }
      if(target.dataset.action==='changeDirectory'){state.currentRepo=target.value;state.activeCharacterId=state.characters.find(character=>character.workspaceId===target.value)?.id||state.activeCharacterId;state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[target.value]||'main';state.workflowFilter=null;state.view=state.settings.defaultView;state.triggerFilter='all';state.runSearch='';state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeTriggerFilter'){state.triggerFilter=target.value;state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeRunStatusFilter'){state.view=target.value;state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeWorkflowSort'){state.workflowSort=target.value;renderWorkflows();persist();return;}
      if(target.dataset.action==='changeSort'){state.sort=target.value;renderAll();return;}
      if(target.dataset.action==='toggleWorkflow'){
        const workflow=workflowById(target.dataset.id);if(!workflow)return;workflow.enabled=target.checked;persist();renderWorkflows();toast(workflow.enabled?'Workflow enabled':'Workflow disabled',workflow.enabled?'Automatic triggers can start future runs.':'Manual Run now remains available.');return;
      }
      if(editorState&&target.dataset.editorPath){
        const path=target.dataset.editorPath;
        const value=target.type==='checkbox'?target.checked:target.type==='number'?Number(target.value):target.value;
        if(path==='trigger.type'){switchTriggerType(value);return;}
        setNested(editorState.draft,path,value);
        if(path.startsWith('trigger.'))rememberCurrentTriggerDraft();
        if(path==='scope.overlap'){
          editorState.overlapBeforeLineDispatch=value;editorState.draft.scope.standardOverlap=value;
        }
        if(path==='reviewLoop.enabled'){
          ensureAutoImprove(editorState.draft,state.runs.filter(run=>run.workflowId===editorState.draft.id&&!run.archived));
          renderWorkflowEditor();
        }else if(path==='autoImprove.metricMode'){
          const metric=defaultEvaluationMetric(editorState.draft);editorState.draft.autoImprove.metricType=value==='auto'?metric.type:value;renderWorkflowEditor();
        }
        else if(path.startsWith('trigger.')&&['schedule','file_watch'].includes(editorState.draft.trigger.type))renderWorkflowEditor();
        else if(['autoImprove.metricDirection','autoImprove.metricTarget','autoImprove.metricUnacceptable'].includes(path))renderWorkflowEditor();
        else renderEditorFooter();
      }
    });

    document.addEventListener('input',event=>{
      const target=event.target;
      if(target.id==='workflowSearch'){state.workflowSearch=target.value;renderWorkflows();persist();return;}
      if(target.id==='runSearch'){state.runSearch=target.value;ensureSelection();renderRuns();renderActiveFilters();renderDetail();persist();return;}
      if(!editorState)return;
      if(target.id==='workflowInstruction'){editorState.instruction=target.value;return;}
      if(target.id==='promptSource'){
        editorState.draft.prompt=target.value;editorState.revisionNote='Direct prompt edit';renderEditorFooter();return;
      }
      if(target.dataset.editorPath){let value=target.type==='number'?Number(target.value):target.value;setNested(editorState.draft,target.dataset.editorPath,value);if(target.dataset.editorPath.startsWith('trigger.'))rememberCurrentTriggerDraft();if(target.dataset.editorPath==='name')editorState.errors.name='';if(target.dataset.editorPath.startsWith('reviewLoop.'))editorState.errors.reviewLoop='';if(target.dataset.editorPath.startsWith('autoImprove.metric'))editorState.errors.metric='';renderEditorFooter();}
    });

    function trapFocus(event,container) {
      const nodes=[...container.querySelectorAll('button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex="0"]')].filter(node=>node.offsetParent!==null);
      if(!nodes.length)return;
      const first=nodes[0],last=nodes[nodes.length-1];
      if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus();}
      else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus();}
    }

    document.addEventListener('keydown',event=>{
      const modalOpen=byId('modal').classList.contains('open');const drawerOpen=byId('workflowDrawer').classList.contains('open');
      if(event.key==='Tab'&&modalOpen)return trapFocus(event,byId('modal'));
      if(event.key==='Tab'&&drawerOpen)return trapFocus(event,byId('workflowDrawer'));
      if(event.key==='Escape'){
        if(modalOpen){event.preventDefault();closeModal();return;}
        if(drawerOpen){event.preventDefault();requestCloseWorkflow();return;}
        if(byId('sidebar').classList.contains('open')){event.preventDefault();toggleSidebar();return;}
        if(state.workflowFilter||state.triggerFilter!=='all'||state.runSearch){event.preventDefault();state.workflowFilter=null;state.triggerFilter='all';state.runSearch='';renderAll();return;}
      }
      const focusedTab=event.target.closest?.('[role="tab"]');
      if(focusedTab&&['ArrowLeft','ArrowRight','Home','End'].includes(event.key)){
        const tabs=[...focusedTab.closest('[role="tablist"]').querySelectorAll('[role="tab"]')];let index=tabs.indexOf(focusedTab);event.preventDefault();
        index=event.key==='Home'?0:event.key==='End'?tabs.length-1:(index+(event.key==='ArrowRight'?1:-1)+tabs.length)%tabs.length;handleAction(tabs[index].dataset.action,tabs[index]);return;
      }
      const actionable=event.target.closest?.('[data-action="selectRun"]');
      if(actionable&&(event.key==='Enter'||event.key===' ')){event.preventDefault();selectRun(actionable.dataset.id,{focusList:true});return;}
      if(actionable&&actionable.matches('tr')&&['ArrowUp','ArrowDown','Home','End'].includes(event.key)){
        const rows=[...byId('runRows').querySelectorAll('[data-action="selectRun"]')];let index=rows.indexOf(actionable);event.preventDefault();index=event.key==='Home'?0:event.key==='End'?rows.length-1:Math.min(rows.length-1,Math.max(0,index+(event.key==='ArrowDown'?1:-1)));selectRun(rows[index].dataset.id,{focusList:true});return;
      }
      if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)||modalOpen||drawerOpen)return;
      if(event.key==='j'||event.key==='k'){
        const runs=visibleRuns();if(!runs.length)return;event.preventDefault();let index=runs.findIndex(run=>run.id===state.selectedRunId);index=event.key==='j'?Math.min(runs.length-1,index+1):Math.max(0,index-1);selectRun(runs[index].id);
      }
    });

    bindRunSplitter();
    let tickCount=0;
    setInterval(()=>{
      const now=Date.now();tickCount++;
      if(tickCount%4===0)state.runs.filter(run=>run.status==='running'&&!run.archived).forEach(run=>run.heartbeatAt=now);
      document.querySelectorAll('[data-runtime]').forEach(node=>{const run=runById(node.dataset.runtime);if(run)node.textContent=durationText(runtimeMs(run,now));});
      document.querySelectorAll('[data-relative]').forEach(node=>{node.textContent=relativeTime(Number(node.dataset.relative),now);});
      document.querySelectorAll('[data-heartbeat]').forEach(node=>{const run=runById(node.dataset.heartbeat);if(run)node.textContent=run.status==='running'?relativeTime(run.heartbeatAt,now):'Not active';});
      if(tickCount%10===0)persist();
    },1000);

    renderAll({skipPersist:true});
  </script>
</body>
</html>
