<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Workbench — Workflow Operations</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --surface-1: #11141b;
      --surface-2: #171b24;
      --surface-3: #1d222d;
      --surface-4: #242b38;
      --line: #2b3240;
      --line-strong: #394354;
      --text: #f2f5f9;
      --text-2: #b8c1ce;
      --text-3: #7f8a9a;
      --blue: #7c9cff;
      --blue-strong: #5d7ff0;
      --blue-soft: #202a4b;
      --green: #57d89a;
      --green-soft: #16382d;
      --amber: #f5bd62;
      --amber-soft: #3b2c17;
      --red: #ff7f8c;
      --red-soft: #411f28;
      --purple: #b69cff;
      --purple-soft: #30264e;
      --cyan: #6bd9e8;
      --shadow: 0 16px 42px rgba(0,0,0,.32);
      --radius: 12px;
      --control-h: 36px;
      --row-h: 54px;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body[data-density="compact"] { --control-h: 32px; --row-h: 46px; font-size: 13px; }
    button, input, select, textarea { font: inherit; }
    button, select, input, textarea { color: var(--text); }
    button {
      min-height: var(--control-h);
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface-2);
      cursor: pointer;
      transition: border-color .14s ease, background .14s ease, transform .14s ease, opacity .14s ease;
    }
    button:hover:not(:disabled) { border-color: #536177; background: var(--surface-3); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid rgba(124,156,255,.42);
      outline-offset: 2px;
    }
    .btn-primary { background: var(--blue-strong); border-color: var(--blue-strong); color: #fff; font-weight: 650; }
    .btn-primary:hover:not(:disabled) { background: #6b8df8; border-color: #6b8df8; }
    .btn-danger { color: #ffd9dd; background: var(--red-soft); border-color: #713342; }
    .btn-success { color: #d9ffed; background: var(--green-soft); border-color: #28634d; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface-3); border-color: var(--line); color: var(--text); }
    .btn-small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .icon-btn { width: var(--control-h); padding: 0; display: inline-grid; place-items: center; font-size: 18px; }
    .link-btn { border: 0; min-height: auto; padding: 0; background: transparent; color: var(--blue); }
    .link-btn:hover:not(:disabled) { border: 0; background: transparent; color: #a8bbff; }
    .muted { color: var(--text-2); }
    .subtle { color: var(--text-3); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .nowrap { white-space: nowrap; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .app-header {
      height: 64px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,20,27,.96);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 215px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 9px;
      display: grid; place-items: center;
      background: var(--blue); color: #0e1424; font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
    }
    .brand-title { font-size: 15px; font-weight: 750; letter-spacing: -.01em; }
    .brand-sub { font-size: 11px; color: var(--text-3); margin-top: -2px; }
    .header-context { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .context-select, .toolbar-control {
      height: var(--control-h);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 0 32px 0 10px;
    }
    .branch-chip, .health-chip, .quiet-chip {
      height: var(--control-h); display: inline-flex; align-items: center; gap: 7px;
      padding: 0 10px; border: 1px solid var(--line); border-radius: 8px;
      color: var(--text-2); background: var(--surface-1); white-space: nowrap;
    }
    .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(87,216,154,.1); }
    .header-spacer { flex: 1; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .mobile-menu { display: none; }

    .shell { display: grid; grid-template-columns: 280px minmax(0,1fr); min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface-1);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 100vh;
      overflow-y: auto;
    }
    .mobile-sidebar-context { display: none; }
    .sidebar-head { display: flex; align-items: center; justify-content: space-between; padding: 0 6px 8px; }
    .sidebar-title { color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; font-weight: 750; }
    .view-list { display: grid; gap: 3px; }
    .view-button {
      width: 100%; border-color: transparent; background: transparent; display: flex; align-items: center;
      justify-content: space-between; color: var(--text-2); text-align: left; padding: 0 10px;
    }
    .view-button:hover { background: var(--surface-2); border-color: transparent; }
    .view-button.active { background: var(--blue-soft); border-color: #3c4d82; color: #e9efff; }
    .view-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .view-icon { width: 10px; height: 10px; border-radius: 50%; background: var(--text-3); flex: none; }
    .view-icon.review { background: var(--amber); }
    .view-icon.failed { background: var(--red); }
    .view-icon.running { background: var(--blue); }
    .view-icon.completed { background: var(--green); }
    .count-badge { min-width: 24px; padding: 1px 7px; text-align: center; border-radius: 99px; background: var(--surface-3); color: var(--text-2); font-size: 11px; }
    .view-button.active .count-badge { background: #364675; color: #fff; }
    .workflow-search-wrap { position: relative; margin-bottom: 8px; }
    .workflow-search, .run-search {
      width: 100%; height: var(--control-h); border: 1px solid var(--line); border-radius: 8px;
      background: var(--surface-2); padding: 0 10px; outline: 0;
    }
    .workflow-list { display: grid; gap: 3px; }
    .workflow-item {
      display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 8px;
      border: 1px solid transparent; border-radius: 7px; padding: 3px 6px 3px 8px;
    }
    .workflow-item:hover { background: var(--surface-2); }
    .workflow-item.active { background: var(--surface-2); border-color: var(--line-strong); }
    .workflow-select { min-height: auto; border: 0; background: transparent; padding: 0; text-align: left; min-width: 0; }
    .workflow-select:hover:not(:disabled) { background: transparent; border: 0; }
    .workflow-name { display: block; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 650; }
    .workflow-controls { display: flex; align-items: center; gap: 4px; }
    .workflow-controls .mini-icon { min-height: 24px; width: 24px; }
    .mini-icon { min-height: 28px; width: 28px; padding: 0; border-color: transparent; background: transparent; color: var(--text-3); }
    .mini-icon:hover:not(:disabled) { background: var(--surface-3); color: var(--text); }
    .new-workflow-icon { color: var(--blue); background: var(--blue-soft); }
    .new-workflow-icon:hover:not(:disabled) { color: #fff; background: var(--blue-strong); }
    .workflow-run-control { color: var(--green); background: var(--green-soft); }
    .workflow-run-control:hover:not(:disabled) { color: #d9ffea; background: #1c513d; }
    .workflow-run-control.btn-danger { color: #ffb5bd; background: var(--red-soft); border-color: #723441; }
    .workflow-run-control.btn-danger:hover:not(:disabled) { color: #ffe1e5; background: #5a2732; }
    .workflow-order { height: 26px; max-width: 104px; padding-inline: 7px; font-size: 11px; }
    .switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
    .switch input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-track { width: 32px; height: 18px; border-radius: 99px; background: #3a4352; position: relative; transition: background .15s; }
    .switch-track::after { content: ""; width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 3px; top: 3px; background: #cad1dc; transition: transform .15s; }
    .switch input:checked + .switch-track { background: var(--blue-strong); }
    .switch input:checked + .switch-track::after { transform: translateX(14px); background: #fff; }
    .switch input:focus-visible + .switch-track { outline: 3px solid rgba(124,156,255,.42); outline-offset: 2px; }
    .sidebar-foot { margin-top: auto; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #0e1117; }
    .directory-picker { display: flex; align-items: center; gap: 6px; }
    .directory-picker select { min-width: 0; flex: 1; height: 30px; font-size: 11px; }

    .main { min-width: 0; padding: 18px; }
    .pause-banner {
      display: none; margin-bottom: 14px; align-items: center; gap: 12px; padding: 11px 13px;
      border: 1px solid #75582a; border-radius: 10px; background: var(--amber-soft); color: #ffe8bd;
    }
    .pause-banner.visible { display: flex; }
    .pause-banner strong { margin-right: 3px; }
    .pause-banner .banner-spacer { flex: 1; }
    .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface-1); box-shadow: 0 1px 0 rgba(255,255,255,.02); }
    .run-split { display: flex; flex-direction: column; height: calc(100vh - 36px); min-height: 600px; }
    .runs-card { overflow: hidden; flex: 0 0 var(--runs-pane-height, 42%); min-height: 0; display: flex; flex-direction: column; }
    .section-header { min-height: 58px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); }
    .section-heading { min-width: 130px; }
    .section-heading h1, .section-heading h2 { margin: 0; font-size: 16px; letter-spacing: -.01em; }
    .section-kicker { color: var(--text-3); font-size: 11px; margin-top: 2px; }
    .toolbar { flex: 1; min-width: 0; display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
    .search-wrap { width: min(260px, 30vw); }
    .active-filter-bar { display: none; padding: 9px 14px; border-bottom: 1px solid var(--line); background: #10141d; align-items: center; gap: 7px; flex-wrap: wrap; }
    .active-filter-bar.visible { display: flex; }
    .filter-chip { min-height: 27px; display: inline-flex; align-items: center; gap: 6px; padding: 0 7px 0 9px; border: 1px solid #3d4e7f; border-radius: 99px; background: var(--blue-soft); color: #dce5ff; font-size: 11px; }
    .filter-chip button { min-height: 20px; width: 20px; padding: 0; border: 0; background: transparent; color: #9fb2ee; }
    .table-wrap { flex: 1; min-height: 0; max-height: none; overflow: auto; }
    .run-table { width: 100%; min-width: 920px; border-collapse: collapse; table-layout: fixed; }
    .run-table col:nth-child(1) { width: 116px; }
    .run-table col:nth-child(2) { width: 190px; }
    .run-table col:nth-child(3) { width: 145px; }
    .run-table col:nth-child(4) { width: 86px; }
    .run-table col:nth-child(6) { width: 96px; }
    .run-table th { height: 36px; position: sticky; top: 0; z-index: 2; background: var(--surface-2); color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: .065em; text-align: left; padding: 0 12px; border-bottom: 1px solid var(--line); }
    .run-table td { height: var(--row-h); padding: 8px 12px; border-bottom: 1px solid #222834; vertical-align: middle; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; }
    .run-table tbody tr { cursor: pointer; outline: 0; }
    .run-table tbody tr:hover { background: #151a23; }
    .run-table tbody tr.selected { background: #192139; box-shadow: inset 3px 0 0 var(--blue); }
    .run-table tbody tr.selected td { color: #dfe7f5; }
    .run-table tbody tr:last-child td { border-bottom: 0; }
    .run-main { color: var(--text); font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-sub { color: var(--text-3); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status {
      display: inline-flex; align-items: center; gap: 6px; min-height: 25px; padding: 0 8px;
      border: 1px solid var(--line); border-radius: 99px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .status.running { color: #b7c8ff; background: var(--blue-soft); border-color: #40558f; }
    .status.review { color: #ffd891; background: var(--amber-soft); border-color: #73562b; }
    .status.failed { color: #ffb5bd; background: var(--red-soft); border-color: #723441; }
    .status.stopped { color: #c9c3db; background: #282532; border-color: #494354; }
    .status.completed { color: #a8f0cd; background: var(--green-soft); border-color: #29634d; }
    .status.rejected { color: #e0bac0; background: #322229; border-color: #5d3943; }
    .status.applying, .status.queued { color: #d4c3ff; background: var(--purple-soft); border-color: #584784; }
    .check-label { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 650; white-space: nowrap; }
    .check-label::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
    .check-label.passed { color: var(--green); }
    .check-label.passed::before { background: var(--green); }
    .check-label.failed { color: var(--red); }
    .check-label.failed::before { background: var(--red); }
    .check-label.running { color: var(--blue); }
    .check-label.running::before { background: var(--blue); }
    .check-label.stale { color: var(--amber); }
    .check-label.stale::before { background: var(--amber); }
    .changes-inline { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
    .diff-count { color: var(--text-2); font-size: 11px; }
    .plus { color: var(--green); }
    .minus { color: var(--red); }
    .mobile-run-list { display: none; }
    .empty-state { padding: 46px 20px; text-align: center; color: var(--text-2); }
    .empty-state strong { display: block; color: var(--text); font-size: 15px; margin-bottom: 5px; }

    .run-resize-handle { height: 16px; flex: 0 0 16px; display: grid; place-items: center; cursor: row-resize; touch-action: none; }
    .run-resize-handle::before { content: ""; width: 42px; height: 4px; border-radius: 99px; background: var(--line-strong); transition: background .15s, width .15s; }
    .run-resize-handle:hover::before, .run-resize-handle:focus-visible::before, .run-resize-handle.dragging::before { width: 62px; background: var(--blue); }
    .run-resize-handle:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
    .detail-card { margin-top: 0; overflow: auto; min-height: 0; flex: 1 1 0; }
    .detail-top {
      min-height: 76px; padding: 14px 16px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--line); background: #10131a;
    }
    .detail-identity { min-width: 0; flex: 1; }
    .detail-title-row { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .detail-title-row h2 { margin: 0; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-meta { color: var(--text-3); font-size: 12px; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px 12px; }
    .detail-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .detail-tabs { height: 44px; padding: 0 14px; display: flex; align-items: end; gap: 2px; border-bottom: 1px solid var(--line); overflow-x: auto; }
    .tab-button { min-height: 43px; border: 0; border-radius: 0; background: transparent; color: var(--text-3); padding: 0 13px; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab-button:hover:not(:disabled) { border-color: transparent; border-bottom-color: #4b566a; background: transparent; color: var(--text); }
    .tab-button.active { color: #e9eeff; border-bottom-color: var(--blue); }
    .detail-body { padding: 16px; }
    .detail-grid { display: grid; grid-template-columns: minmax(0,1.25fr) minmax(300px,.75fr); gap: 14px; align-items: start; }
    .panel { border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2); overflow: hidden; }
    .panel + .panel { margin-top: 12px; }
    .panel-head { min-height: 43px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); color: var(--text); font-weight: 650; }
    .panel-head-meta { color: var(--text-3); font-size: 11px; font-weight: 500; }
    .panel-body { padding: 13px; }
    .summary-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .summary-list li { display: grid; grid-template-columns: 22px minmax(0,1fr); gap: 8px; color: var(--text-2); }
    .step-icon { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; margin-top: 1px; background: var(--green-soft); color: var(--green); font-size: 11px; font-weight: 800; }
    .step-icon.current { background: var(--blue-soft); color: var(--blue); }
    .metric-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .metric { min-height: 58px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; background: #12161e; }
    .metric-label { color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: .055em; }
    .metric-value { margin-top: 5px; color: var(--text); font-weight: 700; }
    .activity-callout { padding: 12px; border-left: 3px solid var(--blue); border-radius: 7px; background: #151c2c; }
    .activity-callout.review { border-left-color: var(--amber); background: #251f17; }
    .activity-callout.failed { border-left-color: var(--red); background: #25181e; }
    .activity-title { color: var(--text); font-weight: 700; }
    .activity-text { color: var(--text-2); margin-top: 4px; }
    .command { margin-top: 10px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px; background: #090b10; color: #d1d9e6; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; overflow-wrap: anywhere; }
    .inline-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    .notice { padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px; color: var(--text-2); background: #12161e; }
    .notice.warning { background: var(--amber-soft); border-color: #684e28; color: #f7dcaa; }
    .notice.danger { background: var(--red-soft); border-color: #65313d; color: #ffc3ca; }
    .notice.success { background: var(--green-soft); border-color: #285a48; color: #c7f8df; }
    .timeline { position: relative; display: grid; gap: 0; }
    .timeline-item { display: grid; grid-template-columns: 86px 14px minmax(0,1fr); gap: 8px; min-height: 54px; }
    .timeline-time { color: var(--text-3); font-size: 11px; padding-top: 1px; }
    .timeline-marker { position: relative; }
    .timeline-marker::before { content: ""; width: 8px; height: 8px; border: 2px solid var(--blue); border-radius: 50%; background: var(--surface-2); position: absolute; left: 1px; top: 3px; z-index: 1; }
    .timeline-marker::after { content: ""; width: 1px; background: var(--line-strong); position: absolute; left: 6px; top: 15px; bottom: -3px; }
    .timeline-item:last-child .timeline-marker::after { display: none; }
    .timeline-content { color: var(--text-2); padding-bottom: 16px; }
    .timeline-content strong { color: var(--text); }
    .file-list { display: grid; gap: 10px; }
    .file-card { border: 1px solid var(--line); border-radius: 9px; background: #12161e; overflow: hidden; }
    .file-head { min-height: 48px; padding: 8px 11px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .file-name { min-width: 0; font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #dbe3ef; }
    .file-meta { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 11px; flex: none; }
    .file-actions { display: flex; gap: 6px; align-items: center; }
    .decision { display: inline-flex; min-height: 23px; align-items: center; padding: 0 7px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .decision.included, .decision.applied { color: var(--green); background: var(--green-soft); }
    .decision.excluded, .decision.rejected { color: var(--red); background: var(--red-soft); }
    .decision.draft { color: var(--amber); background: var(--amber-soft); }
    .diff { margin: 0; padding: 10px 0; border-top: 1px solid var(--line); background: #090b10; overflow-x: auto; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .diff-line { display: block; padding: 0 12px; min-width: max-content; white-space: pre; }
    .diff-line.add { color: #b9f4d7; background: rgba(45,130,91,.16); }
    .diff-line.del { color: #ffc0c6; background: rgba(160,54,70,.16); }

  <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="false"></div>

  <script>
    'use strict';

    const STORAGE_KEY = 'ai-workbench-redesigned-v1';
    const MS = { sec: 1000, min: 60_000, hour: 3_600_000 };
    const nowSeed = Date.now();
    const deepClone = value => JSON.parse(JSON.stringify(value));
    const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const uid = prefix => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,7)}`;
    const byId = id => document.getElementById(id);

    const prompts = {
      commitReview: `You are the Commit Review workflow.

Goal:
Review each human commit, identify correctness risks, and propose the smallest safe patch.

Operating loop:
1. Read the triggering commit diff and relevant surrounding files.
2. Summarize the intent of the commit before changing anything.
3. Look for bugs, missing tests, type issues, duplicated logic, and risky behavior changes.
4. Make the smallest possible fix only when the issue is clear.
5. Run focused checks first, then broader checks if the focused checks pass.
6. At the end of every iteration, record what changed, what was learned, and whether another iteration is useful.
7. Continue without an iteration limit until complete, blocked, stopped by policy, or waiting for human approval.

Completion:
Stop at human approval with a concise summary, risk callout, changed files, exact checks, and recommended next action.

Safety:
- Never change unrelated formatting or styling.
- Never run destructive git commands.
- Ignore AI-created commits.
- If the fix is ambiguous, explain the choice instead of guessing.`,
      testFixer: `You are the Test Fixer workflow.

Goal:
When local tests fail, reproduce the failure, diagnose the root cause, make a focused patch, and rerun the smallest relevant check.

Operating loop:
1. Capture the failing command, test name, stack trace, and recent related changes.
2. Reproduce the failure before editing code.
3. Identify whether the issue is in the test, production code, mock setup, timers, async behavior, or types.
4. Patch the narrowest responsible area.
5. Rerun the focused test.
6. Continue iterating until the focused failure is resolved, then run the broader suite needed for confidence.

Completion:
Stop for approval with the root cause, patch summary, exact checks, and remaining risk.

Safety:
- Do not mask failures by deleting assertions.
- Do not broaden mocks without explaining why.
- Prefer one focused fix per iteration.
- Ask for help when repeated iterations stop making progress.`,
      cleanup: `You are the Nightly Cleanup workflow.

Goal:
On a schedule, scan for low-risk cleanup opportunities and prepare suggestions without surprising the user.

Operating loop:
1. Scan for stale TODOs, duplicated helpers, deprecated APIs, lint suppressions, and dead exports.
2. Rank candidates by safety and usefulness.
3. Only patch tiny, low-risk items.
4. Run the narrowest relevant checks.
5. Continue until the safe candidate list is exhausted, then stop with a suggestion report.

Safety:
- Suggest only by default.
- No production behavior changes without explicit approval.
- Keep diffs small and easy to reject.`,
      typeFixer: `You are the Type Fixer workflow.

Goal:
Resolve TypeScript and typecheck failures with minimal changes and clear reasoning.

Operating loop:
1. Run typecheck and capture exact errors.
2. Trace each error to the source type, adapter, or call site.
3. Prefer fixing the source contract over spreading casts.
4. Rerun typecheck after each focused change.
5. Continue until typecheck passes or the contract requires a human decision.

Safety:
- No broad rewrites.
- No any-casts unless clearly justified.
- Keep runtime behavior unchanged unless approved.`,
      refactor: `You are the Big Refactor workflow.

Goal:
Run a larger refactor only when manually started, while keeping every iteration inspectable and reversible.

Operating loop:
1. Restate the requested refactor and define the boundary.
2. Create a small plan with checkpoints.
3. Change one coherent slice per iteration.
4. Run focused checks after each slice.
5. Summarize progress and pause for approval before expanding scope.

Safety:
- Manual runs only.
- Never auto-apply.
- Preserve behavior unless the user explicitly requests a behavior change.
- Checkpoint after each iteration.`
    };

    function version(version, prompt, note, ageMinutes) {
      return { version, prompt, note, createdAt: nowSeed - ageMinutes * MS.min };
    }

    const seedWorkflows = [
      {
        id: 'commit-review', name: 'Commit Review', description: 'Review each human commit, run checks, and propose the smallest safe fix.', enabled: true,
        prompt: prompts.commitReview, promptVersion: 4, promptUpdatedAt: nowSeed - 44 * MS.min,
        promptVersions: [
          version(4, prompts.commitReview, 'Record progress each iteration and remove any iteration ceiling.', 44),
          version(3, prompts.commitReview.replace('6. At the end of every iteration, record what changed, what was learned, and whether another iteration is useful.\n7. Continue without an iteration limit until complete, blocked, stopped by policy, or waiting for human approval.\n', ''), 'Make patches smaller and report exact checks.', 2_880),
          version(2, prompts.commitReview.replace('- Ignore AI-created commits.\n', ''), 'Ignore commits produced by automated agents.', 10_080)
        ],
        trigger: { type: 'post_commit', branchPattern: 'main, feature/*', authors: 'human', hookBehavior: 'after_each_commit', debounceSeconds: 10 },
        scope: { repository: 'my-app', overlap: 'queue' },
        safety: { approval: 'always', destructive: 'ask', protectedPaths: '.env*\nsrc/auth/permissions/**', stallMinutes: 20, onStall: 'pause' }
      },
      {
        id: 'test-fixer', name: 'Test Fixer', description: 'Reproduce local test failures, diagnose the cause, patch narrowly, and rerun focused checks.', enabled: true,
        prompt: prompts.testFixer, promptVersion: 3, promptUpdatedAt: nowSeed - 1_320 * MS.min,
        promptVersions: [version(3, prompts.testFixer, 'Stop and ask after repeated iterations without progress.', 1_320), version(2, prompts.testFixer, 'Prefer focused tests before the full suite.', 8_640)],
        trigger: { type: 'test_failure', branchPattern: 'current branch', testCommand: 'npm test', eventSource: 'local test wrapper', cooldownSeconds: 30 },
        scope: { repository: 'my-app', overlap: 'skip' },
        safety: { approval: 'always', destructive: 'ask', protectedPaths: 'e2e/fixtures/**', stallMinutes: 18, onStall: 'fail' }
      },
      {
        id: 'nightly-cleanup', name: 'Nightly Cleanup', description: 'Scan for small, low-risk cleanup opportunities and prepare a suggestion report.', enabled: true,

      const pauseButton = byId('pauseButton');
      if (pauseButton) { pauseButton.innerHTML = state.automationsPaused ? '<span class="pause-label">Resume automations</span><span class="pause-icon" aria-hidden="true">▶</span>' : '<span class="pause-label">Pause automations</span><span class="pause-icon" aria-hidden="true">Ⅱ</span>'; pauseButton.setAttribute('aria-label', state.automationsPaused ? 'Resume automations' : 'Pause automations'); }
      byId('sidebarPauseButton').textContent = state.automationsPaused ? 'Resume automations' : 'Pause automations';
      renderWorkflows();
      ensureSelection();
      renderRuns();
      renderActiveFilters();
      renderDetail();
      if (!options.skipPersist) persist();
    }

    function setSelectValue(select, value) {
      if (!select) return;
      if (![...select.options].some(option => option.value === value)) select.add(new Option(value, value));
      select.value = value;
    }

    function renderViews() {
      const base = runsForCurrentRepo();
      byId('viewNav').innerHTML = viewMeta.map(view => {
        const count = base.filter(run => runMatchesView(run, view.id)).length;
        return `<button type="button" class="view-button ${state.view === view.id ? 'active' : ''}" data-action="setView" data-view="${view.id}" aria-current="${state.view === view.id ? 'page' : 'false'}"><span class="view-name"><span class="view-icon ${view.icon}"></span><span>${esc(view.label)}</span></span><span class="count-badge">${count}</span></button>`;
      }).join('');
    }

    function renderWorkflows() {
      const query = state.workflowSearch.trim().toLowerCase();
      const workflows = state.workflows.filter(workflow => workflow.scope.repository === state.currentRepo && (!query || `${workflow.name} ${workflow.description}`.toLowerCase().includes(query))).sort((a,b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        if (state.workflowSort === 'alpha-asc') return a.name.localeCompare(b.name);
        if (state.workflowSort === 'alpha-desc') return b.name.localeCompare(a.name);
        return Number(a.customOrder || 0) - Number(b.customOrder || 0);
      });
      byId('workflowSort').value = state.workflowSort;
      byId('workflowList').innerHTML = workflows.length ? workflows.map(workflow => {
        const selected = state.workflowFilter === workflow.id;
        const trigger = triggerLabels[workflow.trigger.type] || workflow.trigger.type;
        const activeRun = state.runs.find(run => run.repository === state.currentRepo && run.workflowId === workflow.id && run.status === 'running' && !run.archived);
        return `<div class="workflow-item ${selected ? 'active' : ''}">
          <button type="button" class="workflow-select" data-action="selectWorkflow" data-id="${esc(workflow.id)}" aria-pressed="${selected}">
            <span class="workflow-name">${workflow.pinned ? '<span aria-label="Pinned" title="Pinned">★</span> ' : ''}${esc(workflow.name)}</span>
          </button>
          <div class="workflow-controls">
            <button type="button" class="mini-icon workflow-run-control ${activeRun ? 'btn-danger' : ''}" data-action="toggleWorkflowRun" data-id="${esc(workflow.id)}" aria-label="${activeRun ? 'Stop' : 'Run'} ${esc(workflow.name)}" title="${activeRun ? 'Stop running workflow' : 'Run workflow now'}">${activeRun ? '■' : '▶'}</button>
            <label class="switch" title="${workflow.enabled ? 'Disable' : 'Enable'} ${esc(workflow.name)}"><span class="sr-only">${workflow.enabled ? 'Disable' : 'Enable'} ${esc(workflow.name)}</span><input type="checkbox" data-action="toggleWorkflow" data-id="${esc(workflow.id)}" ${workflow.enabled ? 'checked' : ''}><span class="switch-track"></span></label>
            <button type="button" class="mini-icon" data-action="workflowMenu" data-id="${esc(workflow.id)}" aria-label="Actions for ${esc(workflow.name)}">•••</button>
          </div>
        </div>`;
      }).join('') : `<div class="empty-state" style="padding:24px 10px"><strong>No workflows</strong>${query ? 'Try a different search.' : 'Create the first workflow for this repository.'}</div>`;
    }

    function renderRuns() {
      const runs = visibleRuns();
      const view = viewMeta.find(item => item.id === state.view);
      byId('runsHeading').textContent = view?.label || 'Runs';
      byId('runsKicker').textContent = `${runs.length} visible · ${runsForCurrentRepo().length} total`;
      byId('triggerFilter').value = state.triggerFilter;
      byId('runStatusFilter').value = state.view;
      byId('sortRuns').value = state.sort;
      byId('runSearch').value = state.runSearch;

      if (!runs.length) {
        byId('runRows').innerHTML = `<tr><td colspan="6"><div class="empty-state"><strong>No runs match this view</strong>Adjust the filters or start a workflow manually.<div class="inline-actions" style="justify-content:center"><button type="button" data-action="clearRunFilters">Clear filters</button><button type="button" class="btn-primary" data-action="newWorkflow">New workflow</button></div></div></td></tr>`;
        byId('mobileRunList').innerHTML = `<div class="empty-state"><strong>No runs match this view</strong>Adjust the filters or start a workflow manually.</div>`;
        return;
      }

      byId('runRows').innerHTML = runs.map(run => {
        const workflow = workflowById(run.workflowId);
        const selected = run.id === state.selectedRunId;
        return `<tr data-action="selectRun" data-id="${esc(run.id)}" class="${selected ? 'selected' : ''}" tabindex="0" aria-selected="${selected}">
          <td>${renderStatus(run.status)}</td>
          <td><div class="run-main">${esc(workflow?.name || run.workflowId)}</div><div class="run-sub">${esc(triggerLabels[run.trigger] || run.trigger)}</div></td>
          <td><div class="run-main mono">${esc(run.branch)}</div><div class="run-sub mono">${esc(run.commit)}</div></td>
          <td><div class="run-main nowrap">${run.iteration}</div></td>
          <td><div class="run-main">${esc(run.currentActivity)}</div><div class="run-sub" data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</div></td>
          <td><span class="mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</span></td>
        </tr>`;
      }).join('');

      byId('mobileRunList').innerHTML = runs.map(run => {
        const workflow = workflowById(run.workflowId);
        const selected = run.id === state.selectedRunId;
        return `<article class="mobile-run-card ${selected ? 'selected' : ''}" data-action="selectRun" data-id="${esc(run.id)}" tabindex="0" aria-selected="${selected}">
          <div class="mobile-run-head">${renderStatus(run.status)}<span class="mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</span></div>
          <div class="mobile-run-title">${esc(workflow?.name || run.workflowId)}</div>
          <div class="mobile-run-meta">${esc(run.branch)} · ${esc(run.commit)} · Iteration ${run.iteration}</div>
          <div class="mobile-run-activity">${esc(run.currentActivity)}</div>
          <div class="mobile-run-foot"><span data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</span><span>${diffText(run)} · ${esc(checkLabels[run.checkStatus] || run.checkStatus)}</span></div>
        </article>`;
      }).join('');
    }

    function renderActiveFilters() {
      const chips = [];
      const workflow = workflowById(state.workflowFilter);
      if (workflow) chips.push(`<span class="filter-chip">Workflow: ${esc(workflow.name)} <button type="button" data-action="clearWorkflowFilter" aria-label="Clear workflow filter">×</button></span>`);
      if (state.triggerFilter !== 'all') chips.push(`<span class="filter-chip">Trigger: ${esc(triggerLabels[state.triggerFilter])} <button type="button" data-action="clearTriggerFilter" aria-label="Clear trigger filter">×</button></span>`);
      if (state.runSearch) chips.push(`<span class="filter-chip">Search: “${esc(state.runSearch)}” <button type="button" data-action="clearRunSearch" aria-label="Clear run search">×</button></span>`);
      const bar = byId('activeFilterBar');
      bar.classList.toggle('visible', Boolean(chips.length));
      bar.innerHTML = chips.join('') + (chips.length > 1 ? '<button type="button" class="btn-small btn-ghost" data-action="clearRunFilters">Clear all</button>' : '');
    }

    function actionButton(action, run) {
      const attrs = `data-action="${esc(action.id)}" data-id="${esc(run.id)}"`;
      return `<button type="button" class="${esc(action.className || '')}" ${attrs} ${action.disabled ? 'disabled' : ''} ${action.title ? `title="${esc(action.title)}"` : ''}>${esc(action.label)}</button>`;
    }

    function actionsForRun(run) {
      if (run.status === 'running') return [
        { id:'followRun', label: state.followingRunId === run.id ? 'Following live' : 'Follow live', className: state.followingRunId === run.id ? 'btn-primary' : '' },
        { id:'stopRun', label:'Stop', className:'btn-danger' }
      ];
      if (run.status === 'review') {
        const included = (run.files || []).filter(file => file.decision === 'included').length;
        const canApply = run.checkStatus === 'passed' && included > 0;
        return [
          { id:'showChanges', label:'Review changes' },
          { id:'applyRun', label:'Apply to branch', className:'btn-success', disabled:!canApply, title:!canApply ? 'Include at least one file and pass all checks first.' : '' },
          { id:'requestChanges', label:'Request changes' },
          { id:'rejectRun', label:'Reject', className:'btn-danger' }
        ];
      }
      if (run.status === 'failed') return [{ id:'retryRun', label:'Retry with guidance', className:'btn-primary' }, { id:'openEditor', label:'Open editor' }];
      if (run.status === 'stopped') return [{ id:'resumeRun', label:'Resume', className:'btn-primary' }, { id:'archiveRun', label:'Archive' }];
      if (['completed','rejected'].includes(run.status)) return [{ id:'runAgain', label:'Run again', className:'btn-primary' }, { id:'archiveRun', label:'Archive' }];
      return [];
    }

    function renderDetail() {
      const run = selectedRun();
      const target = byId('runDetail');
      if (!run) {
        target.innerHTML = `<div class="empty-state" style="min-height:390px;display:grid;place-items:center"><div><strong>Select a run</strong>The run summary, progress, changes, checks, and iteration history will appear here.</div></div>`;
        return;
      }
      const workflow = workflowById(run.workflowId);
      const actions = actionsForRun(run);
      const tabs = tabMeta.map(tab => {
        let suffix = '';
        if (tab.id === 'changes' && run.files?.length) suffix = ` (${run.files.length})`;
        if (tab.id === 'checks' && run.checks?.length) suffix = ` (${run.checks.length})`;
        return `<button type="button" class="tab-button ${state.activeTab === tab.id ? 'active' : ''}" data-action="setTab" data-tab="${tab.id}" role="tab" aria-selected="${state.activeTab === tab.id}" aria-controls="run-tab-panel">${esc(tab.label + suffix)}</button>`;
      }).join('');
      target.innerHTML = `<div class="detail-top">
          <div class="detail-identity"><div class="detail-title-row"><h2>${esc(workflow?.name || run.workflowId)}</h2>${renderStatus(run.status)}</div>
            <div class="detail-meta"><span>${esc(triggerLabels[run.trigger] || run.trigger)}</span><span class="mono">${esc(run.branch)}</span><span class="mono">${esc(run.commit)}</span><span>Iteration ${run.iteration}</span><span>Prompt v${run.promptVersion}</span></div>
          </div><div class="detail-actions">${actions.map(action => actionButton(action, run)).join('')}</div>
        </div>
        <nav class="detail-tabs" role="tablist" aria-label="Selected run details">${tabs}</nav>
        <div class="detail-body" id="run-tab-panel" role="tabpanel">${renderTabContent(run)}</div>`;
    }

    function renderTabContent(run) {
      if (state.activeTab === 'activity') return renderActivity(run);
      if (state.activeTab === 'changes') return renderChanges(run);
      if (state.activeTab === 'checks') return renderChecks(run);
      if (state.activeTab === 'iterations') return renderIterations(run);
      if (state.activeTab === 'notes') return renderNotes(run);
      return renderSummary(run);
    }

    function stateGuidance(run) {
      if (run.status === 'running') return 'The agent is working. Heartbeat and meaningful progress are tracked separately.';
      if (run.status === 'review') return 'The worktree is unchanged until you apply the included files.';
      if (run.status === 'failed') return 'Artifacts are preserved. Retry with guidance or inspect the branch manually.';
      if (run.status === 'stopped') return 'Artifacts and execution state are preserved. Resume continues the same iteration.';
      if (run.status === 'completed') return 'The selected changes were applied and this run is complete.';
      if (run.status === 'rejected') return 'No changes were applied. Run again creates a separate execution.';
      return '';
    }

    function renderSummary(run) {
      const calloutClass = run.status === 'review' ? 'review' : run.status === 'failed' ? 'failed' : '';
      const health = run.status === 'running' ? `<div class="notice"><strong>Agent healthy</strong> · heartbeat <span data-heartbeat="${esc(run.id)}">${esc(relativeTime(run.heartbeatAt))}</span><br><span class="subtle">Last meaningful progress <span data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</span></span></div>` : `<div class="notice">${esc(stateGuidance(run))}</div>`;
      return `<div class="detail-grid">
        <div>
          <section class="panel"><div class="panel-head"><span>What this run has done</span><span class="panel-head-meta">${run.summarySteps.length} recorded steps</span></div><div class="panel-body"><ol class="summary-list">${run.summarySteps.map((step,index) => `<li><span class="step-icon ${index === run.summarySteps.length - 1 && run.status === 'running' ? 'current' : ''}">${index === run.summarySteps.length - 1 && run.status === 'running' ? '•' : '✓'}</span><span>${esc(step)}</span></li>`).join('')}</ol></div></section>
          <section class="panel"><div class="panel-head"><span>Current state</span><span class="panel-head-meta" data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</span></div><div class="panel-body"><div class="activity-callout ${calloutClass}"><div class="activity-title">${esc(run.currentActivity)}</div><div class="activity-text">${esc(run.currentAction)}</div>${run.currentCommand ? `<div class="command">${esc(run.currentCommand)}</div>` : ''}</div></div></section>
        </div>
        <div>
          <section class="panel"><div class="panel-head"><span>Run health</span><span class="panel-head-meta">local execution</span></div><div class="panel-body"><div class="metric-grid">
            <div class="metric"><div class="metric-label">Elapsed</div><div class="metric-value mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</div></div>
            <div class="metric"><div class="metric-label">Iteration</div><div class="metric-value">Iteration ${run.iteration}</div></div>
            <div class="metric"><div class="metric-label">Changes</div><div class="metric-value">${diffText(run)} · ${run.files?.length || 0} files</div></div>
            <div class="metric"><div class="metric-label">Verification</div><div class="metric-value">${renderCheck(run.checkStatus)}</div></div>
          </div><div style="margin-top:10px">${health}</div></div></section>
          <section class="panel"><div class="panel-head"><span>Execution context</span></div><div class="panel-body"><div class="metric-grid"><div class="metric"><div class="metric-label">Branch</div><div class="metric-value mono">${esc(run.branch)}</div></div><div class="metric"><div class="metric-label">Risk</div><div class="metric-value">${esc(run.risk)}</div></div><div class="metric"><div class="metric-label">Trigger</div><div class="metric-value">${esc(triggerLabels[run.trigger])}</div></div><div class="metric"><div class="metric-label">Prompt</div><div class="metric-value">Version ${run.promptVersion}</div></div></div></div></section>
        </div>
      </div>`;
    }

    function renderActivity(run) {
      const events = [...(run.events || [])].sort((a,b) => b.at - a.at);
      const live = run.status === 'running';
      return `<div class="detail-grid"><div>
        <section class="panel"><div class="panel-head"><span>${live ? 'Live activity' : 'Last activity'}</span><span class="panel-head-meta">${live ? (state.followingRunId === run.id ? 'following' : 'live') : 'snapshot'}</span></div><div class="panel-body"><div class="activity-callout ${run.status === 'failed' ? 'failed' : run.status === 'review' ? 'review' : ''}"><div class="activity-title">${esc(run.currentActivity)}</div><div class="activity-text">${esc(run.currentAction)}</div>${run.currentFile ? `<div class="run-sub" style="margin-top:8px">Current file · <span class="mono">${esc(run.currentFile)}</span></div>` : ''}${run.currentCommand ? `<div class="command">${esc(run.currentCommand)}</div>` : ''}</div>
        ${live ? `<div class="inline-actions"><button type="button" data-action="simulateProgress" data-id="${esc(run.id)}">Simulate next progress event</button><button type="button" data-action="copySnapshot" data-id="${esc(run.id)}">Copy snapshot</button></div>` : `<div class="inline-actions"><button type="button" data-action="copySnapshot" data-id="${esc(run.id)}">Copy snapshot</button><button type="button" data-action="openEditor" data-id="${esc(run.id)}">Open editor</button></div>`}</div></section>
        <section class="panel"><div class="panel-head"><span>Activity timeline</span><span class="panel-head-meta">${events.length} events</span></div><div class="panel-body"><div class="timeline">${events.map(item => `<div class="timeline-item"><div class="timeline-time">${esc(clockTime(item.at))}</div><div class="timeline-marker"></div><div class="timeline-content"><span>${esc(item.text)}</span><div class="subtle" data-relative="${item.at}">${esc(relativeTime(item.at))}</div></div></div>`).join('')}</div></div></section>
      </div><div><section class="panel"><div class="panel-head"><span>Signals</span></div><div class="panel-body"><div class="metric-grid"><div class="metric"><div class="metric-label">Agent heartbeat</div><div class="metric-value" data-heartbeat="${esc(run.id)}">${live ? esc(relativeTime(run.heartbeatAt)) : 'Not active'}</div></div><div class="metric"><div class="metric-label">Last progress</div><div class="metric-value" data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</div></div><div class="metric"><div class="metric-label">Elapsed</div><div class="metric-value mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</div></div><div class="metric"><div class="metric-label">Current iteration</div><div class="metric-value">Iteration ${run.iteration}</div></div></div></div></section>
      <section class="panel"><div class="panel-head"><span>Raw log</span><span class="panel-head-meta">escaped text</span></div><div class="panel-body"><details><summary style="cursor:pointer;color:var(--text-2)">Show operational log</summary><div class="command" style="max-height:260px;overflow:auto">${events.slice().reverse().map(item => `[${clockTime(item.at)}] ${item.text}`).map(esc).join('\n')}</div></details><div class="inline-actions"><button type="button" data-action="copyLog" data-id="${esc(run.id)}">Copy log</button></div></div></section></div></div>`;
    }

    function changeNotice(run) {
      if (run.status === 'review') return `<div class="notice warning">Choose which files to include, then apply from the selected-run header. Excluding a file does not edit the generated patch.</div>`;
      if (run.status === 'running') return `<div class="notice">Draft changes are read-only while the agent is working.</div>`;
      if (run.status === 'completed') return `<div class="notice success">These files were applied to <span class="mono">${esc(run.branch)}</span>.</div>`;
      if (run.status === 'rejected') return `<div class="notice danger">This proposal was rejected. No files were applied.</div>`;
      return `<div class="notice">Artifacts are preserved for inspection. Resume or retry before applying anything.</div>`;
    }

    function renderChanges(run) {
      if (!run.files?.length) return `<div class="empty-state"><strong>No file changes yet</strong>${run.status === 'running' ? 'The agent is still scanning and has not produced a patch.' : 'This run did not create a diff.'}<div class="inline-actions" style="justify-content:center"><button type="button" data-action="setTab" data-tab="activity">View activity</button></div></div>`;
      return `${changeNotice(run)}<div class="file-list" style="margin-top:12px">${run.files.map(file => {
        const canDecide = run.status === 'review';
        const decisionLabel = file.decision === 'included' ? 'Included' : file.decision === 'excluded' ? 'Excluded' : file.decision === 'applied' ? 'Applied' : file.decision === 'rejected' ? 'Rejected' : 'Draft';
        return `<article class="file-card"><div class="file-head"><div style="min-width:0;flex:1"><div class="file-name">${esc(file.path)}</div><div class="file-meta" style="margin-top:4px"><span class="plus">+${file.add}</span><span class="minus">−${file.del}</span><span class="decision ${esc(file.decision)}">${esc(decisionLabel)}</span></div></div><div class="file-actions">
          ${canDecide ? `<button type="button" class="btn-small ${file.decision === 'included' ? 'btn-success' : ''}" data-action="includeFile" data-id="${esc(run.id)}" data-file="${esc(file.path)}">Include</button><button type="button" class="btn-small ${file.decision === 'excluded' ? 'btn-danger' : ''}" data-action="excludeFile" data-id="${esc(run.id)}" data-file="${esc(file.path)}">Exclude</button><button type="button" class="btn-small" data-action="commentFile" data-id="${esc(run.id)}" data-file="${esc(file.path)}">Comment</button>` : ''}
          <button type="button" class="btn-small" data-action="openFile" data-id="${esc(run.id)}" data-file="${esc(file.path)}">Open file</button></div></div>
          <pre class="diff">${file.diff.map(line => `<span class="diff-line ${line.startsWith('+') ? 'add' : line.startsWith('-') ? 'del' : ''}">${esc(line)}</span>`).join('')}</pre></article>`;
      }).join('')}</div>`;
    }

    function renderChecks(run) {
      const canRerun = ['review','failed','stopped'].includes(run.status) && run.checkStatus !== 'running';
      return `<section class="panel"><div class="panel-head"><span>Verification</span><div class="inline-actions" style="margin:0">${renderCheck(run.checkStatus)}${canRerun ? `<button type="button" class="btn-small" data-action="rerunChecks" data-id="${esc(run.id)}">Rerun checks</button>` : ''}<button type="button" class="btn-small" data-action="copyChecks" data-id="${esc(run.id)}">Copy output</button></div></div><div style="overflow:auto"><table class="check-table"><thead><tr><th>Check</th><th>Status</th><th>Duration</th><th>Output</th></tr></thead><tbody>${(run.checks || []).map(check => `<tr><td class="mono">${esc(check.name)}</td><td>${renderCheck(check.status)}</td><td class="mono subtle">${esc(check.duration || '—')}</td><td><div class="output">${esc(check.output)}</div></td></tr>`).join('')}</tbody></table></div></section>`;
    }

    function renderIterations(run) {
      return `<section class="panel"><div class="panel-head"><span>Iteration history</span><span class="panel-head-meta">Current iteration ${run.iteration} · no iteration limit</span></div><div>${(run.iterations || []).map(item => `<article class="iteration-card"><div class="iteration-number">Iteration ${item.iteration}</div><div><div class="iteration-title">${esc(item.title)}</div><div class="iteration-summary">${esc(item.summary)}</div></div><div class="iteration-state">${esc(item.state)} · ${esc(item.duration || '—')}</div></article>`).join('')}</div></section><div class="notice" style="margin-top:12px">This workflow continues for as many iterations as needed. It stops only when complete, blocked, manually stopped, or required by a safety or approval policy.</div>`;
    }

    function renderNotes(run) {
      return `<div class="detail-grid"><section class="panel"><div class="panel-head"><span>Notes and decisions</span><span class="panel-head-meta">${run.notes?.length || 0} notes</span></div><div class="panel-body"><div class="note-list">${(run.notes || []).slice().sort((a,b) => b.at-a.at).map(item => `<article class="note"><div class="note-meta">${esc(item.author)} · ${esc(dateTime(item.at))}</div><div>${esc(item.text)}</div></article>`).join('') || '<div class="subtle">No notes yet.</div>'}</div></div></section><section class="panel"><div class="panel-head"><span>Add context</span></div><div class="panel-body"><p class="muted">Notes remain attached to this run. Guidance can also be sent to an active agent without restarting it.</p><div class="inline-actions"><button type="button" data-action="addNote" data-id="${esc(run.id)}">Add note</button>${run.status === 'running' ? `<button type="button" class="btn-primary" data-action="sendGuidance" data-id="${esc(run.id)}">Send guidance to agent</button>` : ''}<button type="button" data-action="explainRun" data-id="${esc(run.id)}">Explain this run</button></div></div></section></div>`;
    }

    const editorTabs = [
      { id:'behavior', label:'Behavior' }, { id:'trigger', label:'Trigger & scope' }, { id:'safety', label:'Safety' }, { id:'history', label:'Version history' }
    ];

    function blankWorkflow() {
      return {
        id: uid('workflow'), name: 'Untitled workflow', description: '', enabled: true,
        prompt: '', promptVersion: 0, promptUpdatedAt: null, promptVersions: [],
        trigger: { type:'manual', branchPattern:'current branch' },
        scope: { repository:state.currentRepo, overlap:'skip' },
        safety: { approval:'always', destructive:'ask', protectedPaths:'.env*', stallMinutes:20, onStall:'pause' }
      };
    }

    function openWorkflowEditor(workflowId = null) {
      const original = workflowId ? workflowById(workflowId) : null;
      drawerLastFocusedElement = document.activeElement;
      const draft = deepClone(original || blankWorkflow());
      editorState = {
        mode: original ? 'edit' : 'new',
        original: deepClone(original || draft),
        draft,
        tab:'behavior',
        instruction:'',
        proposal:null,
        proposalGeneration:0,
        sourceEditing:false,
        revisionNote:'',
        appliedInstruction:'',
        errors:{}
      };
      byId('drawerTitle').textContent = original ? `Edit ${original.name}` : 'Create workflow';
      byId('drawerSubtitle').textContent = original ? `Prompt version ${original.promptVersion} · future runs only` : `New local workflow for ${state.currentRepo}`;
      const drawer=byId('workflowDrawer');
      drawer.hidden=false;
      drawer.removeAttribute('inert');
      drawer.setAttribute('aria-hidden','false');
      byId('drawerBackdrop').classList.add('open');
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderWorkflowEditor();
      setTimeout(() => byId('workflowInstruction')?.focus(), 0);
    }

    function editorIsDirty() {
      if (!editorState) return false;
      return JSON.stringify(editorState.draft) !== JSON.stringify(editorState.original) || Boolean(editorState.instruction.trim()) || Boolean(editorState.proposal);
    }

    function draftIsDirty() {
      return Boolean(editorState && JSON.stringify(editorState.draft) !== JSON.stringify(editorState.original));
    }

    function hasUnappliedAIWork() {
      if (!editorState) return false;
      return Boolean(editorState.proposal) || Boolean(editorState.instruction.trim() && editorState.instruction.trim() !== editorState.appliedInstruction.trim());
    }

    function promptChanged() {
      return Boolean(editorState && editorState.draft.prompt !== editorState.original.prompt);
    }

    function activeRunsOnWorkflow(workflowId) {
      return state.runs.filter(run => run.workflowId === workflowId && ['running','applying','queued'].includes(run.status) && !run.archived).length;
    }

    function renderWorkflowEditor() {
      if (!editorState) return;
      byId('drawerTabs').innerHTML = editorTabs.map(tab => `<button type="button" class="tab-button ${editorState.tab === tab.id ? 'active' : ''}" data-action="setEditorTab" data-tab="${tab.id}" role="tab" aria-selected="${editorState.tab === tab.id}">${esc(tab.label)}</button>`).join('');
      if (editorState.tab === 'trigger') byId('drawerBody').innerHTML = renderTriggerEditor();
      else if (editorState.tab === 'safety') byId('drawerBody').innerHTML = renderSafetyEditor();
      else if (editorState.tab === 'history') byId('drawerBody').innerHTML = renderVersionHistory();
      else byId('drawerBody').innerHTML = renderBehaviorEditor();
      renderEditorFooter();
    }

    function renderEditorFooter() {
      const dirty = editorIsDirty();
      const draftDirty = draftIsDirty();
      const unappliedAI = hasUnappliedAIWork();
      const changed = promptChanged();
      const active = editorState.mode === 'edit' ? activeRunsOnWorkflow(editorState.draft.id) : 0;
      let note = dirty ? 'Unsaved workflow changes.' : 'No unsaved changes.';
      if (changed) note = `Prompt version ${editorState.original.promptVersion + 1} will be used by future runs. ${active ? `${active} active ${active === 1 ? 'run continues' : 'runs continue'} using the version pinned at start.` : 'No active runs are pinned to the current version.'}`;
      if (editorState.mode === 'new') note = editorState.draft.prompt ? 'The generated prompt and trigger settings will be saved together.' : 'Describe the workflow and generate its initial prompt before creating it.';
      if (unappliedAI) note = 'The AI instruction or proposal has not been applied to the draft yet.';
      byId('drawerFooterNote').textContent = note;
      const save = byId('saveWorkflowButton');
      save.textContent = editorState.mode === 'new' ? 'Create workflow' : changed ? 'Save as revision' : 'Save changes';
      save.disabled = unappliedAI || (editorState.mode === 'new' ? (!editorState.draft.name.trim() || !editorState.draft.prompt.trim()) : !draftDirty);
    }

    function renderBehaviorEditor() {
      const wf = editorState.draft;
      const isNew = editorState.mode === 'new';
      const proposal = editorState.proposal;
      const stale = proposal && proposal.sourcePrompt !== wf.prompt;
      const examples = isNew ? [
        ['Review every commit','Review each human commit for bugs, make only small safe fixes, run focused checks, and stop for my approval.'],
        ['Fix failing tests','When a local test fails, reproduce it, diagnose the root cause, patch narrowly, and keep iterating until checks pass or you need my input.'],
        ['Watch a folder','Watch API schema files and update generated client types when they change, then run typecheck and stop for review.']
      ] : [
        ['Smaller patches','Avoid style-only edits, keep every patch as small as possible, and explain any behavior change before making it.'],
        ['Stronger checks','Run the narrowest relevant check after each change, then run the broader suite before stopping for approval.'],

      ];

        <div class="form-group"><label for="workflowName">Workflow name</label><input class="field" id="workflowName" data-editor-path="name" value="${esc(wf.name)}"><div class="validation">${esc(editorState.errors.name || '')}</div></div>
        <div class="form-group"><label for="workflowDescription">Short description</label><input class="field" id="workflowDescription" data-editor-path="description" value="${esc(wf.description)}" placeholder="What appears in the workflow list"><div class="validation"></div></div>
      </div>
      ${promptChanged() ? `<div class="draft-banner"><span>◆</span><div><strong>Draft prompt differs from version ${editorState.original.promptVersion}.</strong><br><span class="muted">It is not saved until you use the footer action.</span></div></div>` : ''}
      <div class="editor-grid">
        <section class="panel"><div class="panel-head"><span>${isNew ? 'Describe the workflow' : 'Change this workflow with AI'}</span><span class="panel-head-meta">primary path</span></div><div class="panel-body">
