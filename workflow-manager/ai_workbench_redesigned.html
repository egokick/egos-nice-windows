          <div class="inline-actions"><button type="button" class="btn-primary" data-action="generatePromptProposal">${proposal ? 'Generate new proposal' : isNew ? 'Generate initial prompt' : 'Generate prompt update'}</button>${proposal ? '<button type="button" data-action="focusPromptInstruction">Refine instruction</button>' : ''}</div>
          <div class="field-help" style="margin-top:9px">The AI rewrite is simulated in this offline prototype. The proposal, review, draft, and save states behave like the intended product.</div>
        </div></section>
        <section class="panel"><div class="panel-head"><span>AI proposal</span><span class="panel-head-meta">${proposal ? `generation ${proposal.generation}` : 'not generated'}</span></div>${proposal ? `<div class="proposal-content">
          ${stale ? '<div class="notice danger" style="margin-bottom:10px">The draft prompt changed after this proposal was generated. Generate a fresh proposal before applying it.</div>' : ''}
          <div class="proposal-summary">${proposal.summary.map(item => `<div class="proposal-item"><strong>${esc(item.section)}</strong><span>${esc(item.text)}</span></div>`).join('')}</div>
          <details open><summary style="cursor:pointer;color:var(--text-2);margin-bottom:8px">Review prompt diff</summary><pre class="diff">${proposal.diff.map(line => `<span class="diff-line ${line.type}">${esc((line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ') + line.text)}</span>`).join('')}</pre></details>
          <div class="inline-actions"><button type="button" class="btn-success" data-action="applyPromptProposal" ${stale ? 'disabled' : ''}>Apply to draft</button><button type="button" data-action="generatePromptProposal">Regenerate</button><button type="button" data-action="discardPromptProposal">Discard</button></div>
        </div>` : `<div class="proposal-empty"><div><div style="font-size:28px;color:var(--purple);margin-bottom:8px">◇</div><strong style="color:var(--text)">No proposal yet</strong><br>Describe the behavior you want and generate a reviewable prompt ${isNew ? 'for the new workflow' : 'update'}.</div></div>`}</section>
      </div>
      <details class="prompt-reader" ${editorState.sourceEditing ? 'open' : ''}><summary>${isNew && !wf.prompt ? 'Initial prompt will appear here' : `View ${promptChanged() ? 'draft' : 'current'} full prompt · version ${wf.promptVersion || 'draft'}`}</summary>
        <div style="padding:10px 12px;border-bottom:1px solid var(--line);display:flex;gap:7px;align-items:center"><button type="button" class="btn-small" data-action="toggleDirectPromptEdit">${editorState.sourceEditing ? 'Finish direct edit' : 'Edit source directly'}</button><button type="button" class="btn-small" data-action="copyWorkflowPrompt">Copy prompt</button><span class="subtle">Direct editing is an advanced path.</span></div>
        <textarea id="promptSource" class="prompt-source" ${editorState.sourceEditing ? '' : 'readonly'} placeholder="Generate an initial prompt first.">${esc(wf.prompt)}</textarea>
      </details>`;
    }

    function renderTriggerEditor() {
      const wf = editorState.draft;
      const trigger = wf.trigger;
      let specific = '';
      if (trigger.type === 'schedule') specific = `<div class="form-group"><label for="scheduleCadence">Cadence</label><select class="field" id="scheduleCadence" data-editor-path="trigger.cadence"><option value="daily" ${trigger.cadence === 'daily' ? 'selected' : ''}>Every day</option><option value="weekdays" ${trigger.cadence === 'weekdays' ? 'selected' : ''}>Weekdays</option><option value="weekly" ${trigger.cadence === 'weekly' ? 'selected' : ''}>Weekly</option></select></div><div class="form-group"><label for="scheduleTime">Local time</label><input class="field" type="time" id="scheduleTime" data-editor-path="trigger.time" value="${esc(trigger.time || '02:30')}"></div><div class="form-group"><label for="scheduleTimezone">Timezone</label><select class="field" id="scheduleTimezone" data-editor-path="trigger.timezone"><option ${trigger.timezone === 'America/Chicago' ? 'selected' : ''}>America/Chicago</option><option ${trigger.timezone === 'America/New_York' ? 'selected' : ''}>America/New_York</option><option ${trigger.timezone === 'Europe/London' ? 'selected' : ''}>Europe/London</option><option ${trigger.timezone === 'UTC' ? 'selected' : ''}>UTC</option></select><div class="field-help">Next run: ${esc(nextScheduleText(trigger))}</div></div>`;
      if (trigger.type === 'file_watch') specific = `<div class="form-group full"><label for="watchedPaths">Watched paths</label><textarea class="textarea mono" id="watchedPaths" data-editor-path="trigger.paths" placeholder="src/api/schema/**">${esc(trigger.paths || '')}</textarea><div class="field-help">One glob per line.</div></div><div class="form-group full"><label for="ignoredPaths">Ignore patterns</label><textarea class="textarea mono" id="ignoredPaths" data-editor-path="trigger.ignore" placeholder="**/*.generated.ts">${esc(trigger.ignore || '')}</textarea></div><div class="form-group"><label for="watchDebounce">Debounce</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="1" id="watchDebounce" data-editor-path="trigger.debounceSeconds" value="${Number(trigger.debounceSeconds || 5)}"><span class="subtle">seconds</span></div></div>`;
      if (trigger.type === 'post_commit') specific = `<div class="form-group"><label for="commitAuthors">Commits to include</label><select class="field" id="commitAuthors" data-editor-path="trigger.authors"><option value="human" ${trigger.authors === 'human' ? 'selected' : ''}>Human commits only</option><option value="all" ${trigger.authors === 'all' ? 'selected' : ''}>Human and AI commits</option></select></div><div class="form-group"><label for="hookBehavior">Hook behavior</label><select class="field" id="hookBehavior" data-editor-path="trigger.hookBehavior"><option value="after_each_commit" ${trigger.hookBehavior === 'after_each_commit' ? 'selected' : ''}>After each commit</option><option value="after_idle" ${trigger.hookBehavior === 'after_idle' ? 'selected' : ''}>After commit activity is idle</option></select></div><div class="form-group"><label for="commitDebounce">Debounce</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="0" id="commitDebounce" data-editor-path="trigger.debounceSeconds" value="${Number(trigger.debounceSeconds || 10)}"><span class="subtle">seconds</span></div></div>`;
      if (trigger.type === 'test_failure') specific = `<div class="form-group full"><label for="testCommand">Test command</label><input class="field mono" id="testCommand" data-editor-path="trigger.testCommand" value="${esc(trigger.testCommand || 'npm test')}"></div><div class="form-group"><label for="eventSource">Failure event source</label><input class="field" id="eventSource" data-editor-path="trigger.eventSource" value="${esc(trigger.eventSource || 'local test wrapper')}"></div><div class="form-group"><label for="failureCooldown">Cooldown</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="0" id="failureCooldown" data-editor-path="trigger.cooldownSeconds" value="${Number(trigger.cooldownSeconds || 30)}"><span class="subtle">seconds</span></div></div>`;
      if (trigger.type === 'manual') specific = `<div class="form-group full"><div class="notice">This workflow starts only when you choose <strong>Run now</strong>. Disabling automatic triggers does not prevent manual runs.</div></div>`;
      return `${editorState.errors.trigger ? `<div class="notice danger" style="margin-bottom:12px">${esc(editorState.errors.trigger)}</div>` : ''}<div class="form-grid"><div class="form-group"><label for="triggerType">Trigger type</label><select class="field" id="triggerType" data-editor-path="trigger.type"><option value="manual" ${trigger.type === 'manual' ? 'selected' : ''}>Manual</option><option value="post_commit" ${trigger.type === 'post_commit' ? 'selected' : ''}>Post-commit</option><option value="test_failure" ${trigger.type === 'test_failure' ? 'selected' : ''}>Test failure</option><option value="schedule" ${trigger.type === 'schedule' ? 'selected' : ''}>Schedule</option><option value="file_watch" ${trigger.type === 'file_watch' ? 'selected' : ''}>File watch</option></select></div><div class="form-group"><label for="workflowRepo">Repository</label><select class="field" id="workflowRepo" data-editor-path="scope.repository"><option ${wf.scope.repository === 'my-app' ? 'selected' : ''}>my-app</option><option ${wf.scope.repository === 'payments-api' ? 'selected' : ''}>payments-api</option><option ${wf.scope.repository === 'design-system' ? 'selected' : ''}>design-system</option></select></div><div class="form-group full"><label for="branchPattern">Branch matcher</label><input class="field mono" id="branchPattern" data-editor-path="trigger.branchPattern" value="${esc(trigger.branchPattern || 'current branch')}" placeholder="main, feature/*"><div class="field-help">Comma-separated branch names or glob patterns.</div></div>${specific}<div class="form-group"><label for="overlapPolicy">If another run is active</label><select class="field" id="overlapPolicy" data-editor-path="scope.overlap"><option value="skip" ${wf.scope.overlap === 'skip' ? 'selected' : ''}>Skip the new trigger</option><option value="queue" ${wf.scope.overlap === 'queue' ? 'selected' : ''}>Queue one run</option><option value="parallel" ${wf.scope.overlap === 'parallel' ? 'selected' : ''}>Run in parallel</option></select></div><div class="form-group"><label>Automatic trigger</label><label class="safety-option" style="padding:8px 10px"><input type="checkbox" data-editor-path="enabled" ${wf.enabled ? 'checked' : ''}><span><span class="safety-title">${wf.enabled ? 'Enabled' : 'Disabled'}</span><span class="safety-copy">Manual Run now remains available.</span></span></label></div></div>`;
    }

    function nextScheduleText(trigger) {
      const label = trigger.cadence === 'weekdays' ? 'next weekday' : trigger.cadence === 'weekly' ? 'next scheduled week' : 'tomorrow';
      return `${label} at ${trigger.time || '02:30'} (${trigger.timezone || 'local'})`;
    }

    function renderSafetyEditor() {
      const safety = editorState.draft.safety;
      return `<div class="form-grid"><div class="form-group full"><label for="approvalPolicy">Approval policy</label><select class="field" id="approvalPolicy" data-editor-path="safety.approval"><option value="always" ${safety.approval === 'always' ? 'selected' : ''}>Always stop for review</option><option value="low_risk" ${safety.approval === 'low_risk' ? 'selected' : ''}>Auto-apply only low-risk changes with passing checks</option><option value="suggest" ${safety.approval === 'suggest' ? 'selected' : ''}>Suggest only; never apply automatically</option></select><div class="field-help">Human Apply remains available in the review state.</div></div><div class="form-group full"><label for="destructivePolicy">Destructive commands</label><select class="field" id="destructivePolicy" data-editor-path="safety.destructive"><option value="ask" ${safety.destructive === 'ask' ? 'selected' : ''}>Ask before running</option><option value="never" ${safety.destructive === 'never' ? 'selected' : ''}>Never run</option><option value="allow_checkpoint" ${safety.destructive === 'allow_checkpoint' ? 'selected' : ''}>Allow only after a checkpoint</option></select></div><div class="form-group full"><label for="protectedPaths">Protected paths</label><textarea class="textarea mono" id="protectedPaths" data-editor-path="safety.protectedPaths" placeholder=".env*&#10;infra/**">${esc(safety.protectedPaths || '')}</textarea><div class="field-help">One glob per line. Changes require explicit approval.</div></div><div class="form-group"><label for="stallMinutes">No-progress threshold</label><div style="display:flex;align-items:center;gap:8px"><input class="field" type="number" min="1" id="stallMinutes" data-editor-path="safety.stallMinutes" value="${Number(safety.stallMinutes || 20)}"><span class="subtle">minutes</span></div></div><div class="form-group"><label for="stallAction">When stalled</label><select class="field" id="stallAction" data-editor-path="safety.onStall"><option value="pause" ${safety.onStall === 'pause' ? 'selected' : ''}>Stop and ask for guidance</option><option value="fail" ${safety.onStall === 'fail' ? 'selected' : ''}>Mark the run failed</option><option value="checkpoint" ${safety.onStall === 'checkpoint' ? 'selected' : ''}>Checkpoint and continue once</option></select></div><div class="form-group full"><div class="notice warning"><strong>Unlimited iterations do not mean uncontrolled execution.</strong> The workflow keeps iterating until completion, while these approval, command, path, and no-progress policies provide explicit stopping conditions.</div></div></div>`;
    }

    function renderVersionHistory() {
      const versions = editorState.draft.promptVersions || [];
      if (!versions.length) return `<div class="empty-state"><strong>No saved versions yet</strong>The initial prompt will become version 1 when this workflow is created.</div>`;
      return `<div class="version-list">${versions.map(item => `<article class="version-card"><div class="version-head"><span class="version-number">Version ${item.version}</span>${item.version === editorState.original.promptVersion ? '<span class="version-current">Current</span>' : ''}<span class="version-date">${esc(dateTime(item.createdAt))}</span></div><div class="version-note">${esc(item.note)}</div><div class="version-actions"><button type="button" class="btn-small" data-action="comparePromptVersion" data-version="${item.version}">Compare</button>${item.prompt !== editorState.draft.prompt ? `<button type="button" class="btn-small" data-action="restorePromptVersion" data-version="${item.version}">Restore as draft</button>` : ''}</div></article>`).join('')}</div><div class="notice" style="margin-top:12px">Restoring creates a draft. Saving it records a new version instead of overwriting history.</div>`;
    }

    function setNested(object, path, value) {
      const parts = path.split('.');
      let cursor = object;
      parts.slice(0,-1).forEach(part => { if (!cursor[part] || typeof cursor[part] !== 'object') cursor[part] = {}; cursor = cursor[part]; });
      cursor[parts[parts.length - 1]] = value;
    }

    function addRuleToSection(prompt, section, line) {
      const header = `${section}:`;
      const lines = prompt.trim().split('\n');
      let index = lines.findIndex(item => item.trim() === header);
      if (index < 0) return `${prompt.trim()}\n\n${header}\n${line}`;
      let end = lines.length;
      for (let i = index + 1; i < lines.length; i++) {
        if (/^[A-Z][A-Za-z ]+:$/.test(lines[i].trim())) { end = i; break; }
      }
      if (lines.slice(index + 1, end).some(item => item.trim().toLowerCase() === line.trim().toLowerCase())) return prompt;
      while (end > index + 1 && !lines[end - 1].trim()) end--;
      lines.splice(end, 0, line);
      return lines.join('\n');
    }

    function defaultPromptFromInstruction(instruction, name) {
      const goal = instruction.trim().replace(/\s+/g,' ');
      return `You are the ${name || 'Local Development'} workflow.

Goal:
${goal}

Operating loop:
1. Read the trigger context and relevant repository files.
2. Choose the smallest useful next step.
3. Make one coherent change.
4. Run the narrowest relevant check.
5. Record what changed, what was learned, and whether another iteration is useful.
6. Continue without an iteration limit until complete, blocked, manually stopped, or required to pause by policy.

Completion:
Stop with a concise summary, changed files, exact checks, remaining risk, and the recommended next action.

Safety:
- Keep changes scoped to the stated goal.
- Never run destructive git commands without approval.
- Pause when the next step is ambiguous.`;
    }

    function lineDiff(before, after) {
      const a = String(before || '').split('\n');
      const b = String(after || '').split('\n');
      const table = Array.from({length:a.length + 1}, () => Array(b.length + 1).fill(0));
      for (let i = a.length - 1; i >= 0; i--) for (let j = b.length - 1; j >= 0; j--) table[i][j] = a[i] === b[j] ? table[i+1][j+1] + 1 : Math.max(table[i+1][j], table[i][j+1]);
      const result = []; let i = 0; let j = 0;
      while (i < a.length && j < b.length) {
        if (a[i] === b[j]) { result.push({type:'',text:a[i]}); i++; j++; }
        else if (table[i+1][j] >= table[i][j+1]) { result.push({type:'del',text:a[i++]}); }
        else { result.push({type:'add',text:b[j++]}); }
      }
      while (i < a.length) result.push({type:'del',text:a[i++]});
      while (j < b.length) result.push({type:'add',text:b[j++]});
      return result;
    }

    function buildPromptProposal(instruction) {
      const wf = editorState.draft;
      const generation = ++editorState.proposalGeneration;
      let next = wf.prompt.trim() || defaultPromptFromInstruction(instruction, wf.name);
      const lower = instruction.toLowerCase();
      const summary = [];
      const variation = generation % 3;
      if (!wf.prompt.trim()) summary.push({ section:'Goal', text:'Created an initial goal and unlimited operating loop from your description.' });
      if (/small|minimal|scope|style|format/.test(lower)) {
        const rule = variation === 1 ? '- Prefer the smallest patch that fully addresses the issue; do not include style-only edits unless requested.' : variation === 2 ? '- Keep each patch narrowly scoped and exclude unrelated formatting or cleanup.' : '- Make one minimal, reviewable change at a time and leave unrelated code untouched.';
        next = addRuleToSection(next, 'Safety', rule);
        summary.push({ section:'Safety', text:'Tightened patch scope and excluded unrelated style-only work.' });
      }
      if (/test|check|verify|typecheck|lint/.test(lower)) {
        const rule = variation === 1 ? '7. Run the narrowest relevant check after each change, then broader checks before approval.' : variation === 2 ? '7. Verify locally after every coherent change and report the exact command and result.' : '7. Prefer focused verification first; run the broader suite only after focused checks pass.';
        next = addRuleToSection(next, 'Operating loop', rule);
        summary.push({ section:'Loop', text:'Made focused checks part of every iteration and broader checks part of completion.' });
      }
      if (/summary|summar|report|approval|review/.test(lower)) {
        const rule = variation === 1 ? '- When stopping for approval, include cause, changed files, risk, exact checks, and the recommended next action.' : variation === 2 ? '- Make every approval summary decision-ready: intent, diff, verification, risk, and next step.' : '- End with a concise review packet covering intent, files, checks, risk, and recommendation.';
        next = addRuleToSection(next, 'Completion', rule);
        summary.push({ section:'Completion', text:'Expanded the approval summary into a decision-ready review packet.' });
      }
      if (/loop|iteration|progress|stuck|repeat|unlimited/.test(lower)) {
        const rule = variation === 1 ? '8. At the end of each iteration, record what changed, what was learned, and whether another iteration is likely to make progress.' : variation === 2 ? '8. Treat iteration count as history, not a limit; continue until complete or a stopping policy applies.' : '8. After every iteration, log progress and stop when the next iteration is unlikely to help.';
        next = addRuleToSection(next, 'Operating loop', rule);
        summary.push({ section:'Loop', text:'Made iteration progress explicit without introducing an artificial maximum.' });
      }
      if (/auth|security|destructive|permission|protected|sensitive/.test(lower)) {
        const rule = '- Ask before changing authentication, authorization, secrets, destructive commands, or protected paths.';
        next = addRuleToSection(next, 'Safety', rule);
        summary.push({ section:'Safety', text:'Added an explicit approval boundary around sensitive behavior.' });
      }
      if (!summary.length && wf.prompt.trim()) {
        next = addRuleToSection(next, 'Requested behavior', `- ${instruction.trim().replace(/\s+/g,' ')}`);
        summary.push({ section:'Behavior', text:'Added the requested behavior as an explicit instruction while preserving the existing prompt.' });
      }
      return { generation, instruction, sourcePrompt:wf.prompt, prompt:next, summary, diff:lineDiff(wf.prompt, next), createdAt:Date.now() };
    }

    function openModal(title, body, footer, context = {}) {
      lastFocusedElement = document.activeElement;
      modalState = context;
      byId('modalTitle').textContent = title;
      byId('modalBody').innerHTML = body;
      byId('modalFooter').innerHTML = footer;
      const modal=byId('modal');
      modal.hidden=false;

    async function copyText(label, text) {

    function mutateRun(id, allowedStatuses, callback) {

    function selectRun(id) {
      const run = runById(id);

      state.activeTab = 'summary';

    }

    function startWorkflow(workflowId, copiedFromRun = null) {

        id: uid('run'), workflowId: workflow.id, repository:targetRepository, status:'running', trigger:'manual', branch:targetBranch, commit:'working tree', iteration:1,

      renderAll();

    }

      openModal(workflow.name, `<p class="muted">${esc(workflow.description)}</p><div class="metric-grid"><div class="metric"><div class="metric-label">Trigger</div><div class="metric-value">${esc(triggerLabels[workflow.trigger.type])}</div></div><div class="metric"><div class="metric-label">Prompt</div><div class="metric-value">Version ${workflow.promptVersion}</div></div><div class="metric"><div class="metric-label">Automatic runs</div><div class="metric-value">${automatic ? 'Enabled' : 'Paused'}</div></div><div class="metric"><div class="metric-label">Approval</div><div class="metric-value">${esc(workflow.safety.approval === 'always' ? 'Always review' : workflow.safety.approval === 'suggest' ? 'Suggest only' : 'Low risk')}</div></div></div>`, `<button type="button" data-action="closeModal">Close</button><button type="button" class="mini-icon ${workflow.pinned ? 'new-workflow-icon' : ''}" data-action="toggleWorkflowPin" data-id="${esc(id)}" aria-label="${workflow.pinned ? 'Unpin from top' : 'Pin to top'}" title="${workflow.pinned ? 'Unpin from top' : 'Pin to top'}">📌</button><button type="button" data-action="editWorkflowFromModal" data-id="${esc(id)}">Edit workflow</button><button type="button" class="btn-primary" data-action="runWorkflow" data-id="${esc(id)}">Run now</button>`, { kind:'workflow-menu', workflowId:id });
    }

    function requestStopRun(id) {
      const run = runById(id);
      if (!run || run.status !== 'running') return;
      if (!state.settings.confirmDestructive) return executeStopRun(id);
      openModal('Stop this run?', `<p class="muted">The agent will stop after the current operation. Draft files, logs, notes, and iteration ${run.iteration} will remain available, and you can resume later.</p><div class="notice">Stopping does not discard the worktree or end the workflow permanently.</div>`, `<button type="button" data-action="closeModal">Keep running</button><button type="button" class="btn-danger" data-action="confirmStopRun" data-id="${esc(id)}">Stop and preserve work</button>`, { kind:'stop-run', runId:id });
    }

    function executeStopRun(id) {
      mutateRun(id, ['running'], run => {
        const now = Date.now();
        run.activeMs = runtimeMs(run, now); run.status = 'stopped'; run.endedAt = now; run.stateEnteredAt = now; run.heartbeatAt = null; run.activityAt = now;
        run.currentActivity = 'Stopped manually'; run.currentAction = 'Draft files, logs, and the current iteration were preserved.';

        }

    }

    function resumeRun(id) {

        run.events.push({at:now,text:`Resumed preserved state for iteration ${run.iteration}.`,type:'state'});

    function openGuidanceModal(id, mode) {
      const run = runById(id); if (!run) return;
      const title = mode === 'revision' ? 'Request changes' : mode === 'guidance' ? 'Send guidance to the agent' : 'Retry with guidance';
      const intro = mode === 'revision' ? 'The current proposal stays preserved. Your instruction starts a new iteration in this same run.' : mode === 'guidance' ? 'This note is added to the active iteration without restarting it.' : 'Artifacts remain preserved. Your instruction starts the next iteration in this run.';
      openModal(title, `<p class="muted">${esc(intro)}</p><div class="form-group"><label for="guidanceText">Instruction</label><textarea id="guidanceText" class="textarea" style="min-height:120px" placeholder="Explain what should change, what to preserve, or what decision to make next."></textarea><div class="validation" id="guidanceError"></div></div>`, `<button type="button" data-action="closeModal">Cancel</button><button type="button" class="btn-primary" data-action="submitGuidance" data-id="${esc(id)}" data-mode="${esc(mode)}">${mode === 'guidance' ? 'Send guidance' : mode === 'revision' ? 'Start next iteration' : 'Retry'}</button>`, { kind:'guidance', runId:id, mode });
    }

    function submitGuidance(id, mode) {
      const text = byId('guidanceText')?.value.trim();
      if (!text) { byId('guidanceError').textContent = 'Add an instruction before continuing.'; byId('guidanceText').focus(); return; }
      if (mode === 'guidance') {
        mutateRun(id,['running'],run => { const now=Date.now(); run.notes.push({id:uid('note'),at:now,text,author:'Tom'}); run.events.push({at:now,text:`Human guidance received: ${text}`,type:'guidance'}); run.activityAt=now; run.currentActivity='Incorporating new guidance'; run.currentAction=text; });
        closeModal(); toast('Guidance sent', 'The active iteration continues with the new instruction.'); return;
      }
      const allowed = mode === 'revision' ? ['review'] : ['failed'];
      mutateRun(id,allowed,run => {
        const now=Date.now(); run.iteration += 1; run.status='running'; run.endedAt=null; run.stateEnteredAt=now; run.heartbeatAt=now; run.activityAt=now; run.checkStatus='stale';
        run.checks.forEach(check => { check.status='stale'; if (!String(check.output).startsWith('Previous result:')) check.output=`Previous result: ${check.output}`; });
        run.currentActivity = mode === 'revision' ? `Starting revision in iteration ${run.iteration}` : `Retrying in iteration ${run.iteration}`; run.currentAction=text;
        run.files.forEach(file => { if (!['applied','rejected'].includes(file.decision)) file.decision='draft'; });
        run.notes.push({id:uid('note'),at:now,text,author:'Tom'}); run.events.push({at:now,text:`Iteration ${run.iteration} started with guidance: ${text}`,type:'state'});
        run.iterations.push({iteration:run.iteration,title:mode === 'revision' ? 'Requested revision' : 'Guided retry',summary:text,state:'running',duration:'0s'});
        state.view = 'running';
      });
      closeModal(); toast(mode === 'revision' ? 'Revision started' : 'Retry started', `The run is now working in iteration ${runById(id)?.iteration}.`);
    }

    function requestRejectRun(id) {
      const run=runById(id); if(!run||run.status!=='review') return;
      openModal('Reject this proposal?', `<p class="muted">No files will be applied. The diff, checks, notes, and rejection reason remain attached to the run.</p><div class="form-group"><label for="rejectionReason">Reason</label><textarea id="rejectionReason" class="textarea" placeholder="Why are you rejecting this result?"></textarea><div class="validation" id="rejectionError"></div></div>`, `<button type="button" data-action="closeModal">Cancel</button><button type="button" class="btn-danger" data-action="confirmRejectRun" data-id="${esc(id)}">Reject proposal</button>`, {kind:'reject-run',runId:id});

      closeModal();toast('Proposal rejected','The working tree was not changed.');

    function requestApplyRun(id) {
      const run=runById(id);if(!run||run.status!=='review')return;
      const included=run.files.filter(file=>file.decision==='included');
      if(run.checkStatus!=='passed'||!included.length){toast('This run is not ready to apply','All checks must pass and at least one file must be included.');return;}
      openModal('Apply selected files?', `<p class="muted">Apply ${included.length} ${included.length===1?'file':'files'} to <span class="mono">${esc(run.branch)}</span>. Excluded files will remain unapplied in the run record.</p><div class="notice success"><strong>Checks passed.</strong> ${esc(run.checks.map(check=>check.name).join(', '))}</div><div class="file-list" style="margin-top:10px">${included.map(file=>`<div class="file-card"><div class="file-head"><span class="file-name">${esc(file.path)}</span><span class="diff-count"><span class="plus">+${file.add}</span> <span class="minus">−${file.del}</span></span></div></div>`).join('')}</div>`, `<button type="button" data-action="closeModal">Cancel</button><button type="button" class="btn-success" data-action="confirmApplyRun" data-id="${esc(id)}">Apply to ${esc(run.branch)}</button>`, {kind:'apply-run',runId:id});
    }

    function confirmApplyRun(id) {
      const run=runById(id);if(!run||run.status!=='review'){closeModal();return;}
      const included=run.files.filter(file=>file.decision==='included');if(run.checkStatus!=='passed'||!included.length){closeModal();return;}
      run.status='applying';run.stateEnteredAt=Date.now();run.activityAt=Date.now();run.currentActivity='Applying selected files';run.currentAction=`Writing ${included.length} reviewed ${included.length===1?'file':'files'} to ${run.branch}.`;run.events.push({at:Date.now(),text:`Applying ${included.length} reviewed files to ${run.branch}.`,type:'state'});state.view='all';persist();closeModal();renderAll();
      setTimeout(()=>{const current=runById(id);if(!current||current.status!=='applying')return;const now=Date.now();current.activeMs=runtimeMs(current,now);current.status='completed';current.endedAt=now;current.stateEnteredAt=now;current.activityAt=now;current.currentActivity=`Applied to ${current.branch}`;current.currentAction='The selected files were applied successfully. Excluded files were left unchanged.';current.changes={add:included.reduce((sum,file)=>sum+Number(file.add||0),0),del:included.reduce((sum,file)=>sum+Number(file.del||0),0),state:'applied'};current.files.forEach(file=>{if(file.decision==='included')file.decision='applied';});current.summarySteps.push(`Applied ${included.length} reviewed ${included.length===1?'file':'files'} to ${current.branch}.`);current.events.push({at:now,text:'Apply finished. Run completed.',type:'state'});const iteration=current.iterations.find(item=>item.iteration===current.iteration);if(iteration)iteration.state='completed';state.activeTab='summary';renderAll();toast('Changes applied',`${included.length} ${included.length===1?'file was':'files were'} applied to ${current.branch}.`);},850);
    }

    function includeFile(runId,path,include) {

    }

    function openFileComment(runId,path) {

    }

    }

    function requestArchiveRun(id) {

    }

    function rerunChecks(id) {
      const run=runById(id);if(!run||!['review','failed','stopped'].includes(run.status)||run.checkStatus==='running')return;
      const token=uid('checks');run.checkRunToken=token;run.checkStatus='running';run.checks.forEach(check=>{check.status='running';check.output='Running…';check.duration='—';});run.activityAt=Date.now();run.events.push({at:Date.now(),text:'Rerunning verification checks.','type':'check'});persist();renderAll();toast('Checks started','This demo will finish them in a moment.');
      setTimeout(()=>{const current=runById(id);if(!current||current.checkRunToken!==token||current.archived||!['review','failed','stopped'].includes(current.status))return;delete current.checkRunToken;current.checkStatus='passed';current.checks.forEach((check,index)=>{check.status='passed';check.output=index===0?'118 passed, 0 failed':'No errors found';check.duration=index===0?'21.2s':'8.1s';});current.activityAt=Date.now();current.events.push({at:Date.now(),text:'Verification checks passed.','type':'check'});renderAll();toast('Checks passed','Verification is up to date.');},1200);
    }

    function simulateProgress(id) {

          if(!run.files.length){run.files=[{path:'src/cleanup/removeDeprecated.ts',add:14,del:8,decision:'included',diff:['-export const deprecatedHelper = legacyHelper;','+export const formatCandidate = modernHelper;']}];run.changes={add:14,del:8,state:'draft'};}else run.files.forEach(file=>file.decision='included');

    function explainRun(id) {

    function openSettings() {
      const s=state.settings;
      openModal('Workbench settings', `<div class="form-grid"><div class="form-group"><label for="settingDensity">Display density</label><select class="field" id="settingDensity"><option value="comfortable" ${s.density==='comfortable'?'selected':''}>Comfortable</option><option value="compact" ${s.density==='compact'?'selected':''}>Compact</option></select><div class="field-help">Changes row and control height visibly.</div></div><div class="form-group"><label for="settingEditor">Local editor</label><select class="field" id="settingEditor"><option ${s.editor==='Cursor'?'selected':''}>Cursor</option><option ${s.editor==='VS Code'?'selected':''}>VS Code</option><option ${s.editor==='Zed'?'selected':''}>Zed</option></select></div><div class="form-group"><label for="settingDefaultView">Default run view</label><select class="field" id="settingDefaultView"><option value="all" ${s.defaultView==='all'?'selected':''}>All runs</option><option value="review" ${s.defaultView==='review'?'selected':''}>Needs review</option><option value="running" ${s.defaultView==='running'?'selected':''}>Running</option></select></div><div class="form-group full"><label class="safety-option"><input type="checkbox" id="settingConfirm" ${s.confirmDestructive?'checked':''}><span><span class="safety-title">Confirm stop, reject, and archive actions</span><span class="safety-copy">Adds a review step before actions that end or hide work.</span></span></label></div><div class="form-group full"><label class="safety-option"><input type="checkbox" id="settingAlerts" ${s.inAppAlerts?'checked':''}><span><span class="safety-title">In-app completion alerts</span><span class="safety-copy">Shows small local notifications when runs and checks change state.</span></span></label></div></div><div class="notice" style="margin-top:14px">Demo state is saved locally in this browser and uses no network requests.</div>`, `<button type="button" class="btn-danger" data-action="requestResetDemo">Reset demo data</button><span style="flex:1"></span><button type="button" data-action="closeModal">Cancel</button><button type="button" class="btn-primary" data-action="saveSettings">Save settings</button>`, {kind:'settings'});
    }

    function saveSettings() {
      state.settings.density=byId('settingDensity').value;state.settings.editor=byId('settingEditor').value;state.settings.defaultView=byId('settingDefaultView').value;state.settings.confirmDestructive=byId('settingConfirm').checked;state.settings.inAppAlerts=byId('settingAlerts').checked;persist();closeModal();renderAll();toast('Settings saved',`Display density is now ${state.settings.density}.`,{force:true});
    }

    function requestResetDemo() {
      openModal('Reset the prototype?', `<p class="muted">This restores the original workflows, runs, prompt versions, settings, notes, and filters. Changes made while testing the prototype will be removed.</p>`, `<button type="button" data-action="openSettings">Cancel</button><button type="button" class="btn-danger" data-action="confirmResetDemo">Reset everything</button>`, {kind:'reset-demo'});
    }

    function resetDemo() {
      localStorage.removeItem(STORAGE_KEY);state=deepClone(initialState);closeModal();renderAll();toast('Demo reset','The original example data has been restored.',{force:true});
    }

    function saveWorkflow() {
      if(!editorState)return;
      if(hasUnappliedAIWork()){editorState.tab='behavior';renderWorkflowEditor();toast('Apply or clear the AI work first','The instruction or proposal has not changed the draft yet.');return;}
      const wf=editorState.draft;
      editorState.errors={};
      if(!wf.name.trim())editorState.errors.name='Workflow name is required.';
      if(state.workflows.some(item=>item.id!==wf.id&&item.scope.repository===wf.scope.repository&&item.name.trim().toLowerCase()===wf.name.trim().toLowerCase()))editorState.errors.name='A workflow with this name already exists in the repository.';
      if(!wf.prompt.trim())editorState.errors.prompt='Generate or write a workflow prompt first.';
      if(!wf.trigger.branchPattern?.trim())editorState.errors.trigger='Add at least one branch name or glob pattern.';
      if(wf.trigger.type==='file_watch'&&!wf.trigger.paths?.trim())editorState.errors.trigger='Add at least one watched path for the file-watch trigger.';
      if(wf.trigger.type==='test_failure'&&!wf.trigger.testCommand?.trim())editorState.errors.trigger='Add the test command that produces the failure event.';
      if(wf.trigger.type==='schedule'&&(!wf.trigger.time||!wf.trigger.timezone))editorState.errors.trigger='Choose both a scheduled time and timezone.';
      if(Object.keys(editorState.errors).length){editorState.tab=editorState.errors.name||editorState.errors.prompt?'behavior':'trigger';renderWorkflowEditor();toast('Workflow needs attention','Fix the highlighted fields before saving.');return;}
      const now=Date.now();const changed=promptChanged();
      if(editorState.mode==='new'){
        wf.promptVersion=1;wf.promptUpdatedAt=now;wf.promptVersions=[{version:1,prompt:wf.prompt,note:editorState.revisionNote||editorState.instruction||'Initial generated prompt',createdAt:now}];state.workflows.push(deepClone(wf));state.currentRepo=wf.scope.repository;state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[wf.scope.repository]||'main';state.workflowFilter=wf.id;state.view='all';
        closeWorkflowEditor();renderAll();toast('Workflow created',`${wf.name} is ready. Manual Run now is available immediately.`);return;
      }
      if(changed){wf.promptVersion=editorState.original.promptVersion+1;wf.promptUpdatedAt=now;wf.promptVersions=[{version:wf.promptVersion,prompt:wf.prompt,note:editorState.revisionNote||editorState.appliedInstruction||'Prompt updated',createdAt:now},...(editorState.original.promptVersions||[])];}
      const index=state.workflows.findIndex(item=>item.id===wf.id);if(index>=0)state.workflows[index]=deepClone(wf);
      if (editorState.original.scope.repository !== wf.scope.repository) { state.currentRepo=wf.scope.repository; state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[wf.scope.repository]||'main'; state.workflowFilter=wf.id; }
      closeWorkflowEditor();renderAll();toast(changed?'Prompt revision saved':'Workflow settings saved',changed?`Future runs will use version ${wf.promptVersion}. Active runs keep their pinned version.`:'Trigger and safety settings were updated.');
    }

    function comparePromptVersion(versionNumber) {
      const item=editorState?.draft.promptVersions?.find(value=>value.version===versionNumber);if(!item)return;
      const diff=lineDiff(item.prompt,editorState.draft.prompt);
      openModal(`Compare version ${versionNumber} with draft`, `<div class="notice">Red lines are from version ${versionNumber}; green lines are in the current draft.</div><pre class="diff" style="margin-top:12px;max-height:55vh">${diff.map(line=>`<span class="diff-line ${line.type}">${esc((line.type==='add'?'+':line.type==='del'?'-':' ')+line.text)}</span>`).join('')}</pre>`, `<button type="button" data-action="closeModal">Close comparison</button><button type="button" data-action="restorePromptVersion" data-version="${versionNumber}">Restore version ${versionNumber} as draft</button>`, {kind:'compare-version',version:versionNumber});
    }

    function restorePromptVersion(versionNumber) {
      const item=editorState?.draft.promptVersions?.find(value=>value.version===Number(versionNumber));if(!item)return;
      editorState.draft.prompt=item.prompt;editorState.revisionNote=`Restore version ${item.version}: ${item.note}`;editorState.proposal=null;editorState.sourceEditing=false;editorState.tab='behavior';closeModal();renderWorkflowEditor();toast('Version restored to draft',`Saving will create version ${editorState.original.promptVersion+1}; history remains intact.`);
    }

    function toggleSidebar() {
      byId('sidebar').classList.toggle('open');
      byId('sidebarBackdrop').classList.toggle('open',byId('sidebar').classList.contains('open'));
      const button=document.querySelector('.mobile-menu');if(button)button.setAttribute('aria-label',byId('sidebar').classList.contains('open')?'Close navigation':'Open navigation');
    }

    function toggleWorkflowRun(workflowId) {
      const activeRun = state.runs.find(run => run.repository === state.currentRepo && run.workflowId === workflowId && run.status === 'running' && !run.archived);
      if (activeRun) return executeStopRun(activeRun.id);
      startWorkflow(workflowId);
    }

    function toggleWorkflowPin(workflowId) {
      const workflow = workflowById(workflowId);
      if (!workflow) return;
      workflow.pinned = !workflow.pinned;
      persist(); closeModal(); renderWorkflows();
      toast(workflow.pinned ? 'Workflow pinned' : 'Workflow unpinned', `${workflow.name} ${workflow.pinned ? 'will appear at the top.' : 'will use the selected order.'}`);
    }

    function addDirectoryModal() {
      openModal('Add working directory', `<div class="form-group"><label for="directoryPath">Directory path</label><input id="directoryPath" class="field mono" placeholder="C:\\source\\new-project"><div class="field-help">This creates a new local workspace entry in the mockup.</div><div class="validation" id="directoryPathError"></div></div>`, `<button type="button" data-action="closeModal">Cancel</button><button type="button" class="btn-primary" data-action="saveDirectory">Add directory</button>`, { kind:'add-directory' });
    }

    function saveDirectory() {
      const path = byId('directoryPath')?.value.trim();
      if (!path) { byId('directoryPathError').textContent = 'Enter a directory path.'; return; }
      if (state.directories.some(directory => directory.path.toLowerCase() === path.toLowerCase())) { byId('directoryPathError').textContent = 'That directory is already listed.'; return; }
      const id = uid('directory'); state.directories.push({ id, path }); state.currentRepo = id; state.currentBranch = 'main'; state.workflowFilter = null; state.view = 'all';
      persist(); closeModal(); renderAll(); toast('Directory added', `${path} is now the active workspace.`);
    }

    function bindRunSplitter() {
      const split = byId('runSplit');
      const handle = byId('runResizeHandle');
      if (!split || !handle) return;
      const setHeight = clientY => {
        const bounds = split.getBoundingClientRect();
        const min = 0;
        const max = Math.max(min, bounds.height - handle.offsetHeight);
        const height = Math.min(max, Math.max(min, clientY - bounds.top));
        split.style.setProperty('--runs-pane-height', `${height}px`);
        handle.setAttribute('aria-valuenow', String(Math.round(height / bounds.height * 100)));
      };
      handle.addEventListener('pointerdown', event => {
        if (window.innerWidth <= 900) return;
        event.preventDefault(); handle.setPointerCapture(event.pointerId); handle.classList.add('dragging'); setHeight(event.clientY);
      });
      handle.addEventListener('pointermove', event => { if (handle.hasPointerCapture(event.pointerId)) setHeight(event.clientY); });
      handle.addEventListener('pointerup', event => { if (handle.hasPointerCapture(event.pointerId)) handle.releasePointerCapture(event.pointerId); handle.classList.remove('dragging'); });
      handle.addEventListener('keydown', event => {
        if (!['ArrowUp','ArrowDown','Home','End'].includes(event.key)) return;
        event.preventDefault(); const bounds = split.getBoundingClientRect(); const current = parseFloat(getComputedStyle(split).getPropertyValue('--runs-pane-height')) || bounds.height * .42;
        const next = event.key === 'Home' ? 0 : event.key === 'End' ? bounds.height - handle.offsetHeight : current + (event.key === 'ArrowUp' ? -32 : 32);
        setHeight(bounds.top + next);
      });
    }

    function handleAction(action, element) {
      const id=element.dataset.id;
      if(action==='toggleSidebar')return toggleSidebar();
      if(action==='setView'){state.view=element.dataset.view;state.workflowFilter=null;state.activeTab='summary';renderAll();return;}
      if(action==='selectWorkflow'){state.workflowFilter=state.workflowFilter===id?null:id;state.view='all';state.activeTab='summary';renderAll();if(window.innerWidth<=900)toggleSidebar();return;}
      if(action==='workflowMenu')return showWorkflowMenu(id);
      if(action==='toggleWorkflowPin')return toggleWorkflowPin(id);
      if(action==='newWorkflow')return openWorkflowEditor();
      if(action==='addDirectory')return addDirectoryModal();
      if(action==='saveDirectory')return saveDirectory();
      if(action==='toggleWorkflowRun')return toggleWorkflowRun(id);
      if(action==='editWorkflowFromModal'){closeModal();return openWorkflowEditor(id);}
      if(action==='runWorkflow')return startWorkflow(id);
      if(action==='selectRun')return selectRun(id);
      if(action==='setTab'){state.activeTab=element.dataset.tab;renderDetail();persist();return;}
      if(action==='showChanges'){state.activeTab='changes';renderDetail();return;}
      if(action==='followRun'){state.followingRunId=state.followingRunId===id?null:id;state.activeTab='activity';renderDetail();persist();return;}
      if(action==='stopRun')return requestStopRun(id);
      if(action==='confirmStopRun')return executeStopRun(id);
      if(action==='resumeRun')return resumeRun(id);
      if(action==='requestChanges')return openGuidanceModal(id,'revision');
      if(action==='retryRun')return openGuidanceModal(id,'retry');
      if(action==='sendGuidance')return openGuidanceModal(id,'guidance');
      if(action==='submitGuidance')return submitGuidance(id,element.dataset.mode);
      if(action==='rejectRun')return requestRejectRun(id);
      if(action==='confirmRejectRun')return confirmRejectRun(id);
      if(action==='applyRun')return requestApplyRun(id);
      if(action==='confirmApplyRun')return confirmApplyRun(id);
      if(action==='includeFile')return includeFile(id,element.dataset.file,true);
      if(action==='excludeFile')return includeFile(id,element.dataset.file,false);
      if(action==='commentFile')return openFileComment(id,element.dataset.file);
      if(action==='saveFileComment')return saveFileComment(id,element.dataset.file);
      if(action==='openFile'){const run=runById(id);toast('Open file',`Would open ${element.dataset.file} in ${state.settings.editor} on ${run?.branch||state.currentBranch}.`);return;}
      if(action==='openEditor'){const run=runById(id);toast('Open editor',`Would open ${state.settings.editor} on ${run?.branch||state.currentBranch}.`);return;}
      if(action==='archiveRun')return requestArchiveRun(id);
      if(action==='confirmArchiveRun')return executeArchiveRun(id);
      if(action==='runAgain'){const source=runById(id);if(source)return startWorkflow(source.workflowId,id);}
      if(action==='rerunChecks')return rerunChecks(id);
      if(action==='simulateProgress')return simulateProgress(id);
      if(action==='addNote')return addNoteModal(id);
      if(action==='saveRunNote')return saveRunNote(id);
      if(action==='explainRun')return explainRun(id);
      if(action==='copyExplanation'){const run=runById(id);if(run)return copyText('Explanation',`${workflowById(run.workflowId)?.name}: ${run.currentActivity}\n${run.currentAction}\nIteration ${run.iteration}; ${checkLabels[run.checkStatus]}; risk ${run.risk}.`);}
      if(action==='copySnapshot'){const run=runById(id);if(run)return copyText('Snapshot',`${workflowById(run.workflowId)?.name} — ${statusMeta[run.status]?.label}\nBranch: ${run.branch} · Commit: ${run.commit}\nIteration ${run.iteration}\nActivity: ${run.currentActivity}\n${run.currentAction}\nChecks: ${checkLabels[run.checkStatus]}\nElapsed: ${durationText(runtimeMs(run))}`);}
      if(action==='copyLog'){const run=runById(id);if(run)return copyText('Log',(run.events||[]).slice().sort((a,b)=>a.at-b.at).map(item=>`[${new Date(item.at).toISOString()}] ${item.text}`).join('\n'));}
      if(action==='copyChecks'){const run=runById(id);if(run)return copyText('Check output',(run.checks||[]).map(check=>`${check.name}: ${check.status}\n${check.output}`).join('\n\n'));}
      if(action==='toggleGlobalPause'){state.automationsPaused=!state.automationsPaused;renderAll();toast(state.automationsPaused?'Automatic triggers paused':'Automatic triggers resumed',state.automationsPaused?'Running workflows continue; manual Run now remains available.':'Enabled workflow triggers can start new runs again.');return;}
      if(action==='clearWorkflowFilter'){state.workflowFilter=null;renderAll();return;}
      if(action==='clearTriggerFilter'){state.triggerFilter='all';renderAll();return;}
      if(action==='clearRunSearch'){state.runSearch='';renderAll();return;}
      if(action==='clearRunFilters'){state.workflowFilter=null;state.triggerFilter='all';state.runSearch='';state.view='all';renderAll();return;}
      if(action==='openSettings')return openSettings();
      if(action==='saveSettings')return saveSettings();
      if(action==='requestResetDemo')return requestResetDemo();
      if(action==='confirmResetDemo')return resetDemo();
      if(action==='closeModal')return closeModal();
      if(action==='requestCloseWorkflow')return requestCloseWorkflow();
      if(action==='discardWorkflowChanges'){closeModal();return closeWorkflowEditor();}
      if(action==='setEditorTab'){editorState.tab=element.dataset.tab;renderWorkflowEditor();return;}
      if(action==='usePromptExample'){editorState.instruction=element.dataset.value||'';const input=byId('workflowInstruction');if(input){input.value=editorState.instruction;input.focus();}return;}
      if(action==='focusPromptInstruction'){byId('workflowInstruction')?.focus();return;}
      if(action==='generatePromptProposal'){
        const instruction=byId('workflowInstruction')?.value.trim()||editorState.instruction.trim();
        if(!instruction){toast('Describe the behavior first','Add a plain-language instruction before generating a proposal.');byId('workflowInstruction')?.focus();return;}
        editorState.instruction=instruction;editorState.proposal=buildPromptProposal(instruction);renderWorkflowEditor();return;
      }
      if(action==='applyPromptProposal'){
        const proposal=editorState.proposal;if(!proposal||proposal.sourcePrompt!==editorState.draft.prompt)return;
        editorState.draft.prompt=proposal.prompt;editorState.revisionNote=proposal.instruction;editorState.appliedInstruction=proposal.instruction;editorState.proposal=null;editorState.sourceEditing=false;renderWorkflowEditor();toast('Proposal applied to draft','The saved workflow is still unchanged until you use the footer action.');return;
      }
      if(action==='discardPromptProposal'){editorState.proposal=null;renderWorkflowEditor();toast('Proposal discarded','The draft prompt was not changed.');return;}
      if(action==='toggleDirectPromptEdit'){editorState.sourceEditing=!editorState.sourceEditing;if(!editorState.sourceEditing&&promptChanged())editorState.revisionNote='Direct prompt edit';renderWorkflowEditor();if(editorState.sourceEditing)setTimeout(()=>byId('promptSource')?.focus(),0);return;}
      if(action==='copyWorkflowPrompt')return copyText('Workflow prompt',editorState?.draft.prompt||'');
      if(action==='saveWorkflow')return saveWorkflow();
      if(action==='comparePromptVersion')return comparePromptVersion(Number(element.dataset.version));
      if(action==='restorePromptVersion')return restorePromptVersion(Number(element.dataset.version));
    }

    document.addEventListener('click',event=>{
      if(event.target===byId('modalBackdrop')){closeModal();return;}
      const element=event.target.closest('[data-action]');
      if(!element||element.matches('select,input[type="checkbox"]'))return;
      handleAction(element.dataset.action,element);
    });

    document.addEventListener('change',event=>{
      const target=event.target;
      if(target.dataset.action==='changeRepo'){
        state.currentRepo=target.value;state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[target.value]||'main';state.view=state.settings.defaultView;state.workflowFilter=null;state.triggerFilter='all';state.runSearch='';state.activeTab='summary';renderAll();return;
      }
      if(target.dataset.action==='changeBranch'){state.currentBranch=target.value;persist();toast('Branch context changed',`Manual runs will start on ${state.currentBranch}.`);return;}
      if(target.dataset.action==='changeDirectory'){state.currentRepo=target.value;state.currentBranch={ 'my-app':'feature/login','payments-api':'main','design-system':'release/next' }[target.value]||'main';state.workflowFilter=null;state.view=state.settings.defaultView;state.triggerFilter='all';state.runSearch='';state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeTriggerFilter'){state.triggerFilter=target.value;state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeRunStatusFilter'){state.view=target.value;state.activeTab='summary';renderAll();return;}
      if(target.dataset.action==='changeWorkflowSort'){state.workflowSort=target.value;renderWorkflows();persist();return;}
      if(target.dataset.action==='changeSort'){state.sort=target.value;renderAll();return;}
      if(target.dataset.action==='toggleWorkflow'){
        const workflow=workflowById(target.dataset.id);if(!workflow)return;workflow.enabled=target.checked;persist();renderWorkflows();toast(workflow.enabled?'Workflow enabled':'Workflow disabled',workflow.enabled?(state.automationsPaused?'Its trigger remains globally paused; manual runs are available.':'Automatic triggers can start future runs.'):'Manual Run now remains available.');return;
      }
      if(editorState&&target.dataset.editorPath){
        let value=target.type==='checkbox'?target.checked:target.type==='number'?Number(target.value):target.value;setNested(editorState.draft,target.dataset.editorPath,value);
        if(target.dataset.editorPath==='trigger.type'){
          const type=value;const branch=editorState.draft.trigger.branchPattern||'current branch';editorState.draft.trigger={type,branchPattern:branch,...(type==='schedule'?{cadence:'weekdays',time:'02:30',timezone:'America/Chicago'}:type==='file_watch'?{paths:'src/**',ignore:'**/*.generated.*',debounceSeconds:5}:type==='post_commit'?{authors:'human',hookBehavior:'after_each_commit',debounceSeconds:10}:type==='test_failure'?{testCommand:'npm test',eventSource:'local test wrapper',cooldownSeconds:30}:{})};renderWorkflowEditor();
        }else renderEditorFooter();
      }
    });

    document.addEventListener('input',event=>{
      const target=event.target;
      if(target.id==='workflowSearch'){state.workflowSearch=target.value;renderWorkflows();persist();return;}
      if(target.id==='runSearch'){state.runSearch=target.value;ensureSelection();renderRuns();renderActiveFilters();renderDetail();persist();return;}
      if(!editorState)return;
      if(target.id==='workflowInstruction'){editorState.instruction=target.value;return;}
      if(target.id==='promptSource'){
        editorState.draft.prompt=target.value;editorState.revisionNote='Direct prompt edit';renderEditorFooter();return;
      }
      if(target.dataset.editorPath){let value=target.type==='number'?Number(target.value):target.value;setNested(editorState.draft,target.dataset.editorPath,value);if(target.dataset.editorPath==='name')editorState.errors.name='';renderEditorFooter();}
    });

    function trapFocus(event,container) {
      const nodes=[...container.querySelectorAll('button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex="0"]')].filter(node=>node.offsetParent!==null);
      if(!nodes.length)return;
      const first=nodes[0],last=nodes[nodes.length-1];
      if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus();}
      else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus();}
    }

    document.addEventListener('keydown',event=>{
      const modalOpen=byId('modal').classList.contains('open');const drawerOpen=byId('workflowDrawer').classList.contains('open');
      if(event.key==='Tab'&&modalOpen)return trapFocus(event,byId('modal'));
      if(event.key==='Tab'&&drawerOpen)return trapFocus(event,byId('workflowDrawer'));
      if(event.key==='Escape'){
        if(modalOpen){event.preventDefault();closeModal();return;}
        if(drawerOpen){event.preventDefault();requestCloseWorkflow();return;}
        if(byId('sidebar').classList.contains('open')){event.preventDefault();toggleSidebar();return;}
        if(state.workflowFilter||state.triggerFilter!=='all'||state.runSearch){event.preventDefault();state.workflowFilter=null;state.triggerFilter='all';state.runSearch='';renderAll();return;}
      }
      const actionable=event.target.closest?.('[data-action="selectRun"]');
      if(actionable&&(event.key==='Enter'||event.key===' ')){event.preventDefault();selectRun(actionable.dataset.id);return;}
      if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)||modalOpen||drawerOpen)return;
      if(event.key==='j'||event.key==='k'){
        const runs=visibleRuns();if(!runs.length)return;event.preventDefault();let index=runs.findIndex(run=>run.id===state.selectedRunId);index=event.key==='j'?Math.min(runs.length-1,index+1):Math.max(0,index-1);selectRun(runs[index].id);
      }
    });

    bindRunSplitter();
    let tickCount=0;
    setInterval(()=>{
      const now=Date.now();tickCount++;
      if(tickCount%4===0)state.runs.filter(run=>run.status==='running'&&!run.archived).forEach(run=>run.heartbeatAt=now);
      document.querySelectorAll('[data-runtime]').forEach(node=>{const run=runById(node.dataset.runtime);if(run)node.textContent=durationText(runtimeMs(run,now));});
      document.querySelectorAll('[data-relative]').forEach(node=>{node.textContent=relativeTime(Number(node.dataset.relative),now);});
      document.querySelectorAll('[data-heartbeat]').forEach(node=>{const run=runById(node.dataset.heartbeat);if(run)node.textContent=run.status==='running'?relativeTime(run.heartbeatAt,now):'Not active';});
      if(tickCount%10===0)persist();
    },1000);

    renderAll({skipPersist:true});
  </script>
</body>
