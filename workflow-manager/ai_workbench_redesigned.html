<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Workbench — Workflow Operations</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --surface-1: #11141b;
      --surface-2: #171b24;
      --surface-3: #1d222d;
      --surface-4: #242b38;
      --line: #2b3240;
      --line-strong: #394354;
      --text: #f2f5f9;
      --text-2: #b8c1ce;
      --text-3: #7f8a9a;
      --blue: #7c9cff;
      --blue-strong: #5d7ff0;
      --blue-soft: #202a4b;
      --green: #57d89a;
      --green-soft: #16382d;
      --amber: #f5bd62;
      --amber-soft: #3b2c17;
      --red: #ff7f8c;
      --red-soft: #411f28;
      --purple: #b69cff;
      --purple-soft: #30264e;
      --cyan: #6bd9e8;
      --shadow: 0 16px 42px rgba(0,0,0,.32);
      --radius: 12px;
      --control-h: 36px;
      --row-h: 54px;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body[data-density="compact"] { --control-h: 32px; --row-h: 46px; font-size: 13px; }
    button, input, select, textarea { font: inherit; }
    button, select, input, textarea { color: var(--text); }
    button {
      min-height: var(--control-h);
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface-2);
      cursor: pointer;
      transition: border-color .14s ease, background .14s ease, transform .14s ease, opacity .14s ease;
    }
    button:hover:not(:disabled) { border-color: #536177; background: var(--surface-3); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
      outline: 3px solid rgba(124,156,255,.42);
      outline-offset: 2px;
    }
    .btn-primary { background: var(--blue-strong); border-color: var(--blue-strong); color: #fff; font-weight: 650; }
    .btn-primary:hover:not(:disabled) { background: #6b8df8; border-color: #6b8df8; }
    .btn-danger { color: #ffd9dd; background: var(--red-soft); border-color: #713342; }
    .btn-success { color: #d9ffed; background: var(--green-soft); border-color: #28634d; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
    .btn-ghost:hover:not(:disabled) { background: var(--surface-3); border-color: var(--line); color: var(--text); }
    .btn-small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .icon-btn { width: var(--control-h); padding: 0; display: inline-grid; place-items: center; font-size: 18px; }
    .link-btn { border: 0; min-height: auto; padding: 0; background: transparent; color: var(--blue); }
    .link-btn:hover:not(:disabled) { border: 0; background: transparent; color: #a8bbff; }
    .muted { color: var(--text-2); }
    .subtle { color: var(--text-3); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .nowrap { white-space: nowrap; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    .app-header {
      height: 64px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,20,27,.96);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 215px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 9px;
      display: grid; place-items: center;
      background: var(--blue); color: #0e1424; font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
    }
    .brand-title { font-size: 15px; font-weight: 750; letter-spacing: -.01em; }
    .brand-sub { font-size: 11px; color: var(--text-3); margin-top: -2px; }
    .header-context { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .context-select, .toolbar-control {
      height: var(--control-h);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface-2);
      padding: 0 32px 0 10px;
    }
    .branch-chip, .health-chip, .quiet-chip {
      height: var(--control-h); display: inline-flex; align-items: center; gap: 7px;
      padding: 0 10px; border: 1px solid var(--line); border-radius: 8px;
      color: var(--text-2); background: var(--surface-1); white-space: nowrap;
    }
    .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(87,216,154,.1); }
    .header-spacer { flex: 1; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .mobile-menu { display: none; }

    .shell { display: grid; grid-template-columns: 280px minmax(0,1fr); min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface-1);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 100vh;
      overflow-y: auto;
    }
    .mobile-sidebar-context { display: none; }
    .sidebar-head { display: flex; align-items: center; justify-content: space-between; padding: 0 6px 8px; }
    .sidebar-title { color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; font-weight: 750; }
    .view-list { display: grid; gap: 3px; }
    .view-button {
      width: 100%; border-color: transparent; background: transparent; display: flex; align-items: center;
      justify-content: space-between; color: var(--text-2); text-align: left; padding: 0 10px;
    }
    .view-button:hover { background: var(--surface-2); border-color: transparent; }
    .view-button.active { background: var(--blue-soft); border-color: #3c4d82; color: #e9efff; }
    .view-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .view-icon { width: 10px; height: 10px; border-radius: 50%; background: var(--text-3); flex: none; }
    .view-icon.review { background: var(--amber); }
    .view-icon.failed { background: var(--red); }
    .view-icon.running { background: var(--blue); }
    .view-icon.completed { background: var(--green); }
    .count-badge { min-width: 24px; padding: 1px 7px; text-align: center; border-radius: 99px; background: var(--surface-3); color: var(--text-2); font-size: 11px; }
    .view-button.active .count-badge { background: #364675; color: #fff; }
    .workflow-search-wrap { position: relative; margin-bottom: 8px; }
    .workflow-search, .run-search {
      width: 100%; height: var(--control-h); border: 1px solid var(--line); border-radius: 8px;
      background: var(--surface-2); padding: 0 10px; outline: 0;
    }
    .workflow-list { display: grid; gap: 3px; }
    .workflow-item {
      display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 8px;
      border: 1px solid transparent; border-radius: 7px; padding: 3px 6px 3px 8px;
    }
    .workflow-item:hover { background: var(--surface-2); }
    .workflow-item.run-context { background: var(--surface-2); box-shadow: inset 2px 0 0 var(--blue); }
    .workflow-item.filter-active { background: var(--blue-soft); border-color: #3c4d82; box-shadow: inset 2px 0 0 var(--blue); }
    .workflow-select { min-height: auto; border: 0; background: transparent; padding: 0; text-align: left; min-width: 0; }
    .workflow-select:hover:not(:disabled) { background: transparent; border: 0; }
    .workflow-name { display: flex; align-items: center; gap: 6px; min-width: 0; color: var(--text); font-weight: 650; }
    .workflow-name-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .workflow-pin-mark { flex: none; color: var(--blue); font-size: 10px; }
    .workflow-trigger-icon { width: 19px; height: 19px; flex: none; display: inline-grid; place-items: center; color: #8d97a6; }
    .workflow-trigger-icon svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.65; stroke-linecap: round; stroke-linejoin: round; }
    .workflow-item.run-context .workflow-trigger-icon, .workflow-item.filter-active .workflow-trigger-icon { color: #aab3c0; }
    .workflow-controls { display: flex; align-items: center; gap: 4px; }
    .workflow-controls .mini-icon { min-height: 24px; width: 24px; }
    .workflow-reorder { display: inline-flex; align-items: center; gap: 1px; padding-right: 2px; border-right: 1px solid var(--line); }
    .workflow-reorder .mini-icon { min-height: 22px; width: 20px; font-size: 11px; }
    .mini-icon { min-height: 28px; width: 28px; padding: 0; border-color: transparent; background: transparent; color: var(--text-3); }
    .mini-icon:hover:not(:disabled) { background: var(--surface-3); color: var(--text); }
    .new-workflow-icon { color: var(--blue); background: var(--blue-soft); }
    .new-workflow-icon:hover:not(:disabled) { color: #fff; background: var(--blue-strong); }
    .workflow-run-control { color: var(--green); background: var(--green-soft); }
    .workflow-run-control:hover:not(:disabled) { color: #d9ffea; background: #1c513d; }
    .workflow-run-control.btn-danger { color: #ffb5bd; background: var(--red-soft); border-color: #723441; }
    .workflow-run-control.btn-danger:hover:not(:disabled) { color: #ffe1e5; background: #5a2732; }
    .workflow-order { height: 26px; max-width: 104px; padding-inline: 7px; font-size: 11px; }
    .switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
    .switch input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-track { width: 32px; height: 18px; border-radius: 99px; background: #3a4352; position: relative; transition: background .15s; }
    .switch-track::after { content: ""; width: 12px; height: 12px; border-radius: 50%; position: absolute; left: 3px; top: 3px; background: #cad1dc; transition: transform .15s; }
    .switch input:checked + .switch-track { background: var(--blue-strong); }
    .switch input:checked + .switch-track::after { transform: translateX(14px); background: #fff; }
    .switch input:focus-visible + .switch-track { outline: 3px solid rgba(124,156,255,.42); outline-offset: 2px; }
    .sidebar-foot { margin-top: auto; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: #0e1117; }
    .directory-picker { display: flex; align-items: center; gap: 6px; }
    .directory-picker select { min-width: 0; flex: 1; height: 30px; font-size: 11px; }
    .directory-branch { margin-top: 7px; color: var(--text-3); font-size: 11px; }
    .directory-branch .mono { color: var(--text-2); }

    .main { min-width: 0; padding: 18px; }
    .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface-1); box-shadow: 0 1px 0 rgba(255,255,255,.02); }
    .run-split { display: flex; flex-direction: column; height: calc(100vh - 36px); min-height: 600px; }
    .runs-card { overflow: hidden; flex: 0 0 var(--runs-pane-height, 42%); min-height: 0; display: flex; flex-direction: column; }
    .section-header { min-height: 58px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); }
    .section-heading { min-width: 130px; }
    .section-heading h1, .section-heading h2 { margin: 0; font-size: 16px; letter-spacing: -.01em; }
    .section-kicker { color: var(--text-3); font-size: 11px; margin-top: 2px; }
    .toolbar { flex: 1; min-width: 0; display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
    .search-wrap { width: min(260px, 30vw); }
    .active-filter-bar { display: none; padding: 9px 14px; border-bottom: 1px solid var(--line); background: #10141d; align-items: center; gap: 7px; flex-wrap: wrap; }
    .active-filter-bar.visible { display: flex; }
    .filter-chip { min-height: 27px; display: inline-flex; align-items: center; gap: 6px; padding: 0 7px 0 9px; border: 1px solid #3d4e7f; border-radius: 99px; background: var(--blue-soft); color: #dce5ff; font-size: 11px; }
    .filter-chip button { min-height: 20px; width: 20px; padding: 0; border: 0; background: transparent; color: #9fb2ee; }
    .table-wrap { flex: 1; min-height: 0; max-height: none; overflow: auto; }
    .run-table { width: 100%; min-width: 0; border-collapse: collapse; table-layout: fixed; }
    .run-table col { width: 20%; }
    .run-table th { height: 36px; position: sticky; top: 0; z-index: 2; background: var(--surface-2); color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: .065em; text-align: left; padding: 0 12px; border-bottom: 1px solid var(--line); }
    .run-table td { height: var(--row-h); padding: 8px 12px; border-bottom: 1px solid #222834; vertical-align: middle; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; }
    .run-table tbody tr { cursor: pointer; outline: 0; }
    .run-table tbody tr:hover { background: #151a23; }
    .run-table tbody tr.selected { background: #192139; box-shadow: inset 3px 0 0 var(--blue); }
    .run-table tbody tr.selected td { color: #dfe7f5; }
    .run-table tbody tr:last-child td { border-bottom: 0; }
    .run-main { color: var(--text); font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-sub { color: var(--text-3); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status {
      display: inline-flex; align-items: center; gap: 6px; min-height: 25px; padding: 0 8px;
      border: 1px solid var(--line); border-radius: 99px; font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .status.running { color: #b7c8ff; background: var(--blue-soft); border-color: #40558f; }
    .status.review { color: #ffd891; background: var(--amber-soft); border-color: #73562b; }
    .status.failed { color: #ffb5bd; background: var(--red-soft); border-color: #723441; }
    .status.stopped { color: #c9c3db; background: #282532; border-color: #494354; }
    .status.completed { color: #a8f0cd; background: var(--green-soft); border-color: #29634d; }
    .status.rejected { color: #e0bac0; background: #322229; border-color: #5d3943; }
    .status.applying, .status.queued { color: #d4c3ff; background: var(--purple-soft); border-color: #584784; }
    .check-label { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 650; white-space: nowrap; }
    .check-label::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
    .check-label.passed { color: var(--green); }
    .check-label.passed::before { background: var(--green); }
    .check-label.failed { color: var(--red); }
    .check-label.failed::before { background: var(--red); }
    .check-label.running { color: var(--blue); }
    .check-label.running::before { background: var(--blue); }
    .check-label.stale { color: var(--amber); }
    .check-label.stale::before { background: var(--amber); }
    .changes-inline { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
    .diff-count { color: var(--text-2); font-size: 11px; }
    .plus { color: var(--green); }
    .minus { color: var(--red); }
    .mobile-run-list { display: none; }
    .empty-state { padding: 46px 20px; text-align: center; color: var(--text-2); }
    .empty-state strong { display: block; color: var(--text); font-size: 15px; margin-bottom: 5px; }

    .run-split-divider { height: 24px; flex: 0 0 24px; display: grid; grid-template-columns: 28px minmax(72px,1fr) 28px 28px; align-items: center; gap: 3px; padding: 0 4px; }
    .run-resize-handle { height: 20px; min-height: 20px; display: grid; place-items: center; cursor: row-resize; touch-action: none; border: 0; background: transparent; padding: 0; }
    .run-resize-handle::before { content: ""; width: 42px; height: 4px; border-radius: 99px; background: var(--line-strong); transition: background .15s, width .15s; }
    .run-resize-handle:hover::before, .run-resize-handle:focus-visible::before, .run-resize-handle.dragging::before { width: 62px; background: var(--blue); }
    .run-resize-handle:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }
    .split-control { min-height: 22px; width: 28px; padding: 0; border-color: transparent; background: transparent; color: var(--text-3); font-size: 13px; }
    .split-control:hover:not(:disabled) { color: var(--text); background: var(--surface-3); border-color: var(--line); }
    .pane-collapsed { visibility: hidden; }
    .detail-card { margin-top: 0; overflow: auto; min-height: 0; flex: 1 1 0; }
    .detail-sticky { position: sticky; top: 0; z-index: 4; background: #10131a; box-shadow: 0 1px 0 var(--line); }
    .detail-top {
      min-height: 76px; padding: 14px 16px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--line); background: #10131a;
    }
    .detail-identity { min-width: 0; flex: 1; }
    .detail-title-row { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .detail-title-row h2 { margin: 0; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-meta { color: var(--text-3); font-size: 12px; margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px 12px; }
    .detail-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .mobile-back-to-runs { display: none; }
    .detail-tabs { height: 44px; padding: 0 14px; display: flex; align-items: end; gap: 2px; border-bottom: 1px solid var(--line); overflow-x: auto; }
    .tab-button { min-height: 43px; border: 0; border-radius: 0; background: transparent; color: var(--text-3); padding: 0 13px; border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab-button:hover:not(:disabled) { border-color: transparent; border-bottom-color: #4b566a; background: transparent; color: var(--text); }
    .tab-button.active { color: #e9eeff; border-bottom-color: var(--blue); }
    .detail-body { padding: 16px; }
    .detail-grid { display: grid; grid-template-columns: minmax(0,1.25fr) minmax(300px,.75fr); gap: 14px; align-items: start; }
    .panel { border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2); overflow: hidden; }
    .panel + .panel { margin-top: 12px; }
    .panel-head { min-height: 43px; padding: 9px 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); color: var(--text); font-weight: 650; }
    .panel-head-meta { color: var(--text-3); font-size: 11px; font-weight: 500; }
    .panel-body { padding: 13px; }
    .summary-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .summary-list li { display: grid; grid-template-columns: 22px minmax(0,1fr); gap: 8px; color: var(--text-2); }
    .step-icon { width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; margin-top: 1px; background: var(--green-soft); color: var(--green); font-size: 11px; font-weight: 800; }
    .step-icon.current { background: var(--blue-soft); color: var(--blue); }
    .metric-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .metric { min-height: 58px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 8px; background: #12161e; }
    .metric-label { color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: .055em; }
    .metric-value { margin-top: 5px; color: var(--text); font-weight: 700; }
    .activity-callout { padding: 12px; border-left: 3px solid var(--blue); border-radius: 7px; background: #151c2c; }
    .activity-callout.review { border-left-color: var(--amber); background: #251f17; }
    .activity-callout.failed { border-left-color: var(--red); background: #25181e; }
    .activity-title { color: var(--text); font-weight: 700; }
    .activity-text { color: var(--text-2); margin-top: 4px; }
    .command { margin-top: 10px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px; background: #090b10; color: #d1d9e6; font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; overflow-wrap: anywhere; }
    .inline-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    .notice { padding: 10px 11px; border: 1px solid var(--line); border-radius: 8px; color: var(--text-2); background: #12161e; }
    .notice.warning { background: var(--amber-soft); border-color: #684e28; color: #f7dcaa; }
    .notice.danger { background: var(--red-soft); border-color: #65313d; color: #ffc3ca; }
    .notice.success { background: var(--green-soft); border-color: #285a48; color: #c7f8df; }
    .timeline { position: relative; display: grid; gap: 0; }
    .timeline-item { display: grid; grid-template-columns: 86px 14px minmax(0,1fr); gap: 8px; min-height: 54px; }
    .timeline-time { color: var(--text-3); font-size: 11px; padding-top: 1px; }
    .timeline-marker { position: relative; }
    .timeline-marker::before { content: ""; width: 8px; height: 8px; border: 2px solid var(--blue); border-radius: 50%; background: var(--surface-2); position: absolute; left: 1px; top: 3px; z-index: 1; }
    .timeline-marker::after { content: ""; width: 1px; background: var(--line-strong); position: absolute; left: 6px; top: 15px; bottom: -3px; }
    .timeline-item:last-child .timeline-marker::after { display: none; }
    .timeline-content { color: var(--text-2); padding-bottom: 16px; }
    .timeline-content strong { color: var(--text); }
    .file-list { display: grid; gap: 10px; }
    .file-card { border: 1px solid var(--line); border-radius: 9px; background: #12161e; overflow: hidden; }
    .file-head { min-height: 48px; padding: 8px 11px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    .history-section + .history-section { margin-top: 14px; }

    .tab-status { margin-left: 6px; padding: 1px 6px; border-radius: 99px; background: var(--surface-3); color: var(--text-3); font-size: 9px; font-weight: 800; text-transform: uppercase; }

    .home-fab {

    .character-home { display: none; min-height: 100vh; padding: 30px 34px 78px; background: radial-gradient(circle at 18% -8%, #1a2440 0, transparent 34%), var(--bg); }

    .modal {
      position: fixed; z-index: 110; inset: 50% auto auto 50%; transform: translate(-50%,-47%) scale(.98);
      width: min(540px, calc(100vw - 28px)); max-height: calc(100vh - 40px); overflow: hidden;

    .modal-footer { min-height: 60px; padding: 11px 14px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
    .toast-region { position: fixed; z-index: 150; right: 16px; bottom: 16px; width: min(360px, calc(100vw - 32px)); display: grid; gap: 8px; pointer-events: none; }
    .toast { padding: 11px 12px; border: 1px solid var(--line-strong); border-radius: 9px; background: #1a1f29; box-shadow: var(--shadow); animation: toast-in .18s ease; }
    .toast-title { font-weight: 700; color: var(--text); }
    .toast-copy { color: var(--text-2); font-size: 12px; margin-top: 2px; }

    @media (max-width: 1180px) {

    }

      #sidebarBackdrop { display: none !important; pointer-events: none !important; }
      .workflow-select { min-height: 40px; }
      .workflow-controls .mini-icon { min-height: 40px; width: 40px; }
      .workflow-controls .switch { min-width: 40px; min-height: 40px; justify-content: center; }
      .mobile-sidebar-context { display: block; }

      .mobile-run-card:hover:not(:disabled) { border-color: var(--line); background: #151a23; }

      .mobile-run-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .mobile-run-title { display: block; margin-top: 10px; font-weight: 700; color: var(--text); }
      .mobile-run-meta { display: block; margin-top: 3px; color: var(--text-3); font-size: 11px; }
      .mobile-run-activity { display: block; margin-top: 9px; color: var(--text-2); }
      .mobile-run-foot { margin-top: 9px; display: flex; align-items: center; justify-content: space-between; color: var(--text-3); font-size: 11px; }
      .detail-top { align-items: flex-start; flex-direction: column; }
      .mobile-back-to-runs { display: inline-flex; align-items: center; align-self: flex-start; }
      .detail-actions { width: 100%; justify-content: flex-start; }

      .detail-body { padding: 11px; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
      .timeline-item { grid-template-columns: 65px 14px minmax(0,1fr); }
      .file-head { align-items: flex-start; flex-direction: column; }

      .iteration-card { grid-template-columns: 80px minmax(0,1fr); }

      .drawer { width: 100vw; }
      .drawer-body { padding: 12px; }
      .drawer-footer { flex-wrap: wrap; }
      .drawer-footer-note { flex-basis: 100%; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: auto; }
      .schedule-mode-picker, .schedule-interval-row { grid-template-columns: 1fr; }
      .watch-flow, .watch-debounce-row, .watch-dispatch-picker, .line-dispatch-controls, .line-fanout-demo { grid-template-columns: 1fr; }
      .watch-flow-step::after { display: none; }

      .proposal-item { grid-template-columns: 1fr; gap: 2px; }
      .loop-flow, .loop-stage-grid { grid-template-columns: 1fr; }
      .loop-connector { min-height: 28px; }

    @media (prefers-reduced-motion: reduce) {

<body data-density="comfortable">
  <div class="shell">
    <aside class="sidebar" id="sidebar" aria-label="Workflow navigation">
      <section>
        <div class="sidebar-head"><span class="sidebar-title">Workflows</span><div class="workflow-controls"><label class="sr-only" for="workflowSort">Order workflows</label><select id="workflowSort" class="toolbar-control workflow-order" data-action="changeWorkflowSort"><option value="custom">Custom</option><option value="alpha-asc">A–Z</option><option value="alpha-desc">Z–A</option></select><button type="button" class="mini-icon new-workflow-icon" data-action="newWorkflow" aria-label="New workflow">＋</button></div></div>
        <div class="workflow-search-wrap"><label class="sr-only" for="workflowSearch">Search workflows</label><input id="workflowSearch" class="workflow-search" type="search" placeholder="Search workflows…" ></div>
        <div class="workflow-list" id="workflowList"></div>
      </section>
      <div class="sidebar-foot">
        <label class="sidebar-title" for="directorySelect">Working directory</label>
        <div class="directory-picker"><select id="directorySelect" class="toolbar-control mono" data-action="changeDirectory"></select><button type="button" class="mini-icon new-workflow-icon" data-action="addDirectory" aria-label="Add directory" title="Add directory">＋</button></div>
        <div class="directory-branch">Current branch · <span class="mono" id="currentBranchLabel"></span></div>
      </div>
    </aside>

    <main class="main">
      <div class="run-split" id="runSplit">
      <section class="card runs-card" aria-labelledby="runsHeading">

          <div class="toolbar">
            <div class="search-wrap"><label class="sr-only" for="runSearch">Search runs</label><input id="runSearch" class="run-search" type="search" placeholder="Search workflow or activity…" ></div>
            <label class="sr-only" for="triggerFilter">Trigger</label>
            <select id="triggerFilter" class="toolbar-control" data-action="changeTriggerFilter">
              <option value="all">All triggers</option><option value="post_commit">Post-commit</option><option value="test_failure">Test failure</option><option value="schedule">Schedule</option><option value="manual">Manual</option><option value="file_watch">File watch</option>
            </select>
            <label class="sr-only" for="runStatusFilter">Run status</label>

            </select>

            </select>
          </div>
        </div>
        <div class="active-filter-bar" id="activeFilterBar"></div>

          <table class="run-table" role="grid" aria-label="Workflow runs">

            <tbody id="runRows"></tbody>

        </div>
        <div class="mobile-run-list" id="mobileRunList" role="list" aria-label="Workflow runs"></div>

        <button type="button" class="split-control" data-action="resetRunSplit" aria-label="Reset run workspace split" title="Reset split">↕</button>
        <button type="button" class="split-control" id="collapseDetailButton" data-action="collapseDetailPane" aria-label="Collapse run details" title="Collapse run details">⌄</button>
      </div>
      <section class="card detail-card" id="runDetail"></section>
      </div>
    </main>
  </div>

  <section class="character-home" id="characterHome" aria-label="Characters">
    <div class="character-home-inner">
      <header class="character-home-head">
        <button type="button" class="btn-primary character-add" data-action="addBlankCharacter">Add character</button>
      </header>

    function durationText(milliseconds) {
      const total = Math.max(0, Math.floor(milliseconds / 1000));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      if (hours) return `${hours}h ${minutes}m`;
      if (minutes) return `${minutes}m ${String(seconds).padStart(2,'0')}s`;
      return `${seconds}s`;
    }

    function relativeTime(timestamp, at = Date.now()) {
      if (!timestamp) return '—';

      if (seconds < 5) return 'just now';
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

        const selected = run.id === state.selectedRunId;
        return `<article role="listitem"><button type="button" class="mobile-run-card ${selected ? 'selected' : ''}" data-action="selectRun" data-id="${esc(run.id)}" aria-pressed="${selected}">
          <span class="mobile-run-head">${renderStatus(run.status)}<span class="mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</span></span>
          <span class="mobile-run-title">${esc(workflow?.name || run.workflowId)}</span>
          <span class="mobile-run-meta">${esc(triggerLabels[run.trigger] || run.trigger)} · Iteration ${run.iteration}</span>
          <span class="mobile-run-activity">${esc(run.currentActivity)}</span>
          <span class="mobile-run-foot"><span data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</span><span>${diffText(run)} · ${esc(checkLabels[run.checkStatus] || run.checkStatus)}</span></span>
        </button></article>`;
      }).join('');
    }

    function renderActiveFilters() {
      const chips = [];
      const workflow = workflowById(state.workflowFilter);
      if (workflow) chips.push(`<span class="filter-chip">Workflow: ${esc(workflow.name)} <button type="button" data-action="clearWorkflowFilter" aria-label="Clear workflow filter">×</button></span>`);
      if (state.triggerFilter !== 'all') chips.push(`<span class="filter-chip">Trigger: ${esc(triggerLabels[state.triggerFilter])} <button type="button" data-action="clearTriggerFilter" aria-label="Clear trigger filter">×</button></span>`);
      if (state.runSearch) chips.push(`<span class="filter-chip">Search: “${esc(state.runSearch)}” <button type="button" data-action="clearRunSearch" aria-label="Clear run search">×</button></span>`);
      const bar = byId('activeFilterBar');
      bar.classList.toggle('visible', Boolean(chips.length));
      bar.innerHTML = chips.join('') + (chips.length > 1 ? '<button type="button" class="btn-small btn-ghost" data-action="clearRunFilters">Clear all</button>' : '');
    }

    function actionButton(action, run) {
      const attrs = `data-action="${esc(action.id)}" data-id="${esc(run.id)}"`;
      return `<button type="button" class="${esc(action.className || '')}" ${attrs} ${action.disabled ? 'disabled' : ''} ${action.title ? `title="${esc(action.title)}"` : ''}>${esc(action.label)}</button>`;
    }

    function actionsForRun(run) {
      if (isRunActive(run)) return [
        { id:'followRun', label: state.followingRunId === run.id ? 'Following live' : 'Follow live', className: state.followingRunId === run.id ? 'btn-primary' : '' },
        { id:'stopRun', label:'Stop', className:'btn-danger' }
      ];
      if (run.status === 'failed') return [{ id:'editRunWorkflow', label:'Edit workflow', className:'btn-primary' }, { id:'archiveRun', label:'Archive' }];
      if (run.status === 'stopped') return [{ id:'resumeRun', label:'Resume', className:'btn-primary' }, { id:'archiveRun', label:'Archive' }];
      if (run.status === 'completed') return [{ id:'runAgain', label:'Run again', className:'btn-primary' }, { id:'archiveRun', label:'Archive' }];
      return [];
    }

    const reviewLoopPhaseLabels = { generating:'Generator working', verifying:'Verifier reviewing', revising:'Feedback returning', passed:'Standards met', blocked:'Blocked', limit:'Round limit reached' };

    function renderReviewLoopPhase(loop) {
      const phase=loop?.phase||'generating';
      return `<span class="loop-phase ${esc(phase)}">${esc(reviewLoopPhaseLabels[phase]||phase)}</span>`;
    }

    function reviewLoopTabs(run) {
      if (!run.reviewLoop) return tabMeta;
      return [tabMeta[0], {id:'review_loop',label:'Review loop'}, ...tabMeta.slice(1)];
    }

    function renderDetail() {
      const run = selectedRun();
      const target = byId('runDetail');
      if (!run) {
        target.innerHTML = `<div class="empty-state" style="min-height:390px;display:grid;place-items:center"><div><strong>Select a run</strong>The run summary, progress, changes, checks, and iteration history will appear here.</div></div>`;
        return;
      }
      normalizeActiveRunTab(run);
      const workflow = workflowById(run.workflowId);
      const actions = actionsForRun(run);
      const tabs = reviewLoopTabs(run).map(tab => {
        let suffix = '';
        if (tab.id === 'changes' && run.files?.length) suffix = ` (${run.files.length})`;
        if (tab.id === 'checks' && run.checks?.length) suffix = ` (${run.checks.length})`;
        if (tab.id === 'review_loop') suffix = ` (${run.reviewLoop.round})`;
        return `<button type="button" id="run-tab-${esc(tab.id)}" class="tab-button ${state.activeTab === tab.id ? 'active' : ''}" data-action="setTab" data-tab="${esc(tab.id)}" role="tab" aria-selected="${state.activeTab === tab.id}" aria-controls="run-tab-panel" tabindex="${state.activeTab === tab.id ? '0' : '-1'}">${esc(tab.label + suffix)}</button>`;
      }).join('');
      target.innerHTML = `<div class="detail-sticky"><div class="detail-top">
          <button type="button" class="mobile-back-to-runs btn-ghost" data-action="showRunList">← Back to runs</button>
          <div class="detail-identity"><div class="detail-title-row"><h2 id="runDetailTitle" tabindex="-1">${esc(workflow?.name || run.workflowId)}</h2>${renderStatus(run.status)}</div>
             <div class="detail-meta"><span>${esc(triggerLabels[run.trigger] || run.trigger)}</span><span>Iteration ${run.iteration}</span>${run.reviewLoop ? `<span>Review round ${run.reviewLoop.round} of ${run.reviewLoop.maxRounds}</span><span>Generator v${run.reviewLoop.generatorPromptVersion}</span><span>Verifier v${run.reviewLoop.verifierPromptVersion}</span>` : `<span>Prompt v${run.promptVersion}</span>`}</div>
          </div><div class="detail-actions">${actions.map(action => actionButton(action, run)).join('')}</div>
        </div>
        <nav class="detail-tabs" role="tablist" aria-label="Selected run details">${tabs}</nav></div>
        <div class="detail-body" id="run-tab-panel" role="tabpanel" aria-labelledby="run-tab-${esc(state.activeTab)}" tabindex="0">${renderTabContent(run)}</div>`;
    }

    function renderTabContent(run) {
      if (state.activeTab === 'review_loop' && run.reviewLoop) return renderReviewLoop(run);
      if (state.activeTab === 'activity') return renderActivity(run);
      if (state.activeTab === 'changes') return renderChanges(run);
      if (state.activeTab === 'checks') return renderChecks(run);
      if (state.activeTab === 'iterations') return renderIterations(run);
      if (state.activeTab === 'notes') return renderNotes(run);
      return renderSummary(run);
    }

    function renderSummary(run) {
      const calloutClass = run.status === 'failed' ? 'failed' : '';
      const notes = (run.notes || []).slice().sort((a,b) => b.at - a.at);
      return `<div class="detail-grid">
        <div>
          <section class="panel"><div class="panel-head"><span>What this run has done</span><span class="panel-head-meta">${run.summarySteps.length} recorded steps</span></div><div class="panel-body"><ol class="summary-list">${run.summarySteps.map((step,index) => `<li><span class="step-icon ${index === run.summarySteps.length - 1 && run.status === 'running' ? 'current' : ''}">${index === run.summarySteps.length - 1 && run.status === 'running' ? '•' : '✓'}</span><span>${esc(step)}</span></li>`).join('')}</ol></div></section>
          <section class="panel"><div class="panel-head"><span>Current state</span><span class="panel-head-meta" data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</span></div><div class="panel-body">${run.reviewLoop ? `<div class="loop-state-strip">${renderReviewLoopPhase(run.reviewLoop)}<strong>Round ${run.reviewLoop.round} of ${run.reviewLoop.maxRounds}</strong><span>Generator v${run.reviewLoop.generatorPromptVersion} · Verifier v${run.reviewLoop.verifierPromptVersion}</span><button type="button" class="btn-small" data-action="setTab" data-tab="review_loop">Open review loop</button></div>` : ''}<div class="activity-callout ${calloutClass}"><div class="activity-title">${esc(run.currentActivity)}</div><div class="activity-text">${esc(run.currentAction)}</div>${run.currentCommand ? `<div class="command">${esc(run.currentCommand)}</div>` : ''}</div></div></section>
        </div>
        <div>
          <section class="panel"><div class="panel-head"><span>Notes and decisions</span><div class="inline-actions" style="margin:0"><span class="panel-head-meta">${notes.length} ${notes.length === 1 ? 'note' : 'notes'}</span><button type="button" class="btn-small" data-action="addNote" data-id="${esc(run.id)}">Add note</button></div></div><div class="panel-body summary-notes-list">${notes.length ? `<div class="note-list">${notes.map(item => `<article class="note"><div class="note-meta">${esc(item.author)} · ${esc(dateTime(item.at))}</div><div>${esc(item.text)}</div></article>`).join('')}</div>` : '<div class="summary-notes-empty">No notes yet. Add context, a decision, or a follow-up for this run.</div>'}</div><div class="panel-body" style="border-top:1px solid var(--line)"><button type="button" class="btn-small" data-action="setTab" data-tab="notes">Open Notes tab</button></div></section>
        </div>
      </div>`;
    }

    function renderReviewLoop(run) {
      const loop=run.reviewLoop;
      const phase=loop.phase||'generating';
      const rounds=loop.rounds||[];
      const roundMarkup=rounds.map(item=>{
        const current=item.round===loop.round;
        const verdict=item.verifier?.verdict|| (item.verifier?.state==='running'?'REVIEWING':'PENDING');
        const summary=item.verifier?.summary||item.generator?.summary||'Round has not produced a result yet.';
        const findings=item.verifier?.findings||[];
        const feedbackClass=item.verifier?.verdict==='MEETS_STANDARDS'?'pass':'';
        return `<li><details class="loop-round ${current?'current':''}" ${current||item.verifier?.verdict==='REQUEST_CHANGES'?'open':''}><summary><span class="loop-round-title">Round ${item.round}</span>${renderReviewLoopPhase({phase:item.verifier?.state==='passed'?'passed':item.verifier?.state==='changes_requested'?'revising':item.verifier?.state==='running'?'verifying':item.generator?.state==='running'?'generating':'blocked'})}<span class="loop-round-summary">${esc(summary)}</span></summary><div class="loop-round-body"><div class="loop-stage-grid">
          <section class="loop-stage"><div class="loop-stage-label"><span>Generator</span><span class="loop-stage-state">${esc(item.generator?.state||'pending')}</span></div><p>${esc(item.generator?.summary||'Waiting to produce a candidate.')}</p></section>
          <div class="loop-connector" aria-hidden="true"><span class="loop-connector-icon">→</span></div>
          <section class="loop-stage verifier"><div class="loop-stage-label"><span>Independent verifier</span><span class="loop-stage-state">${esc(verdict)}</span></div><p>${esc(item.verifier?.summary||'Waiting for the generator candidate.')}</p>${findings.length?`<ul class="loop-findings">${findings.map(finding=>`<li>${esc(finding)}</li>`).join('')}</ul>`:''}</section>
        </div>${item.verifier?.feedback?`<div class="loop-feedback ${feedbackClass}"><strong>${item.verifier.verdict==='REQUEST_CHANGES'?'Feedback returned to Generator':'Verifier result'}:</strong> ${esc(item.verifier.feedback)}</div>`:''}</div></details></li>`;
      }).join('');
      return `<div class="detail-grid"><div><section class="panel"><div class="panel-head"><span>Generator ↔ verifier loop</span><div class="inline-actions" style="margin:0">${renderReviewLoopPhase(loop)}${run.status==='running'?`<button type="button" class="btn-small" data-action="simulateProgress" data-id="${esc(run.id)}">Simulate next phase</button>`:''}</div></div><div class="panel-body"><div class="loop-flow" style="margin-top:0" aria-label="Current generator and verifier phases">
        <section class="loop-agent ${['generating','revising'].includes(phase)?'active':''}"><div class="loop-agent-head"><span class="loop-role-badge">Writes</span><span class="loop-role">Generator</span></div><div class="loop-agent-copy">Produces the candidate and incorporates only the verifier's structured feedback packet.</div><div class="loop-agent-meta">Pinned prompt v${loop.generatorPromptVersion}</div></section>
        <div class="loop-connector" aria-hidden="true"><div><div class="loop-connector-icon">→</div><div class="loop-connector-label">candidate / feedback ↺</div></div></div>
        <section class="loop-agent verifier ${phase==='verifying'?'active':''}"><div class="loop-agent-head"><span class="loop-role-badge">Judges</span><span class="loop-role">Independent verifier</span></div><div class="loop-agent-copy">A fresh read-only instance evaluates each candidate without seeing the generator conversation.</div><div class="loop-agent-meta">Pinned prompt v${loop.verifierPromptVersion}</div></section>
      </div></div></section><section class="panel"><div class="panel-head"><span>Round history</span><span class="panel-head-meta">${rounds.length} ${rounds.length===1?'round':'rounds'} recorded</span></div><div class="panel-body"><ol class="loop-round-list">${roundMarkup||'<li class="subtle">The first generator round has not started.</li>'}</ol></div></section></div><div><section class="panel"><div class="panel-head"><span>Loop contract</span></div><div class="panel-body"><div class="metric-grid"><div class="metric"><div class="metric-label">Current round</div><div class="metric-value">${loop.round} of ${loop.maxRounds}</div></div><div class="metric"><div class="metric-label">Limit action</div><div class="metric-value">${loop.onLimit==='fail'?'End failed':'End failed as blocked'}</div></div></div><div class="notice" style="margin-top:10px"><strong>Isolation is enforced per candidate.</strong><br>The verifier can inspect the goal, diff, relevant files, checks, and generator summary. It cannot edit files or see the generator conversation.</div><div class="loop-routes"><div class="loop-route pass"><strong>MEETS_STANDARDS</strong><span>Complete the run automatically.</span></div><div class="loop-route revise"><strong>REQUEST_CHANGES</strong><span>Return evidence; start next round.</span></div><div class="loop-route"><strong>BLOCKED</strong><span>End failed and preserve verifier feedback.</span></div></div></div></section></div></div>`;
    }

    function renderActivity(run) {
      const events = [...(run.events || [])].sort((a,b) => b.at - a.at);
      const live = run.status === 'running';
      return `<div class="detail-grid"><div>
        <section class="panel"><div class="panel-head"><span>${live ? 'Live activity' : 'Last activity'}</span><span class="panel-head-meta">${live ? (state.followingRunId === run.id ? 'following' : 'live') : 'snapshot'}</span></div><div class="panel-body"><div class="activity-callout ${run.status === 'failed' ? 'failed' : ''}"><div class="activity-title">${esc(run.currentActivity)}</div><div class="activity-text">${esc(run.currentAction)}</div>${run.currentFile ? `<div class="run-sub" style="margin-top:8px">Current file · <span class="mono">${esc(run.currentFile)}</span></div>` : ''}${run.currentCommand ? `<div class="command">${esc(run.currentCommand)}</div>` : ''}</div>
        ${live ? `<div class="inline-actions"><button type="button" data-action="simulateProgress" data-id="${esc(run.id)}">Simulate next progress event</button><button type="button" data-action="copySnapshot" data-id="${esc(run.id)}">Copy snapshot</button></div>` : `<div class="inline-actions"><button type="button" data-action="copySnapshot" data-id="${esc(run.id)}">Copy snapshot</button><button type="button" data-action="openEditor" data-id="${esc(run.id)}">Open editor</button></div>`}</div></section>
        <section class="panel"><div class="panel-head"><span>Activity timeline</span><span class="panel-head-meta">${events.length} events</span></div><div class="panel-body"><div class="timeline">${events.map(item => `<div class="timeline-item"><div class="timeline-time">${esc(clockTime(item.at))}</div><div class="timeline-marker"></div><div class="timeline-content"><span>${esc(item.text)}</span><div class="subtle" data-relative="${item.at}">${esc(relativeTime(item.at))}</div></div></div>`).join('')}</div></div></section>
      </div><div><section class="panel"><div class="panel-head"><span>Signals</span></div><div class="panel-body"><div class="metric-grid"><div class="metric"><div class="metric-label">Agent heartbeat</div><div class="metric-value" data-heartbeat="${esc(run.id)}">${live ? esc(relativeTime(run.heartbeatAt)) : 'Not active'}</div></div><div class="metric"><div class="metric-label">Last progress</div><div class="metric-value" data-relative="${run.activityAt}">${esc(relativeTime(run.activityAt))}</div></div><div class="metric"><div class="metric-label">Elapsed</div><div class="metric-value mono" data-runtime="${esc(run.id)}">${esc(durationText(runtimeMs(run)))}</div></div><div class="metric"><div class="metric-label">Current iteration</div><div class="metric-value">Iteration ${run.iteration}</div></div></div></div></section>
      <section class="panel"><div class="panel-head"><span>Raw log</span><span class="panel-head-meta">escaped text</span></div><div class="panel-body"><details><summary style="cursor:pointer;color:var(--text-2)">Show operational log</summary><div class="command" style="max-height:260px;overflow:auto">${events.slice().reverse().map(item => `[${clockTime(item.at)}] ${item.text}`).map(esc).join('\n')}</div></details><div class="inline-actions"><button type="button" data-action="copyLog" data-id="${esc(run.id)}">Copy log</button></div></div></section></div></div>`;
    }

    function changeNotice(run) {
      if (run.status === 'running') return `<div class="notice">Changes appear here as the workflow works directly in the current branch.</div>`;
      if (run.status === 'completed') return `<div class="notice success">These changes were made directly in the active working directory and verified successfully.</div>`;
      if (run.status === 'failed') return `<div class="notice danger">The workflow did not produce a verified result. Failure evidence and changed files are preserved so its prompts can be improved.</div>`;
      return `<div class="notice">Artifacts are preserved for inspection. Resume the run to continue from its checkpoint.</div>`;
    }

    function renderChanges(run) {
      if (!run.files?.length) return `<div class="empty-state"><strong>No file changes yet</strong>${run.status === 'running' ? 'The agent is still scanning and has not produced a patch.' : 'This run did not create a diff.'}<div class="inline-actions" style="justify-content:center"><button type="button" data-action="setTab" data-tab="activity">View activity</button></div></div>`;
      return `${changeNotice(run)}<div class="file-list" style="margin-top:12px">${run.files.map(file => {
        const decisionLabel = file.decision === 'excluded' ? 'Skipped' : 'Changed';
        return `<article class="file-card"><div class="file-head"><div style="min-width:0;flex:1"><div class="file-name">${esc(file.path)}</div><div class="file-meta" style="margin-top:4px"><span class="plus">+${file.add}</span><span class="minus">−${file.del}</span><span class="decision ${esc(file.decision)}">${esc(decisionLabel)}</span></div></div><div class="file-actions">
          <button type="button" class="btn-small" data-action="openFile" data-id="${esc(run.id)}" data-file="${esc(file.path)}">Open file</button></div></div>
          <pre class="diff">${file.diff.map(line => `<span class="diff-line ${line.startsWith('+') ? 'add' : line.startsWith('-') ? 'del' : ''}">${esc(line)}</span>`).join('')}</pre></article>`;
      }).join('')}</div>`;
    }

    function renderChecks(run) {
      const canRerun = ['failed','stopped'].includes(run.status) && run.checkStatus !== 'running';
      return `<section class="panel"><div class="panel-head"><span>Verification</span><div class="inline-actions" style="margin:0">${renderCheck(run.checkStatus)}${canRerun ? `<button type="button" class="btn-small" data-action="rerunChecks" data-id="${esc(run.id)}">Rerun checks</button>` : ''}<button type="button" class="btn-small" data-action="copyChecks" data-id="${esc(run.id)}">Copy output</button></div></div><div style="overflow:auto"><table class="check-table"><thead><tr><th>Check</th><th>Status</th><th>Duration</th><th>Output</th></tr></thead><tbody>${(run.checks || []).map(check => `<tr><td class="mono">${esc(check.name)}</td><td>${renderCheck(check.status)}</td><td class="mono subtle">${esc(check.duration || '—')}</td><td><div class="output">${esc(check.output)}</div></td></tr>`).join('')}</tbody></table></div></section>`;
    }

    function renderIterations(run) {
      return `<section class="panel"><div class="panel-head"><span>Iteration history</span><span class="panel-head-meta">Current iteration ${run.iteration} · no iteration limit</span></div><div>${(run.iterations || []).map(item => `<article class="iteration-card"><div class="iteration-number">Iteration ${item.iteration}</div><div><div class="iteration-title">${esc(item.title)}</div><div class="iteration-summary">${esc(item.summary)}</div></div><div class="iteration-state">${esc(item.state)} · ${esc(item.duration || '—')}</div></article>`).join('')}</div></section><div class="notice" style="margin-top:12px">This workflow continues for as many iterations as needed. It stops only when complete, blocked with evidence, or manually stopped.</div>`;
    }

    function renderNotes(run) {
      return `<div class="detail-grid"><section class="panel"><div class="panel-head"><span>Notes and decisions</span><span class="panel-head-meta">${run.notes?.length || 0} notes</span></div><div class="panel-body"><div class="note-list">${(run.notes || []).slice().sort((a,b) => b.at-a.at).map(item => `<article class="note"><div class="note-meta">${esc(item.author)} · ${esc(dateTime(item.at))}</div><div>${esc(item.text)}</div></article>`).join('') || '<div class="subtle">No notes yet.</div>'}</div></div></section><section class="panel"><div class="panel-head"><span>Add context</span></div><div class="panel-body"><p class="muted">Notes remain attached to this run as context for later workflow improvements.</p><div class="inline-actions"><button type="button" data-action="addNote" data-id="${esc(run.id)}">Add note</button><button type="button" data-action="explainRun" data-id="${esc(run.id)}">Explain this run</button></div></div></section></div>`;
    }

    const editorTabs = [
      { id:'behavior', label:'Behavior' }, { id:'verification', label:'Review loop' }, { id:'trigger', label:'Trigger' }, { id:'history', label:'Version history' }
    ];

    function defaultTriggerForType(type) {
      if (type === 'schedule') return { type, scheduleMode:'interval', intervalEvery:10, intervalUnit:'minutes', cadence:'weekdays', time:'02:30', timezone:'system' };
      if (type === 'file_watch') return { type, paths:'src/**', ignore:'node_modules/**\n.git/**\n{dist,build,coverage}/**\n**/*.generated.*', debounceAmount:2, debounceUnit:'seconds', dispatchMode:'change', lineDetection:'append_only', maxParallel:4, ignoreBlankLines:true, skipHeader:false };
      if (type === 'post_commit') return { type, authors:'human', hookBehavior:'after_each_commit', debounceSeconds:10 };
      if (type === 'test_failure') return { type, testCommand:'npm test', eventSource:'local test wrapper', cooldownSeconds:30 };
      return { type:'manual' };
    }

    function blankWorkflow() {
      return {
        id: uid('workflow'), name: 'Untitled workflow', description: '', enabled: true, pinned: false,
        customOrder: Math.max(-1,...state.workflows.filter(item => item.scope.repository === state.currentRepo).map(item => Number(item.customOrder) || 0)) + 1,
        prompt: '', promptVersion: 0, promptUpdatedAt: null, promptVersions: [],
        reviewLoop: defaultReviewLoop(),
        autoImprove: null,
        trigger: defaultTriggerForType('manual'),
        scope: { repository:state.currentRepo, overlap:'skip', standardOverlap:'skip' },
      };
    }

    function openWorkflowEditor(workflowId = null) {
      const original = workflowId ? workflowById(workflowId) : null;
      drawerLastFocusedElement = document.activeElement;
      const draft = deepClone(original || blankWorkflow());
      draft.scope.repository = state.currentRepo;
      draft.trigger = draft.trigger?.type ? draft.trigger : defaultTriggerForType('manual');
      delete draft.trigger.branchPattern;
      const lineDispatch = draft.trigger.type === 'file_watch' && (draft.trigger.dispatchMode || 'change') === 'per_line';
      const standardOverlap = ['skip','queue','parallel'].includes(draft.scope.standardOverlap) ? draft.scope.standardOverlap : lineDispatch ? 'skip' : draft.scope.overlap || 'skip';
      draft.scope.standardOverlap = standardOverlap;
      if (lineDispatch) draft.scope.overlap = 'parallel';
      draft.reviewLoop = { ...defaultReviewLoop(), ...(draft.reviewLoop || {}) };
      draft.reviewLoop.verifierPromptVersions = Array.isArray(draft.reviewLoop.verifierPromptVersions) ? draft.reviewLoop.verifierPromptVersions : [];
      ensureAutoImprove(draft, state.runs.filter(run => run.workflowId === draft.id && !run.archived));
      editorState = {
        mode: original ? 'edit' : 'new',
        original: deepClone(draft),
        draft,
        tab:'behavior',
        instruction:'',
        proposal:null,
        proposalGeneration:0,
        sourceEditing:false,
        revisionNote:'',
        appliedInstruction:'',
        triggerDrafts:{ [draft.trigger.type]:deepClone(draft.trigger) },
        overlapBeforeLineDispatch:standardOverlap,
        errors:{}
      };
      byId('drawerTitle').textContent = original ? `Edit ${original.name}` : 'Create workflow';
      byId('drawerSubtitle').textContent = original ? (draft.reviewLoop.enabled ? `Generator v${original.promptVersion} · Verifier v${draft.reviewLoop.verifierPromptVersion}` : `Prompt version ${original.promptVersion}`) : 'Configure behavior, verification, and trigger';
      const drawer=byId('workflowDrawer');
      drawer.hidden=false;
      drawer.removeAttribute('inert');
      drawer.setAttribute('aria-hidden','false');
      byId('drawerBackdrop').classList.add('open');
      drawer.classList.add('open');
      document.body.style.overflow = 'hidden';
      renderWorkflowEditor();
      setTimeout(() => byId('workflowInstruction')?.focus(), 0);
    }

    function editorIsDirty() {
      if (!editorState) return false;
      return JSON.stringify(editorState.draft) !== JSON.stringify(editorState.original) || Boolean(editorState.instruction.trim()) || Boolean(editorState.proposal);
    }

    function draftIsDirty() {
      return Boolean(editorState && JSON.stringify(editorState.draft) !== JSON.stringify(editorState.original));
    }

    function hasUnappliedAIWork() {
      if (!editorState) return false;
      return Boolean(editorState.proposal) || Boolean(editorState.instruction.trim() && editorState.instruction.trim() !== editorState.appliedInstruction.trim());
    }

    function generatorPromptChanged() { return Boolean(editorState && editorState.draft.prompt !== editorState.original.prompt); }
    function verifierPromptChanged() { return Boolean(editorState && editorState.draft.reviewLoop?.verifierPrompt !== editorState.original.reviewLoop?.verifierPrompt); }
    function promptChanged() { return generatorPromptChanged() || verifierPromptChanged(); }

    function activeRunsOnWorkflow(workflowId) {
      return state.runs.filter(run => run.workflowId === workflowId && isRunActive(run)).length;
    }

    function renderWorkflowEditor() {
      if (!editorState) return;
      const pinButton = byId('drawerPinButton');
      pinButton.classList.toggle('new-workflow-icon', Boolean(editorState.draft.pinned));
      pinButton.setAttribute('aria-label', editorState.draft.pinned ? 'Unpin workflow from top' : 'Pin workflow to top');
      pinButton.title = editorState.draft.pinned ? 'Unpin workflow from top' : 'Pin workflow to top';
      byId('drawerTabs').innerHTML = editorTabs.map(tab => {
        const loopStatus = tab.id === 'verification' ? `<span class="tab-status ${editorState.draft.reviewLoop.enabled ? 'on' : ''}">${editorState.draft.reviewLoop.enabled ? 'On' : 'Off'}</span>` : '';
        return `<button type="button" id="editor-tab-${esc(tab.id)}" class="tab-button ${editorState.tab === tab.id ? 'active' : ''}" data-action="setEditorTab" data-tab="${esc(tab.id)}" role="tab" aria-selected="${editorState.tab === tab.id}" aria-controls="drawerBody" tabindex="${editorState.tab === tab.id ? '0' : '-1'}">${esc(tab.label)}${loopStatus}</button>`;
      }).join('');
      if (editorState.tab === 'verification') byId('drawerBody').innerHTML = renderReviewLoopEditor();
      else if (editorState.tab === 'trigger') byId('drawerBody').innerHTML = renderTriggerEditor();
      else if (editorState.tab === 'history') byId('drawerBody').innerHTML = renderVersionHistory();
      else byId('drawerBody').innerHTML = renderBehaviorEditor();
      byId('drawerBody').setAttribute('aria-labelledby', `editor-tab-${editorState.tab}`);
      renderEditorFooter();
    }

    function renderEditorFooter() {
      const dirty = editorIsDirty();
      const draftDirty = draftIsDirty();
      const unappliedAI = hasUnappliedAIWork();
      const changed = promptChanged();
      const active = editorState.mode === 'edit' ? activeRunsOnWorkflow(editorState.draft.id) : 0;
      let note = dirty ? 'Unsaved workflow changes.' : 'No unsaved changes.';
      if (changed) {
        const changedRoles = [generatorPromptChanged() ? `Generator v${editorState.original.promptVersion + 1}` : '', verifierPromptChanged() ? `Verifier v${Number(editorState.original.reviewLoop?.verifierPromptVersion || 0) + 1}` : ''].filter(Boolean).join(' and ');
        note = `${changedRoles} will be used by future runs. ${active ? `${active} active ${active === 1 ? 'run continues' : 'runs continue'} using both prompt versions pinned at start.` : 'No active runs are pinned to the current prompt pair.'}`;
      }
      if (editorState.mode === 'new') note = editorState.draft.prompt ? 'The generated prompt and trigger settings will be saved together.' : 'Describe the workflow and generate its initial prompt before creating it.';
      if (unappliedAI) note = 'The AI instruction or proposal has not been applied to the draft yet.';
      byId('drawerFooterNote').textContent = note;
      const save = byId('saveWorkflowButton');
      save.textContent = editorState.mode === 'new' ? 'Create workflow' : changed ? 'Save as revision' : 'Save changes';
      save.disabled = unappliedAI || (editorState.mode === 'new' ? (!editorState.draft.name.trim() || !editorState.draft.prompt.trim()) : !draftDirty);
    }

    function renderBehaviorEditor() {
      const wf = editorState.draft;
      const isNew = editorState.mode === 'new';
      const proposal = editorState.proposal;
      const stale = proposal && proposal.sourcePrompt !== wf.prompt;
      const examples = isNew ? [
        ['Review code changes','Review each change for bugs, make only small safe fixes, run focused checks, and finish when the saved completion standards are met.'],
        ['Fix failing tests','When a local test fails, reproduce it, diagnose the root cause, patch narrowly, and keep iterating until checks pass or the blocker is reported with evidence.'],
        ['Watch a folder','Watch API schema files and update generated client types when they change, then run typecheck and finish only when verification passes.']
      ] : [
        ['Smaller patches','Avoid style-only edits, keep every patch as small as possible, and explain any behavior change before making it.'],
        ['Stronger checks','Run the narrowest relevant check after each change, then run the broader suite before declaring the workflow complete.'],
        ['Clearer progress','At the end of each iteration, record what changed, what was learned, and whether another iteration is likely to make progress.']
      ];
      return `${editorState.errors.prompt ? `<div class="notice danger" style="margin-bottom:12px">${esc(editorState.errors.prompt)}</div>` : ''}<div class="form-grid" style="margin-bottom:14px">
        <div class="form-group"><label for="workflowName">Workflow name</label><input class="field" id="workflowName" data-editor-path="name" value="${esc(wf.name)}"><div class="validation">${esc(editorState.errors.name || '')}</div></div>
        <div class="form-group"><label for="workflowDescription">Short description</label><input class="field" id="workflowDescription" data-editor-path="description" value="${esc(wf.description)}" placeholder="What appears in the workflow list"><div class="validation"></div></div>
      </div>
      ${generatorPromptChanged() ? `<div class="draft-banner"><span>◆</span><div><strong>Draft generator prompt differs from version ${editorState.original.promptVersion}.</strong><br><span class="muted">It is not saved until you use the footer action.</span></div></div>` : ''}
      <div class="editor-grid ${proposal ? '' : 'single'}">
        <section class="panel"><div class="panel-head"><span>${isNew ? 'Describe the workflow' : 'Change this workflow with AI'}</span><span class="panel-head-meta">primary path</span></div><div class="panel-body">
          <label for="workflowInstruction" style="display:block;color:var(--text);font-weight:700;margin-bottom:7px">${isNew ? 'What should this workflow do?' : 'What should this workflow do differently?'}</label>
          <textarea id="workflowInstruction" class="composer" placeholder="${isNew ? 'Describe the goal, operating loop, when it should stop, and anything it must never do.' : 'Describe the behavioral change in plain language. The current prompt will not change until you apply the proposal.'}">${esc(editorState.instruction)}</textarea>
          <div class="example-row">${examples.map(([label,value]) => `<button type="button" class="btn-small" data-action="usePromptExample" data-value="${esc(value)}">${esc(label)}</button>`).join('')}</div>
          <div class="inline-actions"><button type="button" class="btn-primary" data-action="generatePromptProposal">${proposal ? 'Generate new proposal' : isNew ? 'Generate initial prompt' : 'Generate prompt update'}</button>${proposal ? '<button type="button" data-action="focusPromptInstruction">Refine instruction</button>' : ''}</div>
          <div class="field-help" style="margin-top:9px">The AI rewrite is simulated in this offline prototype. The proposal, review, draft, and save states behave like the intended product.</div>
        </div></section>
        ${proposal ? `<section class="panel"><div class="panel-head"><span>AI proposal</span><span class="panel-head-meta">generation ${proposal.generation}</span></div><div class="proposal-content">
          ${stale ? '<div class="notice danger" style="margin-bottom:10px">The draft prompt changed after this proposal was generated. Generate a fresh proposal before applying it.</div>' : ''}
          <div class="proposal-summary">${proposal.summary.map(item => `<div class="proposal-item"><strong>${esc(item.section)}</strong><span>${esc(item.text)}</span></div>`).join('')}</div>
          <details open><summary style="cursor:pointer;color:var(--text-2);margin-bottom:8px">Review prompt diff</summary><pre class="diff">${proposal.diff.map(line => `<span class="diff-line ${line.type}">${esc((line.type === 'add' ? '+' : line.type === 'del' ? '-' : ' ') + line.text)}</span>`).join('')}</pre></details>
          <div class="inline-actions"><button type="button" class="btn-success" data-action="applyPromptProposal" ${stale ? 'disabled' : ''}>Apply to draft</button><button type="button" data-action="generatePromptProposal">Regenerate</button><button type="button" data-action="discardPromptProposal">Discard</button></div>
        </div></section>` : ''}
      </div>
      <details class="prompt-reader" ${editorState.sourceEditing ? 'open' : ''}><summary>${isNew && !wf.prompt ? 'Initial generator prompt will appear here' : `View ${generatorPromptChanged() ? 'draft' : 'current'} generator prompt · version ${wf.promptVersion || 'draft'}`}</summary>
        <div style="padding:10px 12px;border-bottom:1px solid var(--line);display:flex;gap:7px;align-items:center"><button type="button" class="btn-small" data-action="toggleDirectPromptEdit">${editorState.sourceEditing ? 'Finish direct edit' : 'Edit source directly'}</button><button type="button" class="btn-small" data-action="copyWorkflowPrompt">Copy prompt</button><span class="subtle">Direct editing is an advanced path.</span></div>
        <textarea id="promptSource" class="prompt-source" ${editorState.sourceEditing ? '' : 'readonly'} placeholder="Generate an initial prompt first.">${esc(wf.prompt)}</textarea>
      </details>`;
    }

    function renderReviewLoopEditor() {
      const wf = editorState.draft;
      const loop = wf.reviewLoop;
      const generatorVersion = wf.promptVersion || 'draft';
      const verifierVersion = loop.verifierPromptVersion || 'draft';
      const enabledContent = loop.enabled ? `
        ${verifierPromptChanged() ? `<div class="draft-banner"><span>◆</span><div><strong>Draft verifier prompt differs from version ${editorState.original.reviewLoop?.verifierPromptVersion || 0}.</strong><br><span class="muted">Future runs pin the generator and verifier versions together when they start.</span></div></div>` : ''}
        <div class="loop-flow" aria-label="Generator sends a candidate to a separate verifier">
          <section class="loop-agent"><div class="loop-agent-head"><span class="loop-role-badge">Writes</span><span class="loop-role">Generator</span></div><div class="loop-agent-copy">Uses the Behavior prompt to create or revise the candidate in the inherited app context.</div><div class="loop-agent-meta">Prompt v${esc(generatorVersion)} · ${wf.prompt.trim() ? `${wf.prompt.trim().split(/\s+/).length} words` : 'prompt not created'}</div><div class="inline-actions"><button type="button" class="btn-small" data-action="setEditorTab" data-tab="behavior">Edit generator prompt</button></div></section>
          <div class="loop-connector" aria-hidden="true"><div><div class="loop-connector-icon">→</div><div class="loop-connector-label">candidate + evidence</div></div></div>
          <section class="loop-agent verifier"><div class="loop-agent-head"><span class="loop-role-badge">Judges</span><span class="loop-role">Independent verifier</span></div><div class="loop-agent-copy">Starts as a fresh, read-only instance for every candidate and evaluates it with its own prompt.</div><div class="loop-agent-meta">Prompt v${esc(verifierVersion)} · cannot modify files</div></section>
        </div>
        <div class="loop-routes" aria-label="Verifier outcome routes">
          <div class="loop-route pass"><strong>MEETS_STANDARDS → complete</strong><span>The verifier marks the workflow result complete with its evidence.</span></div>
          <div class="loop-route revise"><strong>REQUEST_CHANGES → problem reported</strong><span>Return the evidence and one actionable feedback packet to Generator.</span></div>
          <div class="loop-route"><strong>BLOCKED → fail</strong><span>End the run as failed and record the missing evidence or unavailable dependency.</span></div>
        </div>
        <div class="form-grid" style="margin-top:14px">
          <div class="form-group full"><label for="verifierPrompt">Independent verifier prompt</label><textarea class="textarea loop-prompt" id="verifierPrompt" data-editor-path="reviewLoop.verifierPrompt" aria-describedby="verifierPromptHelp verifierPromptError" placeholder="Define the standards, evidence required, adversarial checks, and verdict contract.">${esc(loop.verifierPrompt || '')}</textarea><div class="field-help" id="verifierPromptHelp">This is a separate prompt, not an addendum to the generator. Be explicit about what must be true to pass.</div><div class="validation" id="verifierPromptError">${esc(editorState.errors.reviewLoop || '')}</div><div class="inline-actions"><button type="button" class="btn-small" data-action="useVerifierTemplate">Use adversarial template</button><button type="button" class="btn-small" data-action="copyVerifierPrompt">Copy verifier prompt</button></div></div>
          <div class="form-group"><label for="maxReviewRounds">Maximum generator–verifier rounds</label><input class="field" type="number" min="1" max="100" id="maxReviewRounds" data-editor-path="reviewLoop.maxRounds" value="${Number(loop.maxRounds ?? 5)}"><div class="field-help">A defensive stop; the loop ends earlier as soon as standards are met.</div></div>
          <div class="form-group"><label for="reviewLimitAction">If the limit is reached</label><select class="field" id="reviewLimitAction" data-editor-path="reviewLoop.onLimit"><option value="blocked" ${loop.onLimit !== 'fail' ? 'selected' : ''}>End failed as blocked, preserve feedback</option><option value="fail" ${loop.onLimit === 'fail' ? 'selected' : ''}>End failed, preserve feedback</option></select><div class="field-help">Both outcomes end the run as failed and preserve the latest candidate, evidence, and verifier feedback.</div></div>
          <div class="form-group full"><div class="loop-contract">
            <section class="loop-contract-card"><div class="loop-contract-title">Verifier receives</div><ul><li>Workflow goal and candidate diff</li><li>Relevant files and check results</li><li>A concise generator summary</li></ul></section>
            <section class="loop-contract-card"><div class="loop-contract-title">Verifier never receives</div><ul><li>The generator conversation or private reasoning</li><li>Permission to edit files</li><li>Authority to override the saved completion contract</li></ul></section>
          </div></div>
          <div class="form-group full"><div class="notice"><strong>Stopping conditions:</strong> standards met, user stop, blocked verdict, round limit, or the no-progress policy. Verifier errors retry automatically or end failed without consuming another generator round.</div></div>
        </div>` : `
        <div class="loop-flow" aria-label="Optional generator and verifier review loop">
          <section class="loop-agent"><div class="loop-agent-head"><span class="loop-role-badge">Writes</span><span class="loop-role">Generator</span></div><div class="loop-agent-copy">The existing Behavior prompt produces the workflow result.</div></section>
          <div class="loop-connector" aria-hidden="true"><div><div class="loop-connector-icon">→</div><div class="loop-connector-label">candidate</div></div></div>
          <section class="loop-agent verifier"><div class="loop-agent-head"><span class="loop-role-badge">Optional</span><span class="loop-role">Independent verifier</span></div><div class="loop-agent-copy">Turn on the review loop to add a separate adversarial instance that can complete the result or report a concrete problem with evidence.</div></section>
        </div>
        <div class="notice" style="margin-top:12px">Single-agent mode is active. ${loop.verifierPrompt ? 'The saved verifier prompt is preserved and will be available if you turn the loop back on.' : 'Turning this on reveals the verifier prompt and loop controls.'}</div>`;
      return `${editorState.errors.reviewLoop && !loop.enabled ? `<div class="notice danger" style="margin-bottom:12px">${esc(editorState.errors.reviewLoop)}</div>` : ''}<section class="loop-mode-card"><label class="safety-option"><input type="checkbox" data-editor-path="reviewLoop.enabled" ${loop.enabled ? 'checked' : ''}><span><span class="safety-title">Use a generator + adversarial verifier loop</span><span class="safety-copy">The generator proposes work. A separate verifier challenges it against explicit standards and either completes the result, reports a problem for another round, or ends the run as failed with blocker evidence.</span></span></label></section>${enabledContent}`;
    }

    function renderScheduleEditor(trigger) {
      const mode = trigger.scheduleMode || (trigger.intervalEvery ? 'interval' : 'calendar');
      const rawEvery = Number(trigger.intervalEvery);
      const every = Number.isFinite(rawEvery) ? Math.min(9999, Math.max(1, rawEvery)) : 10;
      if (mode === 'interval') trigger.intervalEvery = every;
      const unit = trigger.intervalUnit || 'minutes';
      const modes = `<div class="form-group full"><label>Schedule style</label><div class="schedule-mode-picker" role="group" aria-label="Schedule style"><button type="button" class="schedule-mode-button ${mode === 'interval' ? 'active' : ''}" data-action="setScheduleMode" data-mode="interval" aria-pressed="${mode === 'interval'}"><span class="schedule-mode-icon" aria-hidden="true">↻</span><strong>Fixed interval</strong><span>Every few seconds, minutes, hours, or days</span></button><button type="button" class="schedule-mode-button ${mode === 'calendar' ? 'active' : ''}" data-action="setScheduleMode" data-mode="calendar" aria-pressed="${mode === 'calendar'}"><span class="schedule-mode-icon" aria-hidden="true">◷</span><strong>Calendar time</strong><span>At a specific time on selected days</span></button></div></div>`;
      if (mode === 'interval') {
        const unitOptions = [['seconds','seconds'],['minutes','minutes'],['hours','hours'],['days','days']].map(([value,label]) => `<option value="${value}" ${unit === value ? 'selected' : ''}>${label}</option>`).join('');
        const presets = [[10,'seconds','10 sec'],[30,'seconds','30 sec'],[1,'minutes','1 min'],[5,'minutes','5 min'],[1,'hours','1 hour']].map(([value,presetUnit,label]) => `<button type="button" class="schedule-preset ${every === value && unit === presetUnit ? 'btn-primary' : ''}" data-action="setSchedulePreset" data-value="${value}" data-unit="${presetUnit}">${label}</button>`).join('');
        return `${modes}<div class="form-group full schedule-builder"><label for="scheduleInterval">Repeat interval</label><div class="schedule-interval-row"><span>Run every</span><input class="field" type="number" min="1" max="9999" id="scheduleInterval" data-editor-path="trigger.intervalEvery" value="${every}"><select class="field" id="scheduleUnit" data-editor-path="trigger.intervalUnit">${unitOptions}</select></div><div class="schedule-presets" aria-label="Common schedule intervals">${presets}</div><div class="schedule-summary"><strong>Schedule:</strong> ${esc(nextScheduleText({...trigger,scheduleMode:'interval',intervalEvery:every,intervalUnit:unit}))}</div></div>`;
      }
      return `${modes}<div class="form-group"><label for="scheduleCadence">Days</label><select class="field" id="scheduleCadence" data-editor-path="trigger.cadence"><option value="daily" ${trigger.cadence === 'daily' ? 'selected' : ''}>Every day</option><option value="weekdays" ${trigger.cadence === 'weekdays' ? 'selected' : ''}>Weekdays</option><option value="weekly" ${trigger.cadence === 'weekly' ? 'selected' : ''}>Once a week</option></select></div><div class="form-group"><label for="scheduleTime">Time</label><input class="field" type="time" id="scheduleTime" data-editor-path="trigger.time" value="${esc(trigger.time || '02:30')}"></div><div class="form-group full"><label for="scheduleTimezone">Timezone</label><select class="field" id="scheduleTimezone" data-editor-path="trigger.timezone"><option value="system" ${!trigger.timezone || trigger.timezone === 'system' ? 'selected' : ''}>System time</option><option ${trigger.timezone === 'America/Chicago' ? 'selected' : ''}>America/Chicago</option><option ${trigger.timezone === 'America/New_York' ? 'selected' : ''}>America/New_York</option><option ${trigger.timezone === 'Europe/London' ? 'selected' : ''}>Europe/London</option><option ${trigger.timezone === 'UTC' ? 'selected' : ''}>UTC</option></select><div class="schedule-summary"><strong>Schedule:</strong> ${esc(nextScheduleText({...trigger,scheduleMode:'calendar'}))}</div></div>`;
    }

    function renderFileWatchEditor(trigger) {
      const paths = String(trigger.paths || '').split('\n').map(value => value.trim()).filter(Boolean);
      const ignored = String(trigger.ignore || '').split('\n').map(value => value.trim()).filter(Boolean);
      const rawDebounce = Number(trigger.debounceAmount ?? trigger.debounceSeconds ?? 2);
      const debounceAmount = Number.isFinite(rawDebounce) ? Math.min(9999, Math.max(0, rawDebounce)) : 2;
      const debounceUnit = trigger.debounceUnit || 'seconds';
      const dispatchMode = trigger.dispatchMode || 'change';
      const lineDetection = trigger.lineDetection || 'append_only';
      const rawMaxParallel = Number(trigger.maxParallel ?? 4);
      const maxParallel = Number.isFinite(rawMaxParallel) ? Math.min(100, Math.max(1, rawMaxParallel)) : 4;
      trigger.debounceAmount = debounceAmount;
      trigger.maxParallel = maxParallel;
      const ignoreBlankLines = trigger.ignoreBlankLines !== false;
      const skipHeader = trigger.skipHeader === true;
      const presetButton = (target, pattern, label) => `<button type="button" class="pattern-preset ${target.includes(pattern) ? 'active' : ''}" data-action="toggleFileWatchPattern" data-target="${target === paths ? 'paths' : 'ignore'}" data-pattern="${esc(pattern)}" aria-pressed="${target.includes(pattern)}">${esc(label)}</button>`;
